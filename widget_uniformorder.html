<!DOCTYPE html>
<!--
  ============================================================================
  UNIFORM ORDER WIDGET v1 — Pants (Subform) — CSP-safe build
  ============================================================================
  App:        lax-abg
  Form:       Uniform_Order
  Subform:    Pants_Orders   (link name inside Uniform_Order)
  Emp Report: All_Employee_Info

  CREATOR SCHEMA
  ──────────────────────────────────────────────────────────────────
  Parent form: Uniform_Order
    Employee_ID   Single Line
    Full_Name     Single Line
    Department    Single Line
    Order_Date    Date          default = Today
    Submitted_By  Email         default = zoho.loginuserid
    Notes         Multi Line

  Subform: Pants_Orders  (link name must match SUBFORM constant below)
    Color         Dropdown  → Black / Blue / Gray
    Size          Dropdown  → XS / S / M / L / XL / 2XL / 3XL
    Style         Dropdown  → Cargo / Chino / Dress Pants
    Cuffed        Dropdown  → No / Yes
    Quantity      Number    → min 1

  Report: All_Uniform_Orders — tabular, all fields, Pants_Orders expanded
  ──────────────────────────────────────────────────────────────────
  CSP NOTE: Zoho widgets run in a sandboxed iframe.
  All event handlers MUST be attached via addEventListener in JS.
  No inline onclick/oninput/onchange/onfocus attributes allowed.
  ============================================================================
-->
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:      #0f172a;
      --dark2:     #1e293b;
      --mid:       #334155;
      --th-bg:     #f1f5f9;
      --th-text:   #64748b;
      --body-bg:   #f0f4f8;
      --card-bg:   #ffffff;
      --border:    #e2e8f0;
      --text:      #1e293b;
      --muted:     #64748b;
      --danger:    #ef4444;
      --success:   #22c55e;
      --info-bg:   #dbeafe;
      --info-text: #1e40af;
      --radius:    8px;
      --radius-sm: 5px;
      --shadow:    0 1px 3px rgba(0,0,0,0.10), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.13);
    }

    body {
      font-family: "DM Sans", -apple-system, sans-serif;
      background: var(--body-bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
      padding-bottom: 72px;
    }

    /* Header */
    .widget-header {
      background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
      color: #fff;
      padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .status-dot  { width: 9px; height: 9px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
    .header-title { font-size: 15px; font-weight: 600; }
    .header-sub   { font-size: 11px; color: #94a3b8; margin-top: 2px; }
    .header-date  { font-size: 11px; color: #475569; }

    /* Layout */
    .content { max-width: 820px; margin: 0 auto; padding: 20px 16px; }

    /* Cards */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
      overflow: hidden;
    }
    .card-header {
      background: var(--th-bg);
      border-bottom: 1px solid var(--border);
      padding: 9px 16px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--th-text);
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 16px; }

    /* Fields */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 520px) { .grid-2 { grid-template-columns: 1fr; } }
    .span-2 { grid-column: 1 / -1; }

    .field-group { display: flex; flex-direction: column; gap: 5px; }
    .field-label {
      font-size: 11px; font-weight: 600;
      color: var(--th-text);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .req { color: var(--danger); margin-left: 2px; }

    input[type=text], select {
      font-family: inherit; font-size: 13px;
      color: var(--text); background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 10px; width: 100%; outline: none;
      transition: border-color 0.15s;
    }
    input[type=text]:focus, select:focus { border-color: var(--mid); }
    select { cursor: pointer; }

    /* Employee lookup */
    .lookup-wrap { position: relative; }
    .lookup-row  { display: flex; gap: 6px; }
    .lookup-row input { flex: 1; }

    #empClear {
      display: none;
      background: none; border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 10px; color: var(--muted);
      cursor: pointer; font-size: 15px; line-height: 1;
      transition: color 0.15s, border-color 0.15s;
      align-items: center; justify-content: center;
    }
    #empClear:hover { color: var(--danger); border-color: #fca5a5; }

    .lookup-drop {
      display: none;
      position: absolute; left: 0; right: 0; top: calc(100% + 4px);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      max-height: 230px; overflow-y: auto;
      z-index: 400;
    }
    .lookup-drop.show { display: block; }

    .emp-item {
      padding: 9px 12px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .emp-item:last-child { border-bottom: none; }
    .emp-item:hover, .emp-item.kbfocus { background: var(--th-bg); }
    .emp-item-id    { font-size: 13px; font-weight: 500; }
    .emp-item-name  { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .emp-item-title { font-size: 10px; color: #94a3b8; }
    .emp-msg        { padding: 12px; text-align: center; font-size: 12px; color: var(--muted); }

    .resolved-badge {
      display: none;
      align-items: center; gap: 7px;
      background: var(--info-bg); border: 1px solid #bfdbfe;
      border-radius: var(--radius-sm);
      padding: 7px 11px; margin-top: 6px;
      font-size: 12px; color: var(--info-text); font-weight: 500;
    }
    .resolved-badge.show { display: flex; }

    /* Subform table */
    .tbl-wrap { overflow-x: auto; }
    table.sf {
      width: 100%; border-collapse: collapse; font-size: 13px;
      min-width: 500px;
    }
    table.sf th {
      background: var(--th-bg); color: var(--th-text);
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 9px 10px; text-align: left;
      border-bottom: 2px solid var(--border); white-space: nowrap;
    }
    table.sf td {
      padding: 6px 8px; border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    table.sf tr:last-child td { border-bottom: none; }
    table.sf tbody tr:hover td { background: #fafbfc; }
    table.sf select { font-size: 12px; padding: 5px 7px; }
    table.sf input[type=number] {
      width: 56px; font-size: 12px; padding: 5px 6px;
      text-align: center; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-family: inherit;
      outline: none;
    }

    .qty-wrap { display: flex; align-items: center; gap: 3px; }
    .qty-btn {
      width: 24px; height: 24px;
      border: 1px solid var(--border); background: var(--th-bg);
      border-radius: 4px; cursor: pointer; font-size: 15px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); transition: background 0.1s;
    }
    .qty-btn:hover { background: #e2e8f0; color: var(--text); }

    .del-btn {
      background: none; border: none;
      color: #cbd5e1; cursor: pointer; font-size: 16px;
      padding: 3px 6px; border-radius: 4px;
      transition: color 0.15s, background 0.1s;
    }
    .del-btn:hover { color: var(--danger); background: #fef2f2; }

    #addRowBtn {
      width: 100%; padding: 9px;
      background: none; border: none;
      border-top: 1px dashed var(--border);
      font-family: inherit; font-size: 12px; color: var(--muted);
      cursor: pointer; text-align: center;
      transition: background 0.1s, color 0.1s;
    }
    #addRowBtn:hover { background: #f8fafc; color: var(--dark); }

    /* Submit bar */
    .submit-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      z-index: 200; box-shadow: 0 -2px 8px rgba(0,0,0,0.07);
    }
    .sub-summary { font-size: 12px; color: var(--muted); }
    .sub-summary strong { color: var(--text); }
    .btn-row { display: flex; gap: 8px; }

    .btn {
      font-family: inherit; font-size: 13px; font-weight: 500;
      border-radius: var(--radius); padding: 9px 22px;
      cursor: pointer; border: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--dark); color: #fff; }
    .btn-primary:hover { background: var(--dark2); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--th-bg); }

    /* Modal */
    .backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,0.55); backdrop-filter: blur(3px);
      z-index: 500; align-items: center; justify-content: center;
    }
    .backdrop.show { display: flex; }
    .modal {
      background: #fff; border-radius: 12px;
      padding: 26px; max-width: 480px; width: 92%;
      box-shadow: var(--shadow-md);
      animation: popIn 0.16s ease;
    }
    @keyframes popIn { from{transform:scale(0.93);opacity:0;} to{transform:scale(1);opacity:1;} }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .modal-sub   { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
    .modal-body  {
      font-size: 12px; line-height: 1.9; white-space: pre-wrap;
      background: var(--th-bg); border-radius: var(--radius-sm);
      padding: 12px 14px; margin-bottom: 18px;
      max-height: 220px; overflow-y: auto;
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* Success */
    .success-screen {
      display: none; text-align: center;
      padding: 60px 20px; max-width: 500px; margin: 0 auto;
    }
    .success-screen.show { display: block; }
    .success-icon  { font-size: 46px; margin-bottom: 14px; }
    .success-title { font-size: 19px; font-weight: 600; margin-bottom: 8px; }
    .success-sub   { color: var(--muted); font-size: 13px; margin-bottom: 24px; line-height: 1.6; }

    /* Toast */
    .toast {
      position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%);
      background: var(--dark); color: #fff;
      padding: 9px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity 0.25s;
      z-index: 999; pointer-events: none; white-space: nowrap;
    }
    .toast.err  { background: var(--danger); }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Header -->
<div class="widget-header">
  <div class="header-left">
    <span class="status-dot"></span>
    <div>
      <div class="header-title">Uniform Order — Pants</div>
      <div class="header-sub" id="headerSub">Loading…</div>
    </div>
  </div>
  <div class="header-date" id="headerDate"></div>
</div>

<!-- Main -->
<div class="content" id="mainContent">

  <!-- Employee card -->
  <div class="card">
    <div class="card-header">👤 Employee</div>
    <div class="card-body">
      <div class="grid-2">

        <div class="field-group">
          <div class="field-label">Employee ID <span class="req">*</span></div>
          <div class="lookup-wrap" id="lookupWrap">
            <div class="lookup-row">
              <input type="text" id="empInput" placeholder="Type ID, first or last name…" autocomplete="off"/>
              <button id="empClear" title="Clear">✕</button>
            </div>
            <div class="lookup-drop" id="empDrop"></div>
            <div class="resolved-badge" id="resolvedBadge">
              <span style="font-size:13px;">✓</span>
              <span id="resolvedName" style="font-weight:600;"></span>
              <span id="resolvedTitle" style="font-size:11px;opacity:0.75;margin-left:4px;"></span>
            </div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label">Department <span class="req">*</span></div>
          <select id="fDept">
            <option value="">— Select —</option>
            <option>Valet</option>
            <option>Dispatch</option>
            <option>Operations</option>
            <option>Management</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field-group span-2">
          <div class="field-label">Notes</div>
          <input type="text" id="fNotes" placeholder="Any special instructions…"/>
        </div>

      </div>
    </div>
  </div>

  <!-- Pants subform card -->
  <div class="card">
    <div class="card-header">
      <span>👖 Pants — Order Lines</span>
      <span id="rowBadge" style="margin-left:auto;background:var(--info-bg);color:var(--info-text);padding:2px 9px;border-radius:12px;font-size:10px;display:none;"></span>
    </div>
    <div class="card-body" style="padding:0;">
      <div class="tbl-wrap">
        <table class="sf">
          <thead>
            <tr>
              <th>Color</th>
              <th>Size</th>
              <th>Style</th>
              <th>Cuffed</th>
              <th>Qty</th>
              <th style="width:36px;"></th>
            </tr>
          </thead>
          <tbody id="sfTbody"></tbody>
        </table>
      </div>
      <button id="addRowBtn">+ Add another variation</button>
    </div>
  </div>

</div>

<!-- Success -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <div class="success-title">Order Submitted!</div>
  <div class="success-sub" id="successMsg"></div>
  <button class="btn btn-ghost" id="btnNewOrder">Submit Another Order</button>
</div>

<!-- Submit bar -->
<div class="submit-bar" id="submitBar">
  <div class="sub-summary" id="subSummary">No items added</div>
  <div class="btn-row">
    <button class="btn btn-ghost" id="btnClear">Clear</button>
    <button class="btn btn-primary" id="btnSubmit">Submit Order</button>
  </div>
</div>

<!-- Confirm modal -->
<div class="backdrop" id="confirmBackdrop">
  <div class="modal">
    <div class="modal-title">Confirm Order</div>
    <div class="modal-sub">Review your order before submitting:</div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btnBack">Back</button>
      <button class="btn btn-primary" id="btnConfirm">Confirm &amp; Submit</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
(function () {
  "use strict";

  // ── CONFIG ────────────────────────────────────────────────
  var APP     = "lax-abg";
  var FORM    = "Uniform_Order";
  var SUBFORM = "Pants_Orders";       // must match Creator subform link name exactly
  var EMP_RPT = "All_Employee_Info";  // report: Employee_ID, First_Name, Last_Name, Full_Name, Title, Team

  // ── PANTS COLUMN DEFINITIONS ──────────────────────────────
  var PANTS_COLS = [
    { key: "Color",    type: "select", opts: ["Black","Blue","Gray"] },
    { key: "Size",     type: "select", opts: ["XS","S","M","L","XL","2XL","3XL"] },
    { key: "Style",    type: "select", opts: ["Cargo","Chino","Dress Pants"] },
    { key: "Cuffed",   type: "select", opts: ["No","Yes"] },
    { key: "Quantity", type: "qty" }
  ];

  // ── STATE ─────────────────────────────────────────────────
  var loginUser    = "";
  var empCache     = [];
  var selectedEmp  = null;
  var dropMatches  = [];
  var activeIdx    = -1;
  var rowSeq       = 0;
  var toastTimer   = null;

  // ── ELEMENT REFS ──────────────────────────────────────────
  var empInput       = document.getElementById("empInput");
  var empClear       = document.getElementById("empClear");
  var empDrop        = document.getElementById("empDrop");
  var resolvedBadge  = document.getElementById("resolvedBadge");
  var resolvedName   = document.getElementById("resolvedName");
  var resolvedTitle  = document.getElementById("resolvedTitle");
  var sfTbody        = document.getElementById("sfTbody");
  var subSummary     = document.getElementById("subSummary");
  var rowBadge       = document.getElementById("rowBadge");
  var confirmBackdrop= document.getElementById("confirmBackdrop");
  var confirmBody    = document.getElementById("confirmBody");
  var btnConfirm     = document.getElementById("btnConfirm");
  var successScreen  = document.getElementById("successScreen");
  var successMsg     = document.getElementById("successMsg");
  var mainContent    = document.getElementById("mainContent");
  var submitBar      = document.getElementById("submitBar");
  var toast          = document.getElementById("toast");

  // ── INIT ──────────────────────────────────────────────────
  document.getElementById("headerDate").textContent =
    new Date().toLocaleDateString("en-US", {weekday:"short", month:"short", day:"numeric", year:"numeric"});

  // Dump available SDK methods — helps diagnose "not a function" errors
  console.log("[Uniform] ZOHO.CREATOR.DATA keys:", Object.keys(ZOHO.CREATOR.DATA || {}));

  addRow(); // seed one empty row

  // Wire all buttons via addEventListener (CSP-safe)
  empInput.addEventListener("input",   function () { onEmpInput(empInput.value); });
  empInput.addEventListener("focus",   function () { onEmpFocus(); });
  empInput.addEventListener("keydown", function (e) { onEmpKey(e); });
  empClear.addEventListener("click",   function () { clearEmp(); });
  document.getElementById("addRowBtn").addEventListener("click", function () { addRow(); });
  document.getElementById("btnSubmit").addEventListener("click", function () { openConfirm(); });
  document.getElementById("btnClear").addEventListener("click",  function () { confirmClear(); });
  document.getElementById("btnBack").addEventListener("click",   function () { closeConfirm(); });
  document.getElementById("btnConfirm").addEventListener("click",function () { doSubmit(); });
  document.getElementById("btnNewOrder").addEventListener("click",function () { resetForm(); });

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closeConfirm();
  });

  // Close dropdown on outside click
  document.addEventListener("click", function (e) {
    if (!document.getElementById("lookupWrap").contains(e.target)) hideDrop();
  });

  // ── ZOHO INIT ─────────────────────────────────────────────
  ZOHO.CREATOR.UTIL.getInitParams().then(function (p) {
    loginUser = p.loginUser || "";
    var uname = loginUser ? loginUser.split("@")[0] : "";
    document.getElementById("headerSub").textContent =
      uname ? "Submitting as: " + uname : "Uniform Order Form";
    loadEmployees();
  }).catch(function () {
    document.getElementById("headerSub").textContent = "Uniform Order Form";
    loadEmployees();
  });

  // ── LOAD EMPLOYEES ────────────────────────────────────────
  function loadEmployees() {
    ZOHO.CREATOR.DATA.getRecords({
      app_name:    APP,
      report_name: EMP_RPT,
      page:        1,
      max_records: 1000
    }).then(function (resp) {
      if (resp && resp.code === 3000 && resp.data && resp.data.length) {
        empCache = resp.data.map(function (r) {
          var fn = (r.First_Name || "").trim();
          var ln = (r.Last_Name  || "").trim();
          var full = (r.Full_Name || "").trim();
          if (!full) full = ln && fn ? ln + ", " + fn : ln || fn;
          return {
            zohoId:   r.ID,
            empId:    (r.Employee_ID || "").trim(),
            fullName: full,
            firstName: fn,
            lastName:  ln,
            title:    (r.Title || "").trim(),
            team:     (r.Team  || "").trim()
          };
        }).filter(function (e) { return e.empId; })
          .sort(function (a, b) { return a.empId.localeCompare(b.empId); });
        console.log("[UniformWidget] Employees loaded:", empCache.length);
      } else {
        console.warn("[UniformWidget] Employee load issue:", resp && resp.code, resp && resp.message);
      }
    }).catch(function (err) {
      console.error("[UniformWidget] Employee load error:", err);
    });
  }

  // ── EMPLOYEE LOOKUP ───────────────────────────────────────
  function onEmpInput(val) {
    val = val.trim();
    activeIdx   = -1;
    selectedEmp = null;
    empClear.style.display = val ? "flex" : "none";
    resolvedBadge.classList.remove("show");

    if (!val) { hideDrop(); updateSummary(); return; }

    if (!empCache.length) {
      showDropMsg("Loading employees — try again in a moment…");
      return;
    }

    var q = val.toLowerCase();
    dropMatches = empCache.filter(function (e) {
      return e.empId.toLowerCase().includes(q) ||
             e.firstName.toLowerCase().includes(q) ||
             e.lastName.toLowerCase().includes(q) ||
             e.fullName.toLowerCase().includes(q);
    }).slice(0, 10);

    if (!dropMatches.length) {
      showDropMsg("No employees found");
      return;
    }

    renderDrop(q);
    updateSummary();
  }

  function onEmpFocus() {
    var val = empInput.value.trim();
    if (val && !selectedEmp) onEmpInput(val);
  }

  function onEmpKey(e) {
    var items = empDrop.querySelectorAll(".emp-item");
    if (!items.length) return;
    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      highlightItems(items);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
      highlightItems(items);
    } else if (e.key === "Enter" && activeIdx >= 0) {
      e.preventDefault();
      pickEmp(activeIdx);
    } else if (e.key === "Escape") {
      hideDrop();
    }
  }

  function highlightItems(items) {
    items.forEach(function (el, i) { el.classList.toggle("kbfocus", i === activeIdx); });
    if (items[activeIdx]) items[activeIdx].scrollIntoView({ block: "nearest" });
  }

  function renderDrop(q) {
    empDrop.innerHTML = "";
    dropMatches.forEach(function (e, i) {
      var item = document.createElement("div");
      item.className = "emp-item";

      var idEl = document.createElement("div");
      idEl.className = "emp-item-id";
      idEl.innerHTML = hl(e.empId, q);

      var nmEl = document.createElement("div");
      nmEl.className = "emp-item-name";
      nmEl.innerHTML = hl(e.fullName, q);

      item.appendChild(idEl);
      item.appendChild(nmEl);

      if (e.title || e.team) {
        var ttEl = document.createElement("div");
        ttEl.className = "emp-item-title";
        ttEl.textContent = [e.title, e.team].filter(Boolean).join(" · ");
        item.appendChild(ttEl);
      }

      (function (idx) {
        item.addEventListener("click", function () { pickEmp(idx); });
      }(i));

      empDrop.appendChild(item);
    });
    empDrop.classList.add("show");
  }

  function showDropMsg(msg) {
    empDrop.innerHTML = "";
    var d = document.createElement("div");
    d.className = "emp-msg";
    d.textContent = msg;
    empDrop.appendChild(d);
    empDrop.classList.add("show");
  }

  function hideDrop() {
    empDrop.classList.remove("show");
    empDrop.innerHTML = "";
  }

  function pickEmp(i) {
    var emp = dropMatches[i];
    if (!emp) return;
    selectedEmp = emp;
    empInput.value = emp.empId;
    empClear.style.display = "flex";
    resolvedName.textContent  = emp.fullName;
    resolvedTitle.textContent = emp.title || "";
    resolvedBadge.classList.add("show");
    hideDrop();
    updateSummary();
  }

  function clearEmp() {
    selectedEmp = null;
    empInput.value = "";
    empClear.style.display = "none";
    resolvedBadge.classList.remove("show");
    hideDrop();
    updateSummary();
  }

  // ── SUBFORM ROWS ──────────────────────────────────────────
  function addRow() {
    var tr = document.createElement("tr");
    tr.id  = "sfr" + (rowSeq++);

    PANTS_COLS.forEach(function (col) {
      var td = document.createElement("td");

      if (col.type === "select") {
        var sel = document.createElement("select");
        sel.dataset.key = col.key;
        col.opts.forEach(function (o) {
          var op = document.createElement("option");
          op.value = o; op.textContent = o;
          sel.appendChild(op);
        });
        sel.addEventListener("change", updateSummary);
        td.appendChild(sel);

      } else if (col.type === "qty") {
        var wrap  = document.createElement("div");
        wrap.className = "qty-wrap";
        var minus = document.createElement("button");
        minus.className = "qty-btn"; minus.type = "button"; minus.textContent = "−";
        var inp = document.createElement("input");
        inp.type = "number"; inp.min = 1; inp.max = 99; inp.value = 1;
        inp.dataset.key = col.key;
        var plus = document.createElement("button");
        plus.className = "qty-btn"; plus.type = "button"; plus.textContent = "+";

        minus.addEventListener("click", function () {
          inp.value = Math.max(1, parseInt(inp.value || 1) - 1);
          updateSummary();
        });
        plus.addEventListener("click", function () {
          inp.value = Math.min(99, parseInt(inp.value || 1) + 1);
          updateSummary();
        });
        inp.addEventListener("input", updateSummary);

        wrap.appendChild(minus); wrap.appendChild(inp); wrap.appendChild(plus);
        td.appendChild(wrap);
      }

      tr.appendChild(td);
    });

    // Delete button
    var delTd  = document.createElement("td");
    var delBtn = document.createElement("button");
    delBtn.className   = "del-btn";
    delBtn.type        = "button";
    delBtn.title       = "Remove row";
    delBtn.textContent = "✕";
    delBtn.addEventListener("click", function () { tr.remove(); updateSummary(); });
    delTd.appendChild(delBtn);
    tr.appendChild(delTd);

    sfTbody.appendChild(tr);
    updateSummary();
  }

  // ── COLLECT ROWS ──────────────────────────────────────────
  function collectRows() {
    var rows = [];
    Array.from(sfTbody.rows).forEach(function (tr) {
      var row = {};
      tr.querySelectorAll("[data-key]").forEach(function (el) {
        row[el.dataset.key] = el.type === "number"
          ? parseInt(el.value || 1)
          : el.value;
      });
      if (Object.keys(row).length) rows.push(row);
    });
    return rows;
  }

  function totalQty(rows) {
    return rows.reduce(function (s, r) { return s + (r.Quantity || 1); }, 0);
  }

  function updateSummary() {
    var n = sfTbody.rows.length;
    var q = totalQty(collectRows());
    if (n === 0) {
      subSummary.innerHTML    = "No items added";
      rowBadge.style.display  = "none";
    } else {
      subSummary.innerHTML   = "<strong>" + n + " variation" + (n > 1 ? "s" : "") +
                               "</strong> &nbsp;·&nbsp; " + q + " total item" + (q > 1 ? "s" : "");
      rowBadge.textContent   = n + " row" + (n > 1 ? "s" : "");
      rowBadge.style.display = "inline-block";
    }
  }

  // ── CONFIRM MODAL ─────────────────────────────────────────
  function openConfirm() {
    if (!selectedEmp) {
      showToast("Please select an employee first.", true); return;
    }
    var dept = document.getElementById("fDept").value;
    if (!dept) {
      showToast("Please select a department.", true); return;
    }
    var rows = collectRows();
    if (!rows.length) {
      showToast("Add at least one pants variation.", true); return;
    }

    var notes = document.getElementById("fNotes").value.trim();
    var q     = totalQty(rows);
    var lines = [];
    lines.push("Employee:   " + selectedEmp.empId + " — " + selectedEmp.fullName);
    if (selectedEmp.title) lines.push("Title:      " + selectedEmp.title);
    lines.push("Department: " + dept);
    if (notes) lines.push("Notes:      " + notes);
    lines.push("─────────────────────────────────");
    lines.push("PANTS ORDER:");
    rows.forEach(function (r, i) {
      lines.push("  " + (i + 1) + ".  " + r.Color + "  ·  " + r.Size +
                 "  ·  " + r.Style + "  ·  Cuffed: " + r.Cuffed +
                 "  ·  Qty: " + r.Quantity);
    });
    lines.push("─────────────────────────────────");
    lines.push("Total items: " + q);

    confirmBody.textContent = lines.join("\n");
    btnConfirm.textContent  = "Confirm & Submit";
    btnConfirm.disabled     = false;
    confirmBackdrop.classList.add("show");
  }

  function closeConfirm() {
    confirmBackdrop.classList.remove("show");
  }

  // ── SUBMIT ────────────────────────────────────────────────
  function doSubmit() {
    btnConfirm.textContent = "Submitting…";
    btnConfirm.disabled    = true;

    var rows  = collectRows();
    var dept  = document.getElementById("fDept").value;
    var notes = document.getElementById("fNotes").value.trim();
    var today = new Date().toLocaleDateString("en-US",
      { month:"2-digit", day:"2-digit", year:"numeric" });

    var payload = { data: {} };
    payload.data.Employee_ID  = selectedEmp.empId;
    payload.data.Full_Name    = selectedEmp.fullName;
    payload.data.Department   = dept;
    payload.data.Order_Date   = today;
    payload.data.Submitted_By = loginUser;
    payload.data.Notes        = notes;
    payload.data[SUBFORM]     = rows;   // nested subform rows

    console.log("[Uniform] Submitting payload:", JSON.stringify(payload.data));

    // Use Creator REST API v2.1 via fetch — ZOHO.CREATOR.DATA has no
    // reliable addRecord/addRecords on this SDK build. fetch works because
    // the widget is already authenticated in the same origin.
    // Build absolute URL using the widget's actual host — avoids SDK proxy routing
    var host = window.location.origin;
    // If running inside zappsusercontent iframe, derive the real host from serviceOrigin param
    var svcOrigin = new URLSearchParams(window.location.search).get("serviceOrigin");
    if (svcOrigin) { try { host = new URL(svcOrigin).origin; } catch(e) {} }
    var url = host + "/creator/v2.1/data/autoflowx/" + APP + "/form/" + FORM;
    console.log("[Uniform] POST url:", url);

    fetch(url, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    })
    .then(function(res) { return res.json(); })
    .then(function(resp) {
      closeConfirm();
      console.log("[Uniform] fetch POST response:", JSON.stringify(resp));
      if (resp && resp.code === 3000) {
        showSuccess(rows);
      } else {
        var msg = (resp && resp.message) ? resp.message : "Code " + (resp && resp.code);
        showToast("Submit failed: " + msg, true);
        btnConfirm.textContent = "Confirm & Submit";
        btnConfirm.disabled    = false;
      }
    })
    .catch(function(err) {
      closeConfirm();
      console.error("[Uniform] fetch error:", err);
      showToast("Submission error — check console.", true);
      btnConfirm.textContent = "Confirm & Submit";
      btnConfirm.disabled    = false;
    });
  }

  // ── SUCCESS / RESET ───────────────────────────────────────
  function showSuccess(rows) {
    var q = totalQty(rows);
    mainContent.style.display  = "none";
    submitBar.style.display    = "none";
    successMsg.textContent =
      "Pants order for " + selectedEmp.fullName + " (" + selectedEmp.empId + ") saved — " +
      rows.length + " variation" + (rows.length > 1 ? "s" : "") +
      ", " + q + " total item" + (q > 1 ? "s" : "") + ".";
    successScreen.classList.add("show");
  }

  function resetForm() {
    clearEmp();
    document.getElementById("fDept").value  = "";
    document.getElementById("fNotes").value = "";
    sfTbody.innerHTML = "";
    rowSeq = 0;
    addRow();
    mainContent.style.display = "block";
    submitBar.style.display   = "flex";
    successScreen.classList.remove("show");
    updateSummary();
  }

  function confirmClear() {
    if (!confirm("Clear all fields and start over?")) return;
    resetForm();
  }

  // ── HELPERS ───────────────────────────────────────────────
  function hl(str, q) {
    if (!str || !q) return esc(str || "");
    var lo  = str.toLowerCase();
    var idx = lo.indexOf(q.toLowerCase());
    if (idx < 0) return esc(str);
    return esc(str.slice(0, idx)) +
      "<mark style=\"background:#fef08a;color:inherit;border-radius:2px;\">" +
      esc(str.slice(idx, idx + q.length)) + "</mark>" +
      esc(str.slice(idx + q.length));
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function showToast(msg, isErr) {
    toast.textContent = msg;
    toast.className   = "toast" + (isErr ? " err" : "");
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove("show"); }, 3500);
  }

}());
</script>
</body>
</html>
