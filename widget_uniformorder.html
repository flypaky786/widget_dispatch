<!DOCTYPE html>
<!--
  UNIFORM ORDER WIDGET v9-FINAL
  App: lax-abg  |  Form: Uniform_Order  |  Emp: All_Employee_Info
  Subforms: Pants_Orders, Safety_Vest_Orders, Dress_Shirt_Orders, Polo_Orders,
            Tie_Orders, Scarf_Orders, Jackets, Sweaters, Headgear
  NOTE: Dress_Shirt_Orders qty field = "Number" (not Quantity)
        Jackets / Sweaters / Headgear are exact link names (no _Orders suffix)
-->
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#0f172a;--dark2:#1e293b;--mid:#334155;
  --th-bg:#f1f5f9;--th-text:#64748b;--body-bg:#f0f4f8;
  --card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --danger:#ef4444;--success:#22c55e;--info-bg:#dbeafe;--info-text:#1e40af;
  --r:8px;--rs:5px;
  --sh:0 1px 3px rgba(0,0,0,.10),0 1px 2px rgba(0,0,0,.06);
  --shm:0 4px 16px rgba(0,0,0,.13);
}
body{font-family:"DM Sans",-apple-system,sans-serif;background:var(--body-bg);color:var(--text);font-size:14px;min-height:100vh;padding-bottom:72px;}
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-title{font-size:15px;font-weight:600;}
.hdr-sub{font-size:11px;color:#94a3b8;margin-top:2px;}
.hdr-date{font-size:11px;color:#475569;}
.wrap{max-width:860px;margin:0 auto;padding:20px 16px;}
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;}
.card-hdr{background:var(--th-bg);border-bottom:1px solid var(--border);padding:9px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--th-text);display:flex;align-items:center;gap:8px;}
.card-body{padding:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
@media(max-width:600px){.g3{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:5px;}
.fl{font-size:11px;font-weight:600;color:var(--th-text);text-transform:uppercase;letter-spacing:.05em;}
.req{color:var(--danger);margin-left:2px;}
input[type=text],select,textarea{font-family:inherit;font-size:13px;color:var(--text);background:#fff;border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;width:100%;outline:none;transition:border-color .15s;}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--mid);}
select{cursor:pointer;}
.rg{display:flex;gap:16px;align-items:center;padding-top:4px;flex-wrap:wrap;}
.rg label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;}
.lw{position:relative;}
.lr{display:flex;gap:6px;}
.lr input{flex:1;}
#empClear{display:none;background:none;border:1px solid var(--border);border-radius:var(--rs);padding:0 10px;color:var(--muted);cursor:pointer;font-size:15px;align-items:center;justify-content:center;}
#empClear:hover{color:var(--danger);border-color:#fca5a5;}
.ldrop{display:none;position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shm);max-height:230px;overflow-y:auto;z-index:400;}
.ldrop.open{display:block;}
.ei{padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);}
.ei:last-child{border-bottom:none;}
.ei:hover,.ei.kb{background:var(--th-bg);}
.ei-id{font-size:13px;font-weight:500;}
.ei-nm{font-size:11px;color:var(--muted);margin-top:1px;}
.ei-ro{font-size:10px;color:#94a3b8;}
.emsg{padding:12px;text-align:center;font-size:12px;color:var(--muted);}
.res{display:none;align-items:center;gap:7px;background:var(--info-bg);border:1px solid #bfdbfe;border-radius:var(--rs);padding:7px 11px;margin-top:6px;font-size:12px;color:var(--info-text);font-weight:500;}
.res.show{display:flex;}
.ac{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:10px;overflow:hidden;}
.at{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;transition:background .1s;}
.at:hover{background:#f8fafc;}
.al{display:flex;align-items:center;gap:10px;}
.ai{width:30px;height:30px;background:var(--th-bg);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:15px;}
.an{font-size:14px;font-weight:500;}
.ar{display:flex;align-items:center;gap:8px;}
.abg{font-size:10px;font-weight:600;background:var(--info-bg);color:var(--info-text);padding:2px 9px;border-radius:12px;display:none;}
.abg.show{display:inline-block;}
.achv{font-size:11px;color:var(--muted);transition:transform .2s;display:inline-block;}
.achv.open{transform:rotate(90deg);}
.ab{display:none;border-top:1px solid var(--border);}
.ab.open{display:block;}
.tw{overflow-x:auto;}
table.sf{width:100%;border-collapse:collapse;font-size:13px;min-width:420px;}
table.sf th{background:var(--th-bg);color:var(--th-text);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap;}
table.sf td{padding:6px 8px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
table.sf tr:last-child td{border-bottom:none;}
table.sf tbody tr:hover td{background:#fafbfc;}
table.sf select{font-size:12px;padding:5px 7px;}
table.sf input[type=number]{width:56px;font-size:12px;padding:5px 6px;text-align:center;border:1px solid var(--border);border-radius:var(--rs);font-family:inherit;outline:none;}
.qw{display:flex;align-items:center;gap:3px;}
.qb{width:24px;height:24px;border:1px solid var(--border);background:var(--th-bg);border-radius:4px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.qb:hover{background:#e2e8f0;color:var(--text);}
.db{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:16px;padding:3px 6px;border-radius:4px;}
.db:hover{color:var(--danger);background:#fef2f2;}
.arb{width:100%;padding:9px;background:none;border:none;border-top:1px dashed var(--border);font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;text-align:center;}
.arb:hover{background:#f8fafc;color:var(--dark);}
.sbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:200;box-shadow:0 -2px 8px rgba(0,0,0,.07);}
#sumEl{font-size:12px;color:var(--muted);}
#sumEl strong{color:var(--text);}
.br{display:flex;gap:8px;}
.btn{font-family:inherit;font-size:13px;font-weight:500;border-radius:var(--r);padding:9px 22px;cursor:pointer;border:none;}
.bp{background:var(--dark);color:#fff;}
.bp:hover{background:var(--dark2);}
.bp:disabled{background:#94a3b8;cursor:not-allowed;}
.bg{background:none;color:var(--muted);border:1px solid var(--border);}
.bg:hover{background:var(--th-bg);}
.bkd{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);backdrop-filter:blur(3px);z-index:500;align-items:center;justify-content:center;}
.bkd.show{display:flex;}
.modal{background:#fff;border-radius:12px;padding:26px;max-width:500px;width:92%;box-shadow:var(--shm);animation:pi .16s ease;}
@keyframes pi{from{transform:scale(.93);opacity:0;}to{transform:scale(1);opacity:1;}}
.mt{font-size:16px;font-weight:600;margin-bottom:6px;}
.ms{font-size:13px;color:var(--muted);margin-bottom:14px;}
.mb{font-size:12px;line-height:1.9;white-space:pre-wrap;background:var(--th-bg);border-radius:var(--rs);padding:12px 14px;margin-bottom:18px;max-height:260px;overflow-y:auto;}
.ma{display:flex;gap:10px;justify-content:flex-end;}
.ss{display:none;text-align:center;padding:60px 20px;max-width:500px;margin:0 auto;}
.ss.show{display:block;}
.si{font-size:46px;margin-bottom:14px;}
.st{font-size:19px;font-weight:600;margin-bottom:8px;}
.sb{color:var(--muted);font-size:13px;margin-bottom:24px;line-height:1.6;}
#eb{display:none;position:fixed;top:0;left:0;right:0;z-index:600;background:#fef2f2;border-bottom:2px solid #fca5a5;padding:10px 20px;align-items:center;justify-content:space-between;gap:12px;}
#eb.show{display:flex;}
#ebm{font-size:13px;color:#991b1b;font-weight:500;}
#ebc{background:none;border:none;color:#991b1b;cursor:pointer;font-size:16px;padding:2px 8px;border-radius:4px;}
#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;z-index:999;pointer-events:none;white-space:nowrap;}
#toast.err{background:var(--danger);}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">Uniform Order Request</div>
    <div class="hdr-sub" id="hSub">Loading&#8230;</div>
  </div>
  <div class="hdr-date" id="hDate"></div>
</div>

<div id="eb">
  <div style="display:flex;align-items:center;gap:8px;">
    <span>&#9888;</span><span id="ebm"></span>
  </div>
  <button id="ebc">&#x2715;</button>
</div>

<div class="wrap" id="mainWrap">
  <div class="card">
    <div class="card-hdr">&#128100; Employee Information</div>
    <div class="card-body">
      <div class="g3">
        <div class="fg">
          <div class="fl">Employee ID <span class="req">*</span></div>
          <div class="lw" id="lw">
            <div class="lr">
              <input type="text" id="empInput" placeholder="Type ID, first or last name&#8230;" autocomplete="off"/>
              <button id="empClear" title="Clear">&#x2715;</button>
            </div>
            <div class="ldrop" id="ldrop"></div>
            <div class="res" id="res">
              <span>&#10003;</span>
              <span id="resName" style="font-weight:600;"></span>
              <span id="resRole" style="font-size:11px;opacity:.75;margin-left:4px;"></span>
            </div>
          </div>
        </div>
        <div class="fg">
          <div class="fl">Department <span class="req">*</span></div>
          <select id="fDept">
            <option value="">&#8212; Select &#8212;</option>
            <option>Valet</option><option>Dispatch</option>
            <option>Operations</option><option>Management</option><option>Other</option>
          </select>
        </div>
        <div class="fg">
          <div class="fl">Notes</div>
          <input type="text" id="fNotes" placeholder="Special instructions&#8230;"/>
        </div>
        <div class="fg">
          <div class="fl">Employment Type <span class="req">*</span></div>
          <div class="rg">
            <label><input type="radio" name="fpt" value="Full Time"/> Full Time</label>
            <label><input type="radio" name="fpt" value="Part Time"/> Part Time</label>
          </div>
        </div>
        <div class="fg">
          <div class="fl">Gender <span class="req">*</span></div>
          <div class="rg">
            <label><input type="radio" name="gender" value="Male"/> Male</label>
            <label><input type="radio" name="gender" value="Female"/> Female</label>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="accs"></div>
</div>

<div class="ss" id="ss">
  <div class="si">&#9989;</div>
  <div class="st">Order Submitted!</div>
  <div class="sb" id="ssMsg"></div>
  <button class="btn bg" id="btnNew">Submit Another Order</button>
</div>

<div class="sbar" id="sbar">
  <div id="sumEl">No items added</div>
  <div class="br">
    <button class="btn bg" id="btnClear">Clear</button>
    <button class="btn bp" id="btnSub">Submit Order</button>
  </div>
</div>

<div class="bkd" id="bkd">
  <div class="modal">
    <div class="mt">Confirm Order</div>
    <div class="ms">Review before submitting:</div>
    <div class="mb" id="mbody"></div>
    <div class="ma">
      <button class="btn bg" id="btnBack">Back</button>
      <button class="btn bp" id="btnConf">Confirm &amp; Submit</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var APP     = "lax-abg";
var FORM    = "Uniform_Order";
var EMP_RPT = "All_Employee_Info";

var SECS = [
  { key:"Pants_Orders",       lbl:"Pants",        icon:"👖",
    cols:[{k:"Color",t:"s",o:["Black","Blue","Gray"]},
          {k:"Size",t:"s",o:["XS","S","M","L","XL","2XL","3XL"]},
          {k:"Style",t:"s",o:["Cargo","Chino","Dress Pants"]},
          {k:"Cuffed",t:"s",o:["No","Yes"]},
          {k:"Quantity",t:"q"}]},
  { key:"Safety_Vest_Orders", lbl:"Safety Vest",  icon:"🦺",
    cols:[{k:"Color",t:"s",o:["Yellow","Orange","Blue","Black","Purple"]},
          {k:"Size",t:"s",o:["XS","S","M","L","XL","2XL","3XL"]},
          {k:"Quantity",t:"q"}]},
  { key:"Dress_Shirt_Orders", lbl:"Dress Shirt",  icon:"👔",
    cols:[{k:"Color",t:"s",o:["White","Red","Blue","Black"]},
          {k:"Size",t:"s",o:["XS","S","M","L","XL","2XL","3XL"]},
          {k:"Sleeves",t:"s",o:["Full Sleeves","Half Sleeves"]},
          {k:"Number",t:"q"}]},
  { key:"Polo_Orders",        lbl:"Polo",          icon:"👕",
    cols:[{k:"Color",t:"s",o:["White","Red","Blue","Black","Gray"]},
          {k:"Size",t:"s",o:["XS","S","M","L","XL","2XL","3XL"]},
          {k:"Sleeves",t:"s",o:["Full Sleeves","Half Sleeves"]},
          {k:"Quantity",t:"q"}]},
  { key:"Tie_Orders",         lbl:"Tie",           icon:"🎀",
    cols:[{k:"Color",t:"s",o:["Blue","Red"]},
          {k:"Quantity",t:"q"}]},
  { key:"Scarf_Orders",       lbl:"Scarf",         icon:"🧣",
    cols:[{k:"Color",t:"s",o:["Blue","Red","Orange"]},
          {k:"Quantity",t:"q"}]},
  { key:"Jackets",            lbl:"Jacket",        icon:"🧥",
    cols:[{k:"Color",t:"s",o:["Red","Blue","Gray","Black"]},
          {k:"Size",t:"s",o:["XS","S","M","L","XL","2XL","3XL"]},
          {k:"Style",t:"s",o:["3 Layered","Fleece","Bomber","Regular"]},
          {k:"Quantity",t:"q"}]},
  { key:"Sweaters",           lbl:"Sweater",       icon:"🧶",
    cols:[{k:"Color",t:"s",o:["Red","Blue","Gray","Black"]},
          {k:"Size",t:"s",o:["XS","S","M","L","XL","2XL","3XL"]},
          {k:"Style",t:"s",o:["Fleece","Pullover","V-Neck","Front Buttoned","Front Zip","Cardigan"]},
          {k:"Sleeves",t:"s",o:["Full Sleeves","Half Sleeves"]},
          {k:"Quantity",t:"q"}]},
  { key:"Headgear",           lbl:"Headgear",      icon:"🧢",
    cols:[{k:"Style",t:"s",o:["Baseball Hat","Beanie"]},
          {k:"Quantity",t:"q"}]}
];

var loginUser   = "";
var empCache    = [];
var dropMatches = [];
var selectedEmp = null;
var activeIdx   = -1;
var rowSeqs     = {};
var ttTimer     = null;

console.log("[Uniform] *** VERSION v9-FINAL-9sections ***");

document.getElementById("hDate").textContent =
  new Date().toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"});

buildAccordions();

document.getElementById("empInput").addEventListener("input",   function(){ onEmpInput(this.value); });
document.getElementById("empInput").addEventListener("focus",   function(){ if(this.value.trim()&&!selectedEmp) onEmpInput(this.value); });
document.getElementById("empInput").addEventListener("keydown", function(e){ onEmpKey(e); });
document.getElementById("empClear").addEventListener("click",   clearEmp);
document.getElementById("btnSub").addEventListener("click",     openConfirm);
document.getElementById("btnClear").addEventListener("click",   function(){ if(confirm("Clear all fields?")) resetForm(); });
document.getElementById("btnBack").addEventListener("click",    closeConfirm);
document.getElementById("btnConf").addEventListener("click",    doSubmit);
document.getElementById("btnNew").addEventListener("click",     resetForm);
document.getElementById("ebc").addEventListener("click",        function(){ document.getElementById("eb").classList.remove("show"); });
document.addEventListener("keydown", function(e){ if(e.key==="Escape") closeConfirm(); });
document.addEventListener("click",   function(e){ if(!document.getElementById("lw").contains(e.target)) closeDrop(); });

ZOHO.CREATOR.UTIL.getInitParams().then(function(p){
  loginUser = p.loginUser || "";
  var u = loginUser ? loginUser.split("@")[0] : "";
  document.getElementById("hSub").textContent = u ? "Submitting as: " + u : "Uniform Order Form";
  loadEmployees();
}).catch(function(){
  document.getElementById("hSub").textContent = "Uniform Order Form";
  loadEmployees();
});

function buildAccordions() {
  var container = document.getElementById("accs");
  SECS.forEach(function(sec) {
    rowSeqs[sec.key] = 0;
    var card = document.createElement("div"); card.className = "ac";

    var tog = document.createElement("div"); tog.className = "at";
    var al = document.createElement("div"); al.className = "al";
    var ai = document.createElement("div"); ai.className = "ai"; ai.textContent = sec.icon;
    var an = document.createElement("span"); an.className = "an"; an.textContent = sec.lbl;
    al.appendChild(ai); al.appendChild(an);
    var ar = document.createElement("div"); ar.className = "ar";
    var badge = document.createElement("span"); badge.className = "abg"; badge.id = "badge-" + sec.key;
    var chev  = document.createElement("span"); chev.className  = "achv"; chev.id  = "chev-"  + sec.key; chev.textContent = "▶";
    ar.appendChild(badge); ar.appendChild(chev);
    tog.appendChild(al); tog.appendChild(ar);
    (function(s){ tog.addEventListener("click", function(){ toggleAcc(s); }); })(sec);
    card.appendChild(tog);

    var body = document.createElement("div"); body.className = "ab"; body.id = "ab-" + sec.key;
    var tw   = document.createElement("div"); tw.className = "tw";
    var tbl  = document.createElement("table"); tbl.className = "sf";
    var thead = document.createElement("thead"); var htr = document.createElement("tr");
    sec.cols.forEach(function(col){
      var th = document.createElement("th");
      th.textContent = col.t === "q" ? "Qty" : col.k;
      htr.appendChild(th);
    });
    htr.appendChild(document.createElement("th"));
    thead.appendChild(htr); tbl.appendChild(thead); tbl.appendChild(document.createElement("tbody"));
    tw.appendChild(tbl);
    var arb = document.createElement("button"); arb.className = "arb";
    arb.textContent = "+ Add " + sec.lbl.toLowerCase() + " variation";
    (function(s){ arb.addEventListener("click", function(){ addRow(s); }); })(sec);
    body.appendChild(tw); body.appendChild(arb);
    card.appendChild(body);
    container.appendChild(card);
  });
}

function toggleAcc(sec) {
  var body = document.getElementById("ab-" + sec.key);
  var chev = document.getElementById("chev-" + sec.key);
  var open = body.classList.contains("open");
  if (!open && !body.querySelector("tbody").rows.length) addRow(sec);
  body.classList.toggle("open", !open);
  chev.classList.toggle("open", !open);
  updateSum();
}

function loadEmployees() {
  ZOHO.CREATOR.DATA.getRecords({
    app_name: APP, report_name: EMP_RPT, page: 1, max_records: 1000
  }).then(function(resp){
    if (resp && resp.code===3000 && resp.data && resp.data.length) {
      empCache = [];
      for (var i=0; i<resp.data.length; i++) {
        var r=resp.data[i];
        var fn=(r.First_Name||"").trim(), ln=(r.Last_Name||"").trim();
        var full=(r.Full_Name||"").trim()||(ln&&fn ? ln+", "+fn : ln||fn);
        var eid=(r.Employee_ID||"").trim();
        if (eid) empCache.push({zohoId:r.ID,empId:eid,fullName:full,firstName:fn,lastName:ln,title:(r.Title||"").trim(),team:(r.Team||"").trim()});
      }
      empCache.sort(function(a,b){ return a.empId.localeCompare(b.empId); });
      console.log("[Uniform] Employees loaded:", empCache.length);
    } else {
      console.warn("[Uniform] Employee load issue:", resp&&resp.code, resp&&resp.message);
    }
  }).catch(function(err){ console.error("[Uniform] loadEmployees error:", err); });
}

function onEmpInput(val) {
  val=val.trim(); selectedEmp=null; activeIdx=-1;
  document.getElementById("empClear").style.display = val ? "flex" : "none";
  document.getElementById("res").classList.remove("show");
  if (!val) { closeDrop(); updateSum(); return; }
  if (!empCache.length) { showDropMsg("Loading employees..."); return; }
  var q=val.toLowerCase(); dropMatches=[];
  for (var i=0; i<empCache.length; i++) {
    var e=empCache[i];
    if (e.empId.toLowerCase().indexOf(q)>-1||e.firstName.toLowerCase().indexOf(q)>-1||
        e.lastName.toLowerCase().indexOf(q)>-1||e.fullName.toLowerCase().indexOf(q)>-1) {
      dropMatches.push(e); if(dropMatches.length>=10) break;
    }
  }
  if (!dropMatches.length) { showDropMsg("No employees found"); return; }
  renderDrop(q); updateSum();
}

function onEmpKey(e) {
  var items = document.getElementById("ldrop").querySelectorAll(".ei");
  if (!items.length) return;
  if (e.key==="ArrowDown"){ e.preventDefault(); activeIdx=Math.min(activeIdx+1,items.length-1); hlItems(items); }
  else if (e.key==="ArrowUp"){ e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); hlItems(items); }
  else if (e.key==="Enter"&&activeIdx>=0){ e.preventDefault(); pickEmp(activeIdx); }
  else if (e.key==="Escape") closeDrop();
}
function hlItems(items){ items.forEach(function(el,i){ el.classList.toggle("kb",i===activeIdx); }); if(items[activeIdx]) items[activeIdx].scrollIntoView({block:"nearest"}); }

function renderDrop(q) {
  var drop=document.getElementById("ldrop"); drop.innerHTML="";
  for (var i=0; i<dropMatches.length; i++) {
    var e=dropMatches[i];
    var div=document.createElement("div"); div.className="ei";
    var id=document.createElement("div"); id.className="ei-id"; id.innerHTML=hlTxt(e.empId,q);
    var nm=document.createElement("div"); nm.className="ei-nm"; nm.innerHTML=hlTxt(e.fullName,q);
    div.appendChild(id); div.appendChild(nm);
    if (e.title||e.team) {
      var ro=document.createElement("div"); ro.className="ei-ro";
      ro.textContent=[e.title,e.team].filter(Boolean).join(" · ");
      div.appendChild(ro);
    }
    (function(idx){ div.addEventListener("click",function(){ pickEmp(idx); }); })(i);
    drop.appendChild(div);
  }
  drop.classList.add("open");
}
function showDropMsg(msg){ var d=document.getElementById("ldrop"); d.innerHTML=""; var el=document.createElement("div"); el.className="emsg"; el.textContent=msg; d.appendChild(el); d.classList.add("open"); }
function closeDrop(){ var d=document.getElementById("ldrop"); d.classList.remove("open"); d.innerHTML=""; }
function pickEmp(i) {
  var emp=dropMatches[i]; if(!emp) return;
  selectedEmp=emp;
  document.getElementById("empInput").value=emp.empId;
  document.getElementById("empClear").style.display="flex";
  document.getElementById("resName").textContent=emp.fullName;
  document.getElementById("resRole").textContent=emp.title||"";
  document.getElementById("res").classList.add("show");
  closeDrop(); updateSum();
}
function clearEmp() {
  selectedEmp=null; document.getElementById("empInput").value="";
  document.getElementById("empClear").style.display="none";
  document.getElementById("res").classList.remove("show");
  closeDrop(); updateSum();
}

function addRow(sec) {
  var tbody=document.getElementById("ab-"+sec.key).querySelector("tbody");
  var tr=document.createElement("tr"); tr.id="r-"+sec.key+"-"+(rowSeqs[sec.key]++);
  sec.cols.forEach(function(col){
    var td=document.createElement("td");
    if (col.t==="s") {
      var sel=document.createElement("select"); sel.dataset.key=col.k;
      col.o.forEach(function(o){ var op=document.createElement("option"); op.value=o; op.textContent=o; sel.appendChild(op); });
      sel.addEventListener("change",updateSum); td.appendChild(sel);
    } else {
      var wrap=document.createElement("div"); wrap.className="qw";
      var minus=document.createElement("button"); minus.className="qb"; minus.type="button"; minus.textContent="−";
      var inp=document.createElement("input"); inp.type="number"; inp.min=1; inp.max=99; inp.value=1; inp.dataset.key=col.k;
      var plus=document.createElement("button"); plus.className="qb"; plus.type="button"; plus.textContent="+";
      minus.addEventListener("click",function(){ inp.value=Math.max(1,parseInt(inp.value||1)-1); updateSum(); });
      plus.addEventListener("click",function(){ inp.value=Math.min(99,parseInt(inp.value||1)+1); updateSum(); });
      inp.addEventListener("input",updateSum);
      wrap.appendChild(minus); wrap.appendChild(inp); wrap.appendChild(plus); td.appendChild(wrap);
    }
    tr.appendChild(td);
  });
  var dtd=document.createElement("td");
  var db=document.createElement("button"); db.className="db"; db.type="button"; db.textContent="✕";
  db.addEventListener("click",function(){ tr.remove(); updateSum(); refreshBadge(sec); });
  dtd.appendChild(db); tr.appendChild(dtd); tbody.appendChild(tr);
  updateSum(); refreshBadge(sec);
}

function refreshBadge(sec) {
  var n=document.getElementById("ab-"+sec.key).querySelector("tbody").rows.length;
  var b=document.getElementById("badge-"+sec.key);
  b.textContent=n ? n+" row"+(n>1?"s":"") : ""; b.classList.toggle("show",n>0);
}

function collectAll() {
  var sf={}, totalItems=0, totalRows=0;
  SECS.forEach(function(sec){
    var rows=[], trs=document.getElementById("ab-"+sec.key).querySelector("tbody").rows;
    for (var i=0; i<trs.length; i++) {
      var row={}; trs[i].querySelectorAll("[data-key]").forEach(function(el){ row[el.dataset.key]=el.type==="number"?parseInt(el.value||1):el.value; });
      if (Object.keys(row).length){ rows.push(row); totalRows++; }
      totalItems+=(row.Quantity||row.Number||1);
    }
    if (rows.length) sf[sec.key]=rows;
  });
  return {sf:sf,totalItems:totalItems,totalRows:totalRows};
}

function updateSum() {
  var d=collectAll(); var el=document.getElementById("sumEl");
  if (!d.totalRows) { el.innerHTML="No items added"; return; }
  var cats=Object.keys(d.sf).map(function(k){ var s=SECS.find(function(x){ return x.key===k; }); return s?s.lbl:k; });
  el.innerHTML="<strong>"+d.totalItems+" item"+(d.totalItems!==1?"s":"")+"</strong> &nbsp;&middot;&nbsp; "+cats.join(", ");
}

function openConfirm() {
  if (!selectedEmp){ toast("Select an employee first.",true); return; }
  if (!document.getElementById("fDept").value){ toast("Select a department.",true); return; }
  var fpt=document.querySelector("input[name=fpt]:checked");
  if (!fpt){ toast("Select Full Time or Part Time.",true); return; }
  var gen=document.querySelector("input[name=gender]:checked");
  if (!gen){ toast("Select a gender.",true); return; }
  var d=collectAll(); if (!d.totalRows){ toast("Add at least one item.",true); return; }

  var dept=document.getElementById("fDept").value;
  var notes=document.getElementById("fNotes").value.trim();
  var lines=[];
  lines.push("Employee:   "+selectedEmp.empId+" \u2014 "+selectedEmp.fullName);
  if (selectedEmp.title) lines.push("Title:      "+selectedEmp.title);
  lines.push("Department: "+dept);
  lines.push("Type:       "+fpt.value+"  |  Gender: "+gen.value);
  if (notes) lines.push("Notes:      "+notes);
  lines.push("\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500");
  SECS.forEach(function(sec){
    var rows=d.sf[sec.key]; if(!rows||!rows.length) return;
    lines.push(sec.icon+" "+sec.lbl+":");
    rows.forEach(function(r,i){ lines.push("  "+(i+1)+".  "+Object.values(r).join("  \u00b7  ")); });
  });
  lines.push("\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500");
  lines.push("Total: "+d.totalItems+" item"+(d.totalItems!==1?"s":""));

  document.getElementById("mbody").textContent=lines.join("\n");
  document.getElementById("btnConf").textContent="Confirm & Submit";
  document.getElementById("btnConf").disabled=false;
  document.getElementById("bkd").classList.add("show");
}
function closeConfirm(){ document.getElementById("bkd").classList.remove("show"); }

function doSubmit() {
  var btn=document.getElementById("btnConf");
  btn.textContent="Submitting\u2026"; btn.disabled=true;
  var fpt=document.querySelector("input[name=fpt]:checked");
  var gen=document.querySelector("input[name=gender]:checked");
  var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var now=new Date();
  var today=String(now.getDate()).padStart(2,"0")+"-"+months[now.getMonth()]+"-"+now.getFullYear();
  var d=collectAll();
  var rec={
    Employee_ID:       selectedEmp.zohoId,
    Department:        document.getElementById("fDept").value,
    Full_or_Part_Time: fpt.value,
    Gender:            gen.value,
    Order_Date:        today,
    Submitted_By:      loginUser,
    Notes:             document.getElementById("fNotes").value.trim()
  };
  Object.keys(d.sf).forEach(function(k){ rec[k]=d.sf[k]; });
  delete rec.Full_Name;
  console.log("[Uniform] Submitting:", JSON.stringify({data:[rec]}));
  ZOHO.CREATOR.DATA.addRecords({
    app_name: APP, form_name: FORM, payload: {data:[rec]}
  }).then(function(resp){
    closeConfirm();
    console.log("[Uniform] Response:", JSON.stringify(resp));
    if (resp && resp.code===3000) {
      if (resp.result && resp.result.length && resp.result[0].code!==3000) {
        var errs=resp.result[0].error;
        var msg=typeof errs==="object" ? JSON.stringify(errs) : String(errs);
        showErrBanner(msg); toast("Zoho error: "+msg,true);
        btn.textContent="Confirm & Submit"; btn.disabled=false;
      } else { showSuccess(d); }
    } else {
      var msg=(resp&&resp.message)?resp.message:"Code "+(resp&&resp.code);
      showErrBanner(msg); toast("Submit failed: "+msg,true);
      btn.textContent="Confirm & Submit"; btn.disabled=false;
    }
  }).catch(function(err){
    closeConfirm(); console.error("[Uniform] Error:",err);
    toast("Submission error \u2014 check console.",true);
    btn.textContent="Confirm & Submit"; btn.disabled=false;
  });
}

function showSuccess(d) {
  document.getElementById("mainWrap").style.display="none";
  document.getElementById("sbar").style.display="none";
  document.getElementById("ssMsg").textContent=
    "Order for "+selectedEmp.fullName+" ("+selectedEmp.empId+") saved \u2014 "+
    d.totalItems+" item"+(d.totalItems!==1?"s":"")+" across "+
    Object.keys(d.sf).length+" categor"+(Object.keys(d.sf).length===1?"y":"ies")+".";
  document.getElementById("ss").classList.add("show");
}

function resetForm() {
  clearEmp();
  document.getElementById("fDept").value="";
  document.getElementById("fNotes").value="";
  document.querySelectorAll("input[name=fpt],input[name=gender]").forEach(function(r){ r.checked=false; });
  SECS.forEach(function(sec){
    document.getElementById("ab-"+sec.key).querySelector("tbody").innerHTML="";
    rowSeqs[sec.key]=0;
    document.getElementById("ab-"+sec.key).classList.remove("open");
    document.getElementById("chev-"+sec.key).classList.remove("open");
    refreshBadge(sec);
  });
  document.getElementById("mainWrap").style.display="block";
  document.getElementById("sbar").style.display="flex";
  document.getElementById("ss").classList.remove("show");
  updateSum();
}

function hlTxt(str,q) {
  if(!str||!q) return escH(str||"");
  var lo=str.toLowerCase(); var idx=lo.indexOf(q.toLowerCase());
  if(idx<0) return escH(str);
  return escH(str.slice(0,idx))+'<mark style="background:#fef08a;color:inherit;border-radius:2px;">'+
         escH(str.slice(idx,idx+q.length))+"</mark>"+escH(str.slice(idx+q.length));
}
function escH(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function showErrBanner(msg){ document.getElementById("ebm").textContent=msg; document.getElementById("eb").classList.add("show"); setTimeout(function(){ document.getElementById("eb").classList.remove("show"); },8000); }
function toast(msg,isErr){ var el=document.getElementById("toast"); el.textContent=msg; el.className="toast"+(isErr?" err":""); el.classList.add("show"); clearTimeout(ttTimer); ttTimer=setTimeout(function(){ el.classList.remove("show"); },3500); }
</script>
</body>
</html>
