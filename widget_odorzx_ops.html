<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Jobs Summary</title>
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <style>
    :root {
      --col-header: #3a4a5c;
      --col-accent: #2e6da4;
      --col-foot:   #e8ecf2;
      --col-border: #dde3ec;
      --col-alt:    #f7f9fc;
      --col-muted:  #8a9bb0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #f0f3f8;
      color: #1e2a38;
      padding: 14px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: auto;
    }
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      background: #fff;
      padding: 10px 14px;
      border-radius: 7px;
      margin-bottom: 12px;
      border: 1px solid var(--col-border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .fg { display: flex; flex-direction: column; gap: 3px; }
    .fg label {
      font-size: 10px;
      font-weight: 700;
      color: var(--col-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .fg select, .fg input[type=date] {
      border: 1px solid var(--col-border);
      border-radius: 5px;
      padding: 5px 9px;
      font-size: 13px;
      color: #1e2a38;
      background: #fff;
      height: 31px;
    }
    .fg select { min-width: 160px; }
    .fg input[type=date] { min-width: 138px; }
    .fg select:focus, .fg input[type=date]:focus {
      outline: none;
      border-color: var(--col-accent);
      box-shadow: 0 0 0 2px rgba(46,109,164,.18);
    }
    .btn-refresh {
      padding: 0 16px;
      height: 31px;
      background: var(--col-accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 17px;
      transition: background .15s;
    }
    .btn-refresh:hover { background: #245a8e; }
    .sub-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    .sub-header h2 { font-size: 13px; font-weight: 700; color: #2d3d4f; }
    .rec-count { font-size: 11px; color: var(--col-muted); }
    .table-wrap {
      background: #fff;
      border-radius: 7px;
      border: 1px solid var(--col-border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      overflow: visible;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--col-header); }
    thead th {
      padding: 9px 13px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .4px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    thead th:first-child { text-align: left; }
    thead th:not(:first-child) { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--col-border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--col-alt); }
    tbody tr:hover { background: #edf3fa; }
    tbody td { padding: 8px 13px; }
    tbody td:first-child { font-weight: 600; }
    tbody td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    tfoot tr { background: var(--col-foot); border-top: 2px solid #c8d1de; }
    tfoot td { padding: 9px 13px; font-weight: 700; }
    tfoot td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    /* expandable rows */
    tr.site-row { cursor: pointer; }
    tr.site-row td:first-child::before {
      content: "\25B6\00A0";
      font-size: 9px;
      color: var(--col-muted);
      display: inline-block;
      transition: transform .15s;
    }
    tr.site-row.open td:first-child::before { transform: rotate(90deg); }
    tr.detail-row { display: none; }
    tr.detail-row.visible { display: table-row; }
    tr.role-row { cursor: pointer; }
    tr.role-row td { padding: 5px 13px 5px 26px; font-size: 12px; background: #eef2f8; font-weight: 600; }
    tr.role-row td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    tr.role-row td:first-child::before {
      content: "\25B6\00A0";
      font-size: 9px;
      color: var(--col-muted);
      display: inline-block;
      transition: transform .15s;
    }
    tr.role-row.open td:first-child::before { transform: rotate(90deg); }
    tr.user-row td { padding: 4px 13px 4px 42px; font-size: 12px; background: #f4f7fb; font-weight: 400; }
    tr.user-row td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    .zero { color: var(--col-muted); font-weight: 400; }
    .status-box { padding: 32px 20px; text-align: center; color: var(--col-muted); font-size: 13px; }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid var(--col-border);
      border-top-color: var(--col-accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-box {
      margin: 10px; padding: 10px 14px;
      background: #fdecea; border: 1px solid #f5c6c2;
      border-radius: 5px; color: #912b23; font-size: 12px;
      display: none; word-break: break-all;
    }
    .empty-box { padding: 28px; text-align: center; color: var(--col-muted); font-size: 13px; display: none; }
  </style>
</head>
<body>

<div class="filter-bar">
  <div class="fg">
    <label>Date</label>
    <input type="date" id="filterDate">
  </div>
  <div class="fg">
    <label>Site</label>
    <select id="filterSite">
      <option value="">All Sites</option>
      <option>ABQ-ABG</option><option>Anaheim-SIXT</option><option>ATL-ABG</option>
      <option>AUS-ABG</option><option>AUS-FOX</option><option>Beverly-SIXT</option>
      <option>BOS-ABG</option><option>BOS-SIXT</option><option>BOS-SIXT-Local-562</option>
      <option>BOS-SIXT-Local-647</option><option>BUR-ABG</option><option>CMH-ABG</option>
      <option>DAL-ABG</option><option>DFW-ABG</option><option>DTLA-LYF</option>
      <option>DTLA-SIXT</option><option>DTW-ABG</option><option>FAT-ABG</option>
      <option>GRR-ABG</option><option>Huntington-SIXT</option><option>IAH-ABG</option>
      <option>LAS-ABG</option><option>LAS-Budget</option><option>LAS-SIXT</option>
      <option>LAX-ABG</option><option>LAX-ABG-CONRAC</option><option>LAX-SIXT</option>
      <option>LGB-ABG</option><option>LGB-SIXT</option><option>MAF-ABG</option>
      <option>MCI-ABG</option><option>MCO-SIXT</option><option>MDW-ABG</option>
      <option>MKE-ABG</option><option>MONROVIA-LYF</option><option>MSP-ABG</option>
      <option>MSP-SIXT</option><option>MSY-ABG</option><option>MSY-LocalMkt</option>
      <option>NewportB-SIXT</option><option>ONT-ABG</option><option>ORD-ABG</option>
      <option>Pasadena-SIXT</option><option>PHX-SIXT</option><option>PSP-ABG</option>
      <option>RDU-ABG</option><option>Redondo-SIXT</option><option>SaMo-SIXT</option>
      <option>SAN-ABG</option><option>SAN-LYF</option><option>SAN-PAY</option>
      <option>SAN-SIXT</option><option>SAT-ABG</option><option>SAT-FOX</option>
      <option>SBA-ABG</option><option>SFO-ABG</option><option>SJC-ABG</option>
      <option>SNA-ABG</option><option>SNA-SIXT</option><option>STL-ABG</option>
      <option>StudioC-SIXT</option><option>Venice-SIXT</option><option>WeHo-SIXT</option>
      <option>Z:ATL-RESLA-CAMPCREEK</option><option>Z:DFW-RESLA-BELTLINE</option>
      <option>Z:DFW-RESLA-FIELD</option><option>Z:DFW-RESLA-LAMAR</option>
      <option>Z:HOU-RESLA-WESTHEIMER</option><option>Z:MCI-RESLA-TIFFANYSPR</option>
      <option>Z:STL-RESLA-FORESTPARK</option><option>Z:STL-RESLA-MCBRIDE</option>
      <option>Z:STL-RESLA-SCOUNTY</option>
    </select>
  </div>
  <div class="fg">
    <label>Role</label>
    <select id="filterRole">
      <option value="">All Roles</option>
      <option>Avis First</option><option>Bus (Cleaning)</option>
      <option>Car Seat Cleaning</option><option>Driver</option>
      <option>EV Charging</option><option>Full Detail</option>
      <option>Lot Coord/Security</option><option>PDI (License Plates)</option>
      <option>PDI (Unwrap)</option><option>Quick Flip</option><option>VSA</option>
    </select>
  </div>
  <button class="btn-refresh" id="btnRefresh">&#8635; Refresh</button>
</div>

<div class="sub-header">
  <h2 id="reportTitle">Daily Jobs Summary</h2>
  <span class="rec-count" id="recCount"></span>
</div>

<div class="table-wrap">
  <div id="loadBox" class="status-box"><span class="spinner"></span> Loading…</div>
  <div id="errBox" class="err-box"></div>
  <div id="emptyBox" class="empty-box">No jobs found for this date.</div>
  <table id="mainTable" style="display:none;">
    <thead>
      <tr>
        <th>Site / Role / Employee</th>
        <th>Started</th>
        <th>Completed</th>
        <th>Car Seats</th>
      </tr>
    </thead>
    <tbody id="tBody"></tbody>
    <tfoot id="tFoot"></tfoot>
  </table>
</div>

<script>
var APP_NAME   = "autoflowx";
var PUBLIC_KEY  = "3gh8F1ZU5Snh9gURfR5ZTU6Ty"; /* Custom API → Summary → Public Key */
var _loading   = false;
var _data      = null; /* cached full result from Deluge */

function pad(n) { return n < 10 ? "0" + n : "" + n; }
function todayStr() {
  var d = new Date();
  return d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
}
function toZohoDate(ymd) {
  /* YYYY-MM-DD -> MM/DD/YYYY for Deluge */
  var p = ymd.split("-");
  return p[1] + "/" + p[2] + "/" + p[0];
}
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showLoading() {
  document.getElementById("loadBox").style.display   = "block";
  document.getElementById("errBox").style.display    = "none";
  document.getElementById("emptyBox").style.display  = "none";
  document.getElementById("mainTable").style.display = "none";
}
function showTable(hasRows) {
  document.getElementById("loadBox").style.display   = "none";
  document.getElementById("errBox").style.display    = "none";
  document.getElementById("emptyBox").style.display  = hasRows ? "none"  : "block";
  document.getElementById("mainTable").style.display = hasRows ? "table" : "none";
}
function showError(msg) {
  document.getElementById("loadBox").style.display   = "none";
  document.getElementById("mainTable").style.display = "none";
  document.getElementById("emptyBox").style.display  = "none";
  var b = document.getElementById("errBox");
  b.style.display = "block";
  b.textContent   = "Error: " + msg;
}

/* ── Render from cached _data applying client-side site/role filter ── */
function render() {
  if (!_data || !_data.sites) { showTable(false); return; }

  var selSite = document.getElementById("filterSite").value;
  var selRole = document.getElementById("filterRole").value;

  var sites = Object.keys(_data.sites).sort();
  var tbody  = document.getElementById("tBody");
  var tfoot  = document.getElementById("tFoot");
  tbody.innerHTML = tfoot.innerHTML = "";

  var totS = 0, totC = 0, totSeats = 0, siteCount = 0;

  for (var k = 0; k < sites.length; k++) {
    var sn = sites[k];
    if (selSite && sn !== selSite) continue;

    var sg     = _data.sites[sn];
    var siteId = "site-" + k;

    /* filter roles for this site */
    var roles    = Object.keys(sg.roles).sort(function(a,b){ return sg.roles[b].started - sg.roles[a].started; });
    var sStarted = 0, sCompleted = 0, sSeats = 0;

    /* pre-calc site totals respecting role filter */
    for (var ri = 0; ri < roles.length; ri++) {
      var rn = roles[ri];
      if (selRole && rn !== selRole) continue;
      sStarted   += sg.roles[rn].started;
      sCompleted += sg.roles[rn].completed;
      sSeats     += sg.roles[rn].seats;
    }
    if (sStarted === 0) continue; /* skip site if role filter leaves nothing */

    siteCount++;
    totS     += sStarted;
    totC     += sCompleted;
    totSeats += sSeats;

    /* site row */
    var tr = document.createElement("tr");
    tr.className = "site-row";
    tr.dataset.target = siteId;
    tr.innerHTML = "<td>" + esc(sn) + "</td><td>" + sStarted + "</td><td>" + sCompleted +
      "</td><td>" + (sSeats > 0 ? sSeats : '<span class="zero">&mdash;</span>') + "</td>";
    tr.addEventListener("click", function() {
      var tid    = this.dataset.target;
      var isOpen = this.classList.contains("open");
      this.classList.toggle("open");
      var children = tbody.querySelectorAll("tr[data-parent='" + tid + "']");
      for (var x = 0; x < children.length; x++) {
        if (isOpen) {
          children[x].classList.remove("visible");
          var rid = children[x].dataset.target;
          if (rid) {
            var uc = tbody.querySelectorAll("tr[data-parent='" + rid + "']");
            for (var y = 0; y < uc.length; y++) uc[y].classList.remove("visible");
            children[x].classList.remove("open");
          }
        } else {
          children[x].classList.add("visible");
        }
      }
    });
    tbody.appendChild(tr);

    /* role rows */
    for (var r = 0; r < roles.length; r++) {
      var rn2  = roles[r];
      if (selRole && rn2 !== selRole) continue;
      var rg     = sg.roles[rn2];
      var roleId = siteId + "-r" + r;

      var rtr = document.createElement("tr");
      rtr.className = "detail-row role-row";
      rtr.dataset.parent = siteId;
      rtr.dataset.target = roleId;
      rtr.innerHTML = "<td>" + esc(rn2) + "</td><td>" + rg.started + "</td><td>" + rg.completed +
        "</td><td>" + (rg.seats > 0 ? rg.seats : '<span class="zero">&mdash;</span>') + "</td>";
      rtr.addEventListener("click", function(e) {
        e.stopPropagation();
        var tid    = this.dataset.target;
        var isOpen = this.classList.contains("open");
        this.classList.toggle("open");
        var uc = tbody.querySelectorAll("tr[data-parent='" + tid + "']");
        for (var y = 0; y < uc.length; y++) uc[y].classList.toggle("visible", !isOpen);
      });
      tbody.appendChild(rtr);

      /* user rows — sorted by started desc */
      var users = Object.keys(rg.users).sort(function(a,b){ return rg.users[b].started - rg.users[a].started; });
      for (var u = 0; u < users.length; u++) {
        var un  = users[u];
        var ug  = rg.users[un];
        var utr = document.createElement("tr");
        utr.className = "detail-row user-row";
        utr.dataset.parent = roleId;
        utr.innerHTML = "<td>" + esc(un) + "</td><td>" + ug.started + "</td><td>" + ug.completed +
          "</td><td>" + (ug.seats > 0 ? ug.seats : '<span class="zero">&mdash;</span>') + "</td>";
        tbody.appendChild(utr);
      }
    }
  }

  if (siteCount === 0) { showTable(false); return; }

  document.getElementById("recCount").textContent = totS + " started, " + totC + " completed";
  tfoot.innerHTML = "<tr><td>Total &mdash; " + siteCount + " site" + (siteCount !== 1 ? "s" : "") +
    "</td><td>" + totS + "</td><td>" + totC + "</td><td>" +
    (totSeats > 0 ? totSeats : '<span class="zero">&mdash;</span>') + "</td></tr>";
  showTable(true);
}

/* ── Call Deluge function ── */
function load() {
  if (_loading) return;
  _loading = true;
  showLoading();

  var dateStr  = document.getElementById("filterDate").value || todayStr();
  var zohoDate = toZohoDate(dateStr);

  document.getElementById("reportTitle").textContent = "Daily Jobs Summary \u2014 " + dateStr;

  /* invokeCustomApi POST — same pattern as working assign_vehicle dispatcher */
  ZOHO.CREATOR.DATA.invokeCustomApi({
    api_name:    "get_ops_job_summary",
    http_method: "POST",
    public_key:  PUBLIC_KEY,
    payload:     { target_date: zohoDate }
  }).then(function(resp) {
    _loading = false;
    console.log("[widget] invokeCustomApi response:", JSON.stringify(resp).substring(0, 500));
    var raw = (resp && resp.result) ? resp.result
            : (resp && resp.data)   ? resp.data
            : resp;
    if (!raw) { showError("No result from API."); return; }
    try {
      _data = (typeof raw === "string") ? JSON.parse(raw) : raw;
      render();
    } catch(e) {
      showError("JSON parse error: " + e + " | raw: " + JSON.stringify(raw).substring(0, 200));
    }
  }).catch(function(err) {
    _loading = false;
    showError((err && err.message) || JSON.stringify(err));
  });
}

/* ── Init ── */
window.onload = function() {
  ZOHO.CREATOR.UTIL.getInitParams().then(function(params) {
    if (params && params.appLinkName) APP_NAME = params.appLinkName;
    document.getElementById("filterDate").value = todayStr();
    document.getElementById("btnRefresh").addEventListener("click", function() {
      _data = null; /* force re-fetch on date change */
      load();
    });
    document.getElementById("filterDate").addEventListener("change", function() {
      _data = null;
      load();
    });
    document.getElementById("filterSite").addEventListener("change", render);
    document.getElementById("filterRole").addEventListener("change", render);
    load();
  }).catch(function() {
    document.getElementById("filterDate").value = todayStr();
    document.getElementById("btnRefresh").addEventListener("click", function() { _data = null; load(); });
    document.getElementById("filterDate").addEventListener("change", function() { _data = null; load(); });
    document.getElementById("filterSite").addEventListener("change", render);
    document.getElementById("filterRole").addEventListener("change", render);
    load();
  });
};
</script>
</body>
</html>
