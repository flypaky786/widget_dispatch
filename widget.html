<!DOCTYPE html>
<!--
  CSR ACTIVE REQUESTS WIDGET — v2
  ================================
  App: lax-abg | Report: All_Vehicle_Requests | Poll: 4s

  CHANGES LOG (latest first):
  - Assignment cell shows vehicle info (zc_display_value) from Avis_lookup_ID lookup
  - Parameterized CONFIG block for all tunable values
  - Added clickable column header sorting
  - Default sort: New → In Progress → Assigned → Cancelled (each oldest-first)
  - Upsell/Walk-up/One-Way labels configurable via CONFIG
  - Font size 15px in table (th + td + badges)
  - Sub_Acceptable column removed
  - Vehicle cell: Vehicle Type + Specific + Upsell/Walk-up/One-Way stacked
  - MVA + Stall merged into "Assignment" column
  - Cancel button hidden when status is Assigned
  - Audio ding when status transitions to Assigned
  - Server-side criteria filter by User_Email

  TIMEOUT PERIODS (configurable in CONFIG):
  - Unassigned (New/In Progress): hidden after UNASSIGNED_HIDE_MS (default 120 min)
  - Assigned: hidden after ASSIGNED_HIDE_MS (default 20 min)
  - Completed/Cancelled: always hidden

  SORT ORDER: New → In Progress → Assigned → Cancelled (each oldest-first)
-->
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <style>
    :root{--bg:#f0f2f5;--card:#fff;--header-bg:linear-gradient(135deg,#1a1f36 0%,#252d4a 100%);--th-bg:#f1f5f9;--th-text:#64748b;--border:#e8ecf1;--text:#1e293b;--text-muted:#64748b;--text-faint:#94a3b8;--accent:#3b82f6;--amber:#f59e0b;--amber-hover:#d97706;--green:#10b981;--red:#ef4444;--radius:12px;--radius-sm:8px;--shadow-md:0 4px 6px rgba(0,0,0,.04),0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 25px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.06);--transition:.15s ease}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
    .header{background:var(--header-bg);padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
    .header-left{display:flex;align-items:center;gap:10px}
    .header h2{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
    .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
    .status-dot.live{background:var(--green);box-shadow:0 0 8px rgba(16,185,129,.6);animation:pulse 2s infinite}
    .status-dot.error{background:var(--red);box-shadow:0 0 8px rgba(239,68,68,.6)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .last-update{font-size:12px;color:var(--text-faint);font-weight:500}
    .table-wrap{padding:20px 24px}
    .table-container{background:var(--card);border-radius:var(--radius);overflow:auto;-webkit-overflow-scrolling:touch;box-shadow:var(--shadow-md);max-height:80vh}
    table{width:100%;border-collapse:collapse;min-width:520px}
    thead{position:sticky;top:0;z-index:10}
    th{background:var(--th-bg);color:var(--th-text);padding:12px 10px;text-align:left;font-size:15px;font-weight:600;letter-spacing:.3px;white-space:nowrap;border-bottom:2px solid #e2e8f0;cursor:pointer;user-select:none;transition:background var(--transition)}
    th:hover{background:#e2e8f0}
    th.no-sort{cursor:default}th.no-sort:hover{background:var(--th-bg)}
    .sort-arrow{font-size:10px;margin-left:3px;opacity:.35}
    th.sort-active{color:#1e293b}th.sort-active .sort-arrow{opacity:1;color:var(--accent)}
    td{padding:10px 10px;font-size:15px;vertical-align:middle;border-bottom:1px solid var(--border);transition:background var(--transition)}
    tr:last-child td{border-bottom:none}tr:hover td{background:#f8fafc}
    .badge{padding:4px 10px;border-radius:6px;font-size:15px;font-weight:700;letter-spacing:.3px;display:inline-block}
    .badge.new{background:#fef3c7;color:#92400e}.badge.pending{background:#fef3c7;color:#92400e}
    .badge.in-progress{background:#ede9fe;color:#6d28d9}.badge.assigned{background:#dbeafe;color:#1e40af}
    .badge.dispatched{background:#dbeafe;color:#1e40af}.badge.en-route{background:#d1fae5;color:#065f46}
    .badge.completed{background:#e5e7eb;color:#374151}.badge.cancelled{background:#fee2e2;color:#b91c1c}
    .priority-tag{font-weight:700;color:#dc2626;font-size:16px}
    .oneway-tag{font-size:13px;color:var(--text-muted)}
    .spec-tag{font-size:13px;color:var(--text-muted)}
    .flash{animation:flashRow 1.2s ease-out}
    @keyframes flashRow{0%{background:rgba(251,191,36,.25)}100%{background:transparent}}
    .btn-cancel-req{background:var(--amber);color:#fff;border:none;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all var(--transition);-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(245,158,11,.3)}
    .btn-cancel-req:hover{background:var(--amber-hover);transform:translateY(-1px)}.btn-cancel-req:active{transform:translateY(0)}.btn-cancel-req:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center}.overlay.active{display:flex}
    .dialog{background:var(--card);border-radius:16px;padding:32px;max-width:440px;width:92%;box-shadow:var(--shadow-lg);animation:popIn .2s ease-out}
    @keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    .dialog h3{margin:0 0 8px;font-size:20px;font-weight:700;color:var(--text)}
    .dialog p{margin:0 0 24px;font-size:15px;color:var(--text-muted);line-height:1.5}
    .dialog-buttons{display:flex;gap:12px;justify-content:flex-end}
    .dialog-buttons button{padding:14px 24px;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:none;min-height:48px;transition:all var(--transition)}
    .btn-dialog-cancel{background:#f1f5f9;color:var(--text-muted)}.btn-dialog-cancel:hover{background:#e2e8f0}
    .btn-confirm-cancel{background:var(--amber);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,.3)}.btn-confirm-cancel:hover{background:var(--amber-hover);transform:translateY(-1px)}.btn-confirm-cancel:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
    .no-results{text-align:center;padding:40px 24px;color:var(--text-faint);font-size:15px}
    @media(max-width:1024px){.header{padding:16px}.table-wrap{padding:12px 16px}th{padding:12px 10px;font-size:14px}td{padding:10px 8px;font-size:15px}}
  </style>
</head>
<body>
<div class="header"><div class="header-left"><span class="status-dot live" id="statusDot"></span><h2 id="headerTitle">Active Requests</h2></div><span class="last-update" id="lastUpdate">Connecting...</span></div>
<div class="table-wrap"><div class="table-container"><table>
<thead><tr id="headerRow">
  <th data-col="requested">Requested <span class="sort-arrow">▼</span></th>
  <th data-col="vehicle">Vehicle <span class="sort-arrow">▼</span></th>
  <th data-col="status">Status <span class="sort-arrow">▼</span></th>
  <th data-col="mva">Assignment <span class="sort-arrow">▼</span></th>
  <th data-col="assigntime">Assigned <span class="sort-arrow">▼</span></th>
  <th class="no-sort"></th>
</tr></thead>
<tbody id="dispatchBody"><tr><td colspan="6" class="no-results">Loading...</td></tr></tbody>
</table></div></div>

<div class="overlay" id="cancelOverlay"><div class="dialog">
<h3>Cancel this request?</h3>
<p>Are you sure you want to cancel this <strong id="cancelVehicle"></strong> request?</p>
<div class="dialog-buttons"><button class="btn-dialog-cancel" onclick="closeCancelDialog()">No, go back</button><button class="btn-confirm-cancel" id="btnConfirmCancel" onclick="confirmCancel()">Yes, cancel it</button></div>
</div></div>

<script>
var CONFIG = {
  APP_NAME: "lax-abg",
  REPORT_NAME: "All_Vehicle_Requests",
  POLL_INTERVAL: 4000,
  MAX_RECORDS: 200,
  UNASSIGNED_HIDE_MS: 120 * 60 * 1000,
  ASSIGNED_HIDE_MS: 20 * 60 * 1000,
  UPSELL_LABEL: "Upsell (99)",
  WALKUP_LABEL: "Walk Up (49)",
  ONEWAY_LABEL: "One-Way Rental",
  DING_FREQ_1: 880,
  DING_FREQ_2: 1175
};

var previousData={},previousStatuses={},cancelRecordId=null,loggedInUser="",firstLoadComplete=false;
var audioCtx=null,audioUnlocked=false;
var sortCol=null,sortDir="desc";
var currentRecords=[];

/* === AUDIO === */
function unlockAudio(){if(audioUnlocked)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioCtx.resume().then(function(){audioUnlocked=true});}catch(e){}}
document.addEventListener("click",unlockAudio,{once:true});
document.addEventListener("touchstart",unlockAudio,{once:true});
document.addEventListener("keydown",unlockAudio,{once:true});
function playDing(){if(!audioUnlocked||!audioCtx)return;try{var n=audioCtx.currentTime;var o1=audioCtx.createOscillator(),g1=audioCtx.createGain();o1.connect(g1);g1.connect(audioCtx.destination);o1.frequency.value=CONFIG.DING_FREQ_1;o1.type="sine";g1.gain.setValueAtTime(.3,n);g1.gain.exponentialRampToValueAtTime(.001,n+.4);o1.start(n);o1.stop(n+.4);var o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.connect(g2);g2.connect(audioCtx.destination);o2.frequency.value=CONFIG.DING_FREQ_2;o2.type="sine";g2.gain.setValueAtTime(.2,n+.15);g2.gain.exponentialRampToValueAtTime(.001,n+.6);o2.start(n+.15);o2.stop(n+.6);}catch(e){}}

function checkForNewAssignments(recs){if(!firstLoadComplete)return;var dinged=false;for(var i=0;i<recs.length;i++){var rec=recs[i],id=rec.ID?rec.ID.toString():"";if(!id)continue;var cs=(rec.Dispatch_Status||"").toLowerCase(),ps=previousStatuses[id]||"";var na=cs.indexOf("assign")>=0||cs.indexOf("dispatch")>=0;var wa=ps.indexOf("assign")>=0||ps.indexOf("dispatch")>=0;if(na&&!wa&&!dinged){playDing();dinged=true;}}for(var j=0;j<recs.length;j++){var r=recs[j],rid=r.ID?r.ID.toString():"";if(rid)previousStatuses[rid]=(r.Dispatch_Status||"").toLowerCase();}}

function isBool(v){return v===true||v==="true";}
function badgeClass(s){s=(s||"").toLowerCase();if(s.indexOf("in progress")>=0||s.indexOf("in-progress")>=0)return"in-progress";if(s.indexOf("new")>=0)return"new";if(s.indexOf("pending")>=0)return"pending";if(s.indexOf("assign")>=0)return"assigned";if(s.indexOf("dispatch")>=0)return"dispatched";if(s.indexOf("route")>=0)return"en-route";if(s.indexOf("complet")>=0)return"completed";if(s.indexOf("cancel")>=0)return"cancelled";return"pending";}
function isAssignedStatus(s){s=(s||"").toLowerCase();return s.indexOf("assign")>=0||s.indexOf("dispatch")>=0;}
function isInProgressStatus(s){s=(s||"").toLowerCase();return s.indexOf("in progress")>=0||s.indexOf("in-progress")>=0;}
function isNewStatus(s){var sl=(s||"").toLowerCase();return!isAssignedStatus(s)&&!isInProgressStatus(s)&&!isCancelledStatus(s)&&sl.indexOf("complet")<0;}
function isCancelledStatus(s){return(s||"").toLowerCase().indexOf("cancel")>=0;}
function parseZohoDate(d){if(!d)return null;try{var p=d.toString().split(" ");if(p.length<2)return null;var dp=p[0].split("-");if(dp.length<3)return null;var r=dp[1]+" "+dp[0]+", "+dp[2]+" "+p.slice(1).join(" ");var dt=new Date(r);return isNaN(dt.getTime())?null:dt;}catch(e){return null;}}
function formatTime(d){var dt=parseZohoDate(d);if(!dt)return"—";var h=dt.getHours(),m=dt.getMinutes(),a=h>=12?"PM":"AM";h=h%12;if(h===0)h=12;return h+":"+("0"+m).slice(-2)+" "+a;}

function buildVehicleCell(rec){
  var lines=[];
  lines.push('<strong>'+(rec.Vehicle_Type||'—')+'</strong>');
  var spec=rec.Specific_Make_Model_optional||'';
  if(spec)lines.push('<span class="spec-tag">'+spec+'</span>');
  if(isBool(rec.Upsell))lines.push('<span class="priority-tag">'+CONFIG.UPSELL_LABEL+'</span>');
  if(isBool(rec.Walk_Up_Customer))lines.push('<span class="priority-tag">'+CONFIG.WALKUP_LABEL+'</span>');
  if(isBool(rec.One_Way_Rental))lines.push('<span class="oneway-tag">'+CONFIG.ONEWAY_LABEL+'</span>');
  return lines.join('<br>');
}

function buildAssignCell(rec){
  var mva=rec.Assigned_MVA||'',stall=rec.Stall_Number||'';
  var line1=mva&&stall?mva+' / '+stall:mva||stall||'';
  if(!isAssignedStatus(rec.Dispatch_Status))return line1;
  var av=rec.Avis_lookup_ID;
  if(!av||!av.zc_display_value)return line1;
  return line1+'<br><span style="font-size:12px;color:#64748b">'+av.zc_display_value+'</span>';
}

function defaultSort(records){
  var nw=[],ip=[],assigned=[],cancelled=[];
  for(var i=0;i<records.length;i++){var r=records[i];
    if(isCancelledStatus(r.Dispatch_Status))cancelled.push(r);
    else if(isAssignedStatus(r.Dispatch_Status))assigned.push(r);
    else if(isInProgressStatus(r.Dispatch_Status))ip.push(r);
    else nw.push(r);
  }
  var byAdded=function(a,b){return(parseZohoDate(a.Added_Time)||0)-(parseZohoDate(b.Added_Time)||0);};
  nw.sort(byAdded);ip.sort(byAdded);assigned.sort(byAdded);cancelled.sort(byAdded);
  return nw.concat(ip).concat(assigned).concat(cancelled);
}

function getSortValue(r,col){switch(col){case"requested":var d=parseZohoDate(r.Added_Time);return d?d.getTime():0;case"vehicle":return(r.Vehicle_Type||"").toLowerCase();case"status":return(r.Dispatch_Status||"").toLowerCase();case"mva":return(r.Assigned_MVA||"").toString();case"assigntime":var at=parseZohoDate(r.Assignment_Time);return at?at.getTime():0;default:return"";}}
function columnSort(records,col,dir){var s=records.slice();s.sort(function(a,b){var va=getSortValue(a,col),vb=getSortValue(b,col),c=0;if(typeof va==="number"&&typeof vb==="number")c=va-vb;else c=va.toString().localeCompare(vb.toString());return dir==="desc"?-c:c;});return s;}
function updateSortHeaders(){var ths=document.querySelectorAll("#headerRow th[data-col]");for(var i=0;i<ths.length;i++){var th=ths[i],ar=th.querySelector(".sort-arrow");if(sortCol&&th.getAttribute("data-col")===sortCol){th.classList.add("sort-active");ar.textContent=sortDir==="desc"?"▼":"▲";}else{th.classList.remove("sort-active");ar.textContent="▼";}}}

function renderTable(records){
  var tbody=document.getElementById("dispatchBody");
  if(!records||!records.length){tbody.innerHTML='<tr><td colspan="6" class="no-results">No active requests</td></tr>';return;}
  var html="";
  records.forEach(function(rec){
    var id=rec.ID,recStr=JSON.stringify(rec),changed=previousData[id]&&previousData[id]!==recStr;previousData[id]=recStr;
    var status=rec.Dispatch_Status||"New";
    var vehicleEsc=(rec.Vehicle_Type||'').replace(/'/g,"\\'");
    var cancelBtn=isAssignedStatus(status)?'':'<button class="btn-cancel-req" onclick="openCancelDialog(\''+id+'\',\''+vehicleEsc+'\')">Cancel</button>';
    html+='<tr class="'+(changed?'flash':'')+'">';
    html+='<td><strong>'+formatTime(rec.Added_Time)+'</strong></td>';
    html+='<td>'+buildVehicleCell(rec)+'</td>';
    html+='<td><span class="badge '+badgeClass(status)+'">'+status+'</span></td>';
    html+='<td>'+buildAssignCell(rec)+'</td>';
    html+='<td>'+formatTime(rec.Assignment_Time)+'</td>';
    html+='<td>'+cancelBtn+'</td>';
    html+='</tr>';
  });
  tbody.innerHTML=html;
}

document.getElementById("headerRow").addEventListener("click",function(e){var th=e.target.closest("th[data-col]");if(!th)return;var col=th.getAttribute("data-col");if(col===sortCol)sortDir=sortDir==="desc"?"asc":"desc";else{sortCol=col;sortDir="desc";}refreshTable();});

function refreshTable(){
  var sorted=sortCol?columnSort(currentRecords,sortCol,sortDir):defaultSort(currentRecords);
  updateSortHeaders();renderTable(sorted);
}

function openCancelDialog(id,vehicle){cancelRecordId=id;document.getElementById("cancelVehicle").textContent=vehicle;document.getElementById("cancelOverlay").classList.add("active");}
function closeCancelDialog(){cancelRecordId=null;document.getElementById("cancelOverlay").classList.remove("active");}
function confirmCancel(){
  if(!cancelRecordId)return;var btn=document.getElementById("btnConfirmCancel");btn.textContent="Cancelling...";btn.disabled=true;
  var now=new Date(),months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var dd=("0"+now.getDate()).slice(-2),mmm=months[now.getMonth()],yyyy=now.getFullYear();
  var hh=now.getHours(),ampm=hh>=12?"PM":"AM";hh=hh%12;if(hh===0)hh=12;
  var mm=("0"+now.getMinutes()).slice(-2),ss=("0"+now.getSeconds()).slice(-2);
  var ts=dd+"-"+mmm+"-"+yyyy+" "+("0"+hh).slice(-2)+":"+mm+":"+ss+" "+ampm;
  ZOHO.CREATOR.DATA.updateRecordById({app_name:CONFIG.APP_NAME,report_name:CONFIG.REPORT_NAME,id:cancelRecordId,payload:{data:{Dispatch_Status:"Cancelled",Cancelled_Time:ts}}})
  .then(function(resp){closeCancelDialog();btn.textContent="Yes, cancel it";btn.disabled=false;if(resp.code===3000)fetchDispatches();else alert("Cancel failed.");})
  .catch(function(){alert("Cancel failed.");btn.textContent="Yes, cancel it";btn.disabled=false;});
}

function fetchDispatches(){
  var config={app_name:CONFIG.APP_NAME,report_name:CONFIG.REPORT_NAME,page:1,max_records:CONFIG.MAX_RECORDS};
  if(loggedInUser)config.criteria='(User_Email == "'+loggedInUser+'")';
  ZOHO.CREATOR.DATA.getRecords(config).then(function(response){
    if(response.code===3000){
      var all=response.data||[],now=Date.now();
      var filtered=all.filter(function(rec){
        var s=(rec.Dispatch_Status||"").toLowerCase();
        if(s.indexOf("complet")>=0||s.indexOf("cancel")>=0)return false;
        if(!isAssignedStatus(rec.Dispatch_Status)){
          var ad=parseZohoDate(rec.Added_Time);if(ad&&(now-ad.getTime())>CONFIG.UNASSIGNED_HIDE_MS)return false;
        }else{
          var md=parseZohoDate(rec.Modified_Time);if(md&&(now-md.getTime())>CONFIG.ASSIGNED_HIDE_MS)return false;
        }
        return true;
      });
      currentRecords=filtered;
      var sorted=sortCol?columnSort(filtered,sortCol,sortDir):defaultSort(filtered);
      updateSortHeaders();
      checkForNewAssignments(sorted);renderTable(sorted);firstLoadComplete=true;
      document.getElementById("statusDot").className="status-dot live";
      document.getElementById("lastUpdate").textContent="Updated "+new Date().toLocaleTimeString();
    }else{currentRecords=[];renderTable([]);document.getElementById("statusDot").className="status-dot live";document.getElementById("lastUpdate").textContent="Updated "+new Date().toLocaleTimeString();}
  }).catch(function(){document.getElementById("statusDot").className="status-dot error";document.getElementById("lastUpdate").textContent="Connection error";});
}

ZOHO.CREATOR.UTIL.getInitParams().then(function(params){
  loggedInUser=params.loginUser||"";
  document.getElementById("headerTitle").textContent="Active Requests for "+loggedInUser.split("@")[0];
  fetchDispatches();setInterval(fetchDispatches,CONFIG.POLL_INTERVAL);
}).catch(function(){
  document.getElementById("headerTitle").textContent="Active Requests";
  fetchDispatches();setInterval(fetchDispatches,CONFIG.POLL_INTERVAL);
});
</script>
</body>
</html>
