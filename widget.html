<!DOCTYPE html>
<!--
  CSR ACTIVE REQUESTS WIDGET — v3
  ================================
  App: lax-abg | Report: All_Vehicle_Requests | Poll: 4s

  CHANGES LOG (latest first):
  v3:
  - Card-based layout (no table) — readable from distance on iPad
  - Age shown as "Xm" consistent with dispatcher widget (green/amber/red)
  - Status + assigned time merged — Assigned badge bold green with time below
  - MVA / Stall + vehicle info on assignment card row
  - X button replaces cancel column (hidden when assigned)
  v2:
  - zc_display_value from Avis_lookup_ID shown under MVA/Stall
  - Parameterized CONFIG, server-side filter by User_Email
  - Audio ding on Assigned transition
-->
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <style>
    :root{
      --bg:#f0f2f5;--card:#fff;
      --header-bg:linear-gradient(135deg,#1a1f36 0%,#252d4a 100%);
      --border:#e8ecf1;--text:#1e293b;--text-muted:#64748b;--text-faint:#94a3b8;
      --accent:#3b82f6;--green:#10b981;--green-bg:#d1fae5;--green-text:#065f46;
      --amber:#f59e0b;--amber-bg:#fef3c7;--amber-text:#92400e;
      --red:#ef4444;--purple:#7c3aed;--purple-bg:#ede9fe;--purple-text:#6d28d9;
      --radius:14px;--radius-sm:8px;
      --shadow-card:0 2px 8px rgba(0,0,0,.06),0 1px 3px rgba(0,0,0,.04);
      --shadow-lg:0 8px 25px rgba(0,0,0,.1);--transition:.15s ease;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

    .header{background:var(--header-bg);padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
    .header-left{display:flex;align-items:center;gap:10px}
    .header h2{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
    .status-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
    .status-dot.live{background:var(--green);box-shadow:0 0 8px rgba(16,185,129,.6);animation:pulse 2s infinite}
    .status-dot.error{background:var(--red)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .last-update{font-size:11px;color:var(--text-faint);font-weight:500}

    .cards-wrap{padding:12px 14px;display:flex;flex-direction:column;gap:10px}

    .req-card{
      background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-card);
      padding:16px 18px;position:relative;border-left:4px solid transparent;
    }
    .req-card.state-new{border-left-color:var(--amber)}
    .req-card.state-ip{border-left-color:var(--purple)}
    .req-card.state-assigned{border-left-color:var(--green)}
    .req-card.state-cancelled{border-left-color:var(--red);opacity:.6}
    .req-card.flash{animation:flashCard 1.2s ease-out}
    @keyframes flashCard{0%{background:rgba(251,191,36,.2)}100%{background:var(--card)}}

    /* top row */
    .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-right:36px}
    .card-vehicle-name{font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.3px;line-height:1.2}
    .card-vehicle-sub{font-size:13px;color:var(--text-muted);font-weight:500;margin-top:3px}
    .card-vehicle-tag{font-size:13px;color:var(--red);font-weight:700;margin-top:3px}
    .card-vehicle-oneway{font-size:13px;color:var(--text-muted);font-weight:500;margin-top:3px}
    .age-badge{font-size:17px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;flex-shrink:0}
    .age-ok{color:#059669}.age-warn{color:#d97706}
    .age-urgent{color:#dc2626;animation:urgentPulse 1.5s ease-in-out infinite}
    @keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.55}}

    /* bottom row */
    .card-bottom{display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
    .card-status-block{display:flex;flex-direction:column;gap:4px;flex-shrink:0}

    .badge{padding:5px 12px;border-radius:6px;font-size:14px;font-weight:700;letter-spacing:.2px;display:inline-block}
    .badge.new{background:var(--amber-bg);color:var(--amber-text)}
    .badge.pending{background:var(--amber-bg);color:var(--amber-text)}
    .badge.in-progress{background:var(--purple-bg);color:var(--purple-text)}
    .badge.assigned{background:var(--green-bg);color:var(--green-text);font-weight:800}
    .badge.dispatched{background:var(--green-bg);color:var(--green-text);font-weight:800}
    .badge.en-route{background:#d1fae5;color:#065f46}
    .badge.completed{background:#e5e7eb;color:#374151}
    .badge.cancelled{background:#fee2e2;color:#b91c1c}
    .assigned-time{font-size:12px;color:var(--text-muted);font-weight:500;padding-left:2px}

    .card-assignment{text-align:right;line-height:1.5}
    .assign-mva{font-size:17px;font-weight:700;color:var(--text)}
    .assign-vehicle{font-size:13px;color:var(--text-muted);font-weight:500}

    /* X button */
    .btn-x{
      position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;
      background:#f1f5f9;border:none;cursor:pointer;display:flex;align-items:center;
      justify-content:center;font-size:13px;color:var(--text-muted);font-weight:700;
      transition:all var(--transition);-webkit-tap-highlight-color:transparent;touch-action:manipulation;
    }
    .btn-x:hover{background:#fee2e2;color:var(--red)}
    .btn-x:active{transform:scale(.92)}

    .no-results{text-align:center;padding:48px 24px;color:var(--text-faint);font-size:15px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-card)}

    /* dialog */
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center}.overlay.active{display:flex}
    .dialog{background:var(--card);border-radius:16px;padding:32px;max-width:400px;width:92%;box-shadow:var(--shadow-lg);animation:popIn .2s ease-out}
    @keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    .dialog h3{margin:0 0 8px;font-size:20px;font-weight:700}
    .dialog p{margin:0 0 24px;font-size:15px;color:var(--text-muted);line-height:1.5}
    .dialog-buttons{display:flex;gap:12px;justify-content:flex-end}
    .dialog-buttons button{padding:14px 24px;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:none;min-height:48px;transition:all var(--transition)}
    .btn-dialog-back{background:#f1f5f9;color:var(--text-muted)}.btn-dialog-back:hover{background:#e2e8f0}
    .btn-dialog-confirm{background:var(--red);color:#fff}.btn-dialog-confirm:hover{background:#dc2626;transform:translateY(-1px)}.btn-dialog-confirm:disabled{background:#ccc;cursor:not-allowed;transform:none}
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="status-dot live" id="statusDot"></span>
    <h2 id="headerTitle">Active Requests</h2>
  </div>
  <span class="last-update" id="lastUpdate">Connecting...</span>
</div>

<div class="cards-wrap" id="cardsWrap">
  <div class="no-results">Loading...</div>
</div>

<div class="overlay" id="cancelOverlay">
  <div class="dialog">
    <h3>Cancel this request?</h3>
    <p>Cancel the <strong id="cancelVehicle"></strong> request?</p>
    <div class="dialog-buttons">
      <button class="btn-dialog-back" onclick="closeCancelDialog()">Go back</button>
      <button class="btn-dialog-confirm" id="btnConfirmCancel" onclick="confirmCancel()">Yes, cancel</button>
    </div>
  </div>
</div>

<script>
var CONFIG={
  APP_NAME:"lax-abg",REPORT_NAME:"All_Vehicle_Requests",
  POLL_INTERVAL:4000,MAX_RECORDS:200,
  UNASSIGNED_HIDE_MS:120*60*1000,ASSIGNED_HIDE_MS:10*60*1000,
  AGE_WARN_MIN:10,AGE_URGENT_MIN:20,
  UPSELL_LABEL:"Upsell (99)",WALKUP_LABEL:"Walk Up (49)",ONEWAY_LABEL:"One-Way Rental",
  DING_FREQ_1:880,DING_FREQ_2:1175
};

var previousData={},previousStatuses={},cancelRecordId=null,loggedInUser="",firstLoadComplete=false;
var audioCtx=null,audioUnlocked=false,currentRecords=[];

function unlockAudio(){if(audioUnlocked)return;try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();audioCtx.resume().then(function(){audioUnlocked=true});}catch(e){}}
document.addEventListener("click",unlockAudio,{once:true});
document.addEventListener("touchstart",unlockAudio,{once:true});
function playDing(){if(!audioUnlocked||!audioCtx)return;try{var n=audioCtx.currentTime;var o1=audioCtx.createOscillator(),g1=audioCtx.createGain();o1.connect(g1);g1.connect(audioCtx.destination);o1.frequency.value=CONFIG.DING_FREQ_1;o1.type="sine";g1.gain.setValueAtTime(.3,n);g1.gain.exponentialRampToValueAtTime(.001,n+.4);o1.start(n);o1.stop(n+.4);var o2=audioCtx.createOscillator(),g2=audioCtx.createGain();o2.connect(g2);g2.connect(audioCtx.destination);o2.frequency.value=CONFIG.DING_FREQ_2;o2.type="sine";g2.gain.setValueAtTime(.2,n+.15);g2.gain.exponentialRampToValueAtTime(.001,n+.6);o2.start(n+.15);o2.stop(n+.6);}catch(e){}}

function checkForNewAssignments(recs){
  if(!firstLoadComplete)return;
  var dinged=false;
  for(var i=0;i<recs.length;i++){var rec=recs[i],id=rec.ID?rec.ID.toString():"";if(!id)continue;var cs=(rec.Dispatch_Status||"").toLowerCase(),ps=previousStatuses[id]||"";var na=cs.indexOf("assign")>=0||cs.indexOf("dispatch")>=0,wa=ps.indexOf("assign")>=0||ps.indexOf("dispatch")>=0;if(na&&!wa&&!dinged){playDing();dinged=true;}}
  for(var j=0;j<recs.length;j++){var r=recs[j],rid=r.ID?r.ID.toString():"";if(rid)previousStatuses[rid]=(r.Dispatch_Status||"").toLowerCase();}
}

function isBool(v){return v===true||v==="true";}
function isAssignedStatus(s){s=(s||"").toLowerCase();return s.indexOf("assign")>=0||s.indexOf("dispatch")>=0;}
function isInProgressStatus(s){s=(s||"").toLowerCase();return s.indexOf("in progress")>=0||s.indexOf("in-progress")>=0;}
function isCancelledStatus(s){return(s||"").toLowerCase().indexOf("cancel")>=0;}

function parseZohoDate(d){if(!d)return null;try{var p=d.toString().split(" ");if(p.length<2)return null;var dp=p[0].split("-");if(dp.length<3)return null;var r=dp[1]+" "+dp[0]+", "+dp[2]+" "+p.slice(1).join(" ");var dt=new Date(r);return isNaN(dt.getTime())?null:dt;}catch(e){return null;}}
function formatTime(d){var dt=parseZohoDate(d);if(!dt)return"—";var h=dt.getHours(),m=dt.getMinutes(),a=h>=12?"PM":"AM";h=h%12;if(h===0)h=12;return h+":"+("0"+m).slice(-2)+" "+a;}
function getAge(d){var dt=parseZohoDate(d);if(!dt)return{text:"—",cls:"age-ok"};var m=Math.floor((Date.now()-dt.getTime())/60000);if(m<0)m=0;var c=m>=CONFIG.AGE_URGENT_MIN?"age-urgent":m>=CONFIG.AGE_WARN_MIN?"age-warn":"age-ok";return{text:m+"m",cls:c};}

function badgeClass(s){s=(s||"").toLowerCase();if(s.indexOf("in progress")>=0||s.indexOf("in-progress")>=0)return"in-progress";if(s.indexOf("new")>=0)return"new";if(s.indexOf("pending")>=0)return"pending";if(s.indexOf("assign")>=0)return"assigned";if(s.indexOf("dispatch")>=0)return"dispatched";if(s.indexOf("route")>=0)return"en-route";if(s.indexOf("complet")>=0)return"completed";if(s.indexOf("cancel")>=0)return"cancelled";return"pending";}
function cardStateClass(s){if(isAssignedStatus(s))return"state-assigned";if(isInProgressStatus(s))return"state-ip";if(isCancelledStatus(s))return"state-cancelled";return"state-new";}

function sortRecords(records){
  var nw=[],ip=[],assigned=[],cancelled=[];
  for(var i=0;i<records.length;i++){var r=records[i];if(isCancelledStatus(r.Dispatch_Status))cancelled.push(r);else if(isAssignedStatus(r.Dispatch_Status))assigned.push(r);else if(isInProgressStatus(r.Dispatch_Status))ip.push(r);else nw.push(r);}
  var byAdded=function(a,b){return(parseZohoDate(a.Added_Time)||0)-(parseZohoDate(b.Added_Time)||0);};
  nw.sort(byAdded);ip.sort(byAdded);assigned.sort(byAdded);cancelled.sort(byAdded);
  return nw.concat(ip).concat(assigned).concat(cancelled);
}

function renderCards(records){
  var wrap=document.getElementById("cardsWrap");
  if(!records||!records.length){wrap.innerHTML='<div class="no-results">No active requests</div>';return;}
  var html="";
  records.forEach(function(rec){
    var id=rec.ID,recStr=JSON.stringify(rec),changed=previousData[id]&&previousData[id]!==recStr;
    previousData[id]=recStr;
    var status=rec.Dispatch_Status||"New",age=getAge(rec.Added_Time);
    var assigned=isAssignedStatus(status);
    var vehicleEsc=(rec.Vehicle_Type||'').replace(/'/g,"\\'");

    // Vehicle block
    var vhtml='<div class="card-vehicle-name">'+(rec.Vehicle_Type||'—')+'</div>';
    if(rec.Specific_Make_Model_optional)vhtml+='<div class="card-vehicle-sub">'+rec.Specific_Make_Model_optional+'</div>';
    if(isBool(rec.Upsell))vhtml+='<div class="card-vehicle-tag">'+CONFIG.UPSELL_LABEL+'</div>';
    if(isBool(rec.Walk_Up_Customer))vhtml+='<div class="card-vehicle-tag">'+CONFIG.WALKUP_LABEL+'</div>';
    if(isBool(rec.One_Way_Rental))vhtml+='<div class="card-vehicle-oneway">'+CONFIG.ONEWAY_LABEL+'</div>';

    // Status block
    var shtml='<div class="card-status-block"><span class="badge '+badgeClass(status)+'">'+status+'</span>';
    if(assigned&&rec.Assignment_Time)shtml+='<span class="assigned-time">'+formatTime(rec.Assignment_Time)+'</span>';
    shtml+='</div>';

    // Assignment block
    var ahtml='';
    if(assigned){
      var mva=rec.Assigned_MVA||'',stall=rec.Stall_Number||'';
      var mvaStall=mva&&stall?mva+' / '+stall:mva||stall||'';
      var av=rec.Avis_lookup_ID,vinfo=av&&av.zc_display_value?av.zc_display_value:'';
      ahtml='<div class="card-assignment">';
      if(mvaStall)ahtml+='<div class="assign-mva">'+mvaStall+'</div>';
      if(vinfo)ahtml+='<div class="assign-vehicle">'+vinfo+'</div>';
      ahtml+='</div>';
    }

    // X button (hidden when assigned)
    var xbtn=assigned?'':'<button class="btn-x" onclick="openCancelDialog(\''+id+'\',\''+vehicleEsc+'\')" title="Cancel">&#10005;</button>';

    html+='<div class="req-card '+cardStateClass(status)+(changed?' flash':'')+'">';
    html+=xbtn;
    html+='<div class="card-top"><div>'+vhtml+'</div><span class="age-badge '+age.cls+'">'+age.text+'</span></div>';
    html+='<div class="card-bottom">'+shtml+ahtml+'</div>';
    html+='</div>';
  });
  wrap.innerHTML=html;
}

function openCancelDialog(id,vehicle){cancelRecordId=id;document.getElementById("cancelVehicle").textContent=vehicle;document.getElementById("cancelOverlay").classList.add("active");}
function closeCancelDialog(){cancelRecordId=null;document.getElementById("cancelOverlay").classList.remove("active");}
function confirmCancel(){
  if(!cancelRecordId)return;
  var btn=document.getElementById("btnConfirmCancel");btn.textContent="Cancelling...";btn.disabled=true;
  var now=new Date(),months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  var dd=("0"+now.getDate()).slice(-2),mmm=months[now.getMonth()],yyyy=now.getFullYear();
  var hh=now.getHours(),ampm=hh>=12?"PM":"AM";hh=hh%12;if(hh===0)hh=12;
  var mm=("0"+now.getMinutes()).slice(-2),ss=("0"+now.getSeconds()).slice(-2);
  var ts=dd+"-"+mmm+"-"+yyyy+" "+("0"+hh).slice(-2)+":"+mm+":"+ss+" "+ampm;
  ZOHO.CREATOR.DATA.updateRecordById({app_name:CONFIG.APP_NAME,report_name:CONFIG.REPORT_NAME,id:cancelRecordId,payload:{data:{Dispatch_Status:"Cancelled",Cancelled_Time:ts}}})
  .then(function(resp){closeCancelDialog();btn.textContent="Yes, cancel";btn.disabled=false;if(resp.code===3000)fetchDispatches();else alert("Cancel failed.");})
  .catch(function(){alert("Cancel failed.");btn.textContent="Yes, cancel";btn.disabled=false;});
}

function fetchDispatches(){
  var config={app_name:CONFIG.APP_NAME,report_name:CONFIG.REPORT_NAME,page:1,max_records:CONFIG.MAX_RECORDS};
  if(loggedInUser)config.criteria='(User_Email == "'+loggedInUser+'")';
  ZOHO.CREATOR.DATA.getRecords(config).then(function(response){
    if(response.code===3000){
      var all=response.data||[],now=Date.now();
      var filtered=all.filter(function(rec){
        var s=(rec.Dispatch_Status||"").toLowerCase();
        if(s.indexOf("complet")>=0||s.indexOf("cancel")>=0)return false;
        if(!isAssignedStatus(rec.Dispatch_Status)){var ad=parseZohoDate(rec.Added_Time);if(ad&&(now-ad.getTime())>CONFIG.UNASSIGNED_HIDE_MS)return false;}
        else{var at=parseZohoDate(rec.Assignment_Time);if(at&&(now-at.getTime())>CONFIG.ASSIGNED_HIDE_MS)return false;}
        return true;
      });
      currentRecords=filtered;
      var sorted=sortRecords(filtered);
      checkForNewAssignments(sorted);renderCards(sorted);firstLoadComplete=true;
      document.getElementById("statusDot").className="status-dot live";
      document.getElementById("lastUpdate").textContent="Updated "+new Date().toLocaleTimeString();
    }else{currentRecords=[];renderCards([]);document.getElementById("statusDot").className="status-dot live";document.getElementById("lastUpdate").textContent="Updated "+new Date().toLocaleTimeString();}
  }).catch(function(){document.getElementById("statusDot").className="status-dot error";document.getElementById("lastUpdate").textContent="Connection error";});
}

ZOHO.CREATOR.UTIL.getInitParams().then(function(params){
  loggedInUser=params.loginUser||"";
  document.getElementById("headerTitle").textContent="Active Requests for "+loggedInUser.split("@")[0];
  fetchDispatches();setInterval(fetchDispatches,CONFIG.POLL_INTERVAL);
}).catch(function(){
  document.getElementById("headerTitle").textContent="Active Requests";
  fetchDispatches();setInterval(fetchDispatches,CONFIG.POLL_INTERVAL);
});
</script>
</body>
</html>
