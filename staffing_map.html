<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>LAX-ABG Staffing Map</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    display: flex; flex-direction: column;
    touch-action: none;
  }

  /* ── Header ── */
  #header {
    background: #161b22;
    border-bottom: 2px solid #e53935;
    padding: 9px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; z-index: 100; gap: 10px; flex-wrap: wrap;
  }
  #header-left h1 {
    font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.05em;
  }
  #header-left .sub {
    font-size: 9px; color: #6e7681; margin-top: 1px; letter-spacing: 0.08em;
  }
  #header-stats { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .stat-pill {
    display: flex; align-items: center; gap: 5px;
    background: #21262d; border-radius: 20px;
    padding: 4px 11px; font-size: 11px; color: #ccd6e0;
    white-space: nowrap;
  }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── Viewport ── */
  #map-viewport {
    flex: 1; overflow: hidden; position: relative;
    cursor: crosshair; touch-action: none; background: #1a1f2b;
  }
  #map-viewport.pan-mode         { cursor: grab; }
  #map-viewport.pan-mode.panning { cursor: grabbing; }

  /* ── Pannable canvas ── */
  #map-canvas {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0; will-change: transform;
  }
  #floor-img {
    display: block; max-width: none; height: auto;
    user-select: none; -webkit-user-drag: none; pointer-events: none;
  }

  /* ── Zone overlays (SVG) ── */
  #zone-layer {
    position: absolute; top: 0; left: 0; pointer-events: none;
  }

  /* ── Avatar pins ── */
  .avatar-pin {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer; z-index: 20; user-select: none;
    transition: filter 0.15s;
  }
  .avatar-pin:hover { filter: brightness(1.3); }

  @keyframes ripple {
    0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.7; }
    100% { transform: translate(-50%,-50%) scale(2.4); opacity: 0;   }
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.1); }
  }
  @keyframes fadeIn {
    from { opacity:0; transform:scale(0.92); }
    to   { opacity:1; transform:scale(1);    }
  }

  .ripple-ring {
    position: absolute; top: 50%; left: 50%;
    width: 50px; height: 50px; border-radius: 50%;
    border: 2px solid currentColor;
    animation: ripple 2.2s ease-out infinite;
    pointer-events: none;
  }
  .avatar-circle {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; position: relative; z-index: 2;
  }
  .avatar-label {
    margin-top: 6px;
    background: rgba(10,14,26,0.94);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px; padding: 4px 9px;
    font-size: 10px; color: #e8edf5;
    white-space: nowrap; text-align: center; line-height: 1.6;
    box-shadow: 0 2px 8px rgba(0,0,0,0.6); z-index: 2;
  }
  .avatar-label .emp-id   { font-weight: 700; font-size: 11px; color: #fff; }
  .avatar-label .zone-nm  { color: #94a3b8; font-size: 9px; }
  .avatar-label .loc-nm   { color: #64748b;  font-size: 9px; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 3px; z-index: 2;
  }

  /* ── Zone highlight boxes ── */
  .zone-box-rect { transition: opacity 0.2s; }

  /* ── Zoom controls ── */
  #zoom-controls {
    position: absolute; bottom: 16px; right: 14px;
    display: flex; flex-direction: column; gap: 5px; z-index: 50;
  }
  .zoom-btn {
    width: 36px; height: 36px; background: #161b22;
    border: 1px solid #30363d; border-radius: 8px;
    color: #e6edf3; font-size: 18px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: background 0.15s; user-select: none;
  }
  .zoom-btn:hover  { background: #21262d; }
  .zoom-btn:active { background: #30363d; }
  #zoom-pct { font-size: 10px; color: #6e7681; text-align: center; }

  /* ── Loading overlay ── */
  #state-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(13,17,23,0.9); color: #8b949e; font-size: 13px;
    z-index: 60; flex-direction: column; gap: 12px;
  }
  .spinner {
    width: 30px; height: 30px;
    border: 3px solid #21262d; border-top-color: #388bfd;
    border-radius: 50%; animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Hint ── */
  #pan-hint {
    position: absolute; bottom: 16px; left: 50%;
    transform: translateX(-50%);
    background: rgba(22,27,34,0.92); border: 1px solid #30363d;
    border-radius: 20px; padding: 5px 14px;
    font-size: 10px; color: #8b949e; pointer-events: none;
    transition: opacity 0.5s; z-index: 50; white-space: nowrap;
  }
  #pan-hint.hidden { opacity: 0; pointer-events: none; }

  /* ── Modal ── */
  #modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    backdrop-filter: blur(7px);
    z-index: 1000; align-items: center; justify-content: center;
  }
  #modal-overlay.open { display: flex; }
  #modal {
    background: #161b22; border-radius: 18px;
    padding: 26px; width: 320px; max-width: 94vw;
    animation: fadeIn 0.18s ease;
    box-shadow: 0 28px 70px rgba(0,0,0,0.9);
  }
  .modal-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
  #m-avatar {
    width: 58px; height: 58px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; flex-shrink: 0;
  }
  #m-name  { font-size: 16px; font-weight: 700; color: #e8edf5; }
  #m-role  { font-size: 11px; color: #64748b; margin-top: 2px; }
  #m-meta  { font-size: 11px; color: #8b949e; margin-top: 4px; line-height: 1.6; }
  #m-badge { display: inline-block; margin-top: 6px; font-size: 10px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
  #modal hr { border: none; border-top: 1px solid #21262d; margin: 14px 0; }

  .action-btn {
    width: 100%; display: flex; align-items: center; gap: 11px;
    padding: 13px 16px; border-radius: 10px; border: none;
    cursor: pointer; font-size: 13px; font-weight: 600;
    font-family: inherit; transition: all 0.15s; margin-bottom: 9px;
  }
  .action-btn:last-of-type { margin-bottom: 0; }
  .action-btn:hover   { filter: brightness(1.12); transform: translateY(-1px); }
  .action-btn:active  { transform: translateY(0); }
  .action-btn:disabled { opacity: 0.38; cursor: not-allowed !important; transform: none !important; filter: none !important; }

  .btn-active { background: #22c55e22; color: #22c55e; border: 1.5px solid #22c55e55; }
  .btn-break  { background: #f97316;   color: #fff; }
  .btn-lunch  { background: #ef4444;   color: #fff; }
  .btn-current { outline: 2px solid currentColor; outline-offset: 2px; }

  .ts-box {
    background: #0d1117; border: 1px solid #21262d;
    border-radius: 8px; padding: 11px 14px;
    font-size: 11px; color: #64748b; margin-top: 12px; display: none;
  }
  .ts-box.show { display: block; }
  .ts-box .ts-label { margin-bottom: 3px; }
  .ts-box strong { color: #f97316; font-size: 12px; display: block; margin-top: 2px; }
  .ts-elapsed { color: #8b949e; font-size: 10px; margin-top: 4px; }

  #saving-indicator {
    display: none; text-align: center;
    font-size: 11px; color: #8b949e; margin-top: 10px;
    animation: pulse 1s ease-in-out infinite;
  }
  #saving-indicator.show { display: block; }

  #dismiss-btn {
    display: block; width: 100%; text-align: center;
    margin-top: 16px; font-size: 12px; color: #475569;
    cursor: pointer; background: none; border: none;
    font-family: inherit; letter-spacing: 0.04em;
  }
  #dismiss-btn:hover { color: #94a3b8; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    padding: 10px 22px; border-radius: 10px;
    font-size: 12px; font-weight: 600; z-index: 9000;
    transition: transform 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    white-space: nowrap; color: #fff;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>

<div id="header">

    <div id="saving-indicator">⏳ Saving to Zoho Creator…</div>
    <button id="dismiss-btn" onclick="closeModal()">— Dismiss —</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════

const APP_NAME    = "lax-abg";

// ═══════════════════════════════════════════════════════════

const MAP_IMAGE_URL = "https://autoflowx.s3.us-east-2.amazonaws.com/LAX_plan_with_big_coordinates_v2.png";
// When deployed in Zoho: use  ZOHO.CREATOR.UTIL.getBaseURL() + "/images/your-image.png"

//  x/y = center of zone on raw image (pixels)

const AREA_POSITIONS = {

  "Rec Booth 1":  { "x": 1524, "y": 2729, "box": { "x": 1432, "y": 2672, "w": 184, "h": 114 } },

  "Return 1":     { "x": 2285, "y": 3298, "box": { "x": 2130, "y": 3180, "w": 309, "h": 235 } },

  "HS-South Elev":{ "x": 1584, "y": 2490, "box": { "x": 1448, "y": 2385, "w": 271, "h": 209 } },
  "Preferred 1":  { "x": 1201, "y": 1464, "box": { "x": 1112, "y": 1399, "w": 177, "h": 129 } },
  "Preferred 2":  { "x": 1432, "y": 1464, "box": { "x": 1324, "y": 1390, "w": 215, "h": 147 } },
  "Preferred 3":  { "x": 1714, "y": 1470, "box": { "x": 1607, "y": 1393, "w": 213, "h": 154 } },
  "Preferred 4":  { "x": 1330, "y": 1640, "box": { "x": 1215, "y": 1549, "w": 230, "h": 181 } },
  "Preferred 5":  { "x": 1679, "y": 1676, "box": { "x": 1565, "y": 1578, "w": 227, "h": 195 } },
  "Key Ldr 1":    { "x": 2120, "y": 972,  "box": { "x": 2000, "y": 877,  "w": 239, "h": 190 } },
  "Key Ldr 2":    { "x": 2520, "y": 971,  "box": { "x": 2400, "y": 872,  "w": 239, "h": 197 } },
  "Key Ldr 3":    { "x": 2157, "y": 1281, "box": { "x": 2002, "y": 1179, "w": 309, "h": 204 } },
  "Key Ldr 4":    { "x": 2562, "y": 1296, "box": { "x": 2427, "y": 1170, "w": 269, "h": 251 } },
  "HS B1":        { "x": 1037, "y": 1730, "box": { "x": 954,  "y": 1665, "w": 165, "h": 130 } },
  "HS B2":        { "x": 987,  "y": 1513, "box": { "x": 887,  "y": 1438, "w": 200, "h": 149 } },
  "HS B3":        { "x": 1359, "y": 1851, "box": { "x": 1243, "y": 1768, "w": 232, "h": 165 } }
};

// ═══════════════════════════════════════════════════════════
//  STATUS CONFIG
// ═══════════════════════════════════════════════════════════
const STATUS_CFG = {
  active:     { color: "#22c55e", bg: "#22c55e1a", label: "Active"     },
  Break:      { color: "#f97316", bg: "#f973161a", label: "On Break"   },
  Lunch:      { color: "#ef4444", bg: "#ef44441a", label: "At Lunch"   },
  unassigned: { color: "#6b7280", bg: "#6b72801a", label: "Unassigned" },
};

// ═══════════════════════════════════════════════════════════
//  PAN / ZOOM STATE
// ═══════════════════════════════════════════════════════════
let scale   = 1, originX = 0, originY = 0;
let imgW = 0, imgH = 0;
const MIN_SCALE = 0.05, MAX_SCALE = 5;

// Drag state
let isDragging = false, dragStartX = 0, dragStartY = 0, dragOX = 0, dragOY = 0;
let didPan = false;
// Pinch state
let pinchDist0 = 0, pinchScale0 = 1, pinchMX = 0, pinchMY = 0;
// Hint
let hintHidden = false;

const vp       = () => document.getElementById("map-viewport");
const canvas   = () => document.getElementById("map-canvas");
const floorImg = () => document.getElementById("floor-img");

function applyTransform() {
  canvas().style.transform = `translate(${originX}px,${originY}px) scale(${scale})`;
  document.getElementById("zoom-pct").textContent = Math.round(scale * 100) + "%";
}

function fitView() {
  const r = vp().getBoundingClientRect();
  if (!imgW) return;
  scale   = Math.min(r.width / imgW, r.height / imgH) * 0.97;
  originX = (r.width  - imgW * scale) / 2;
  originY = (r.height - imgH * scale) / 2;
  applyTransform();
}

function adjustZoom(delta, px, py) {
  const r  = vp().getBoundingClientRect();
  px = px ?? r.width / 2;
  py = py ?? r.height / 2;
  const prev = scale;
  scale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, scale * (1 + delta)));
  const ratio = scale / prev;
  originX = px - ratio * (px - originX);
  originY = py - ratio * (py - originY);
  applyTransform();
}

// Client coords → image pixel coords
function toImg(cx, cy) {
  const r = vp().getBoundingClientRect();
  return { x: (cx - r.left - originX) / scale, y: (cy - r.top - originY) / scale };
}

function hideHint() {
  if (hintHidden) return;
  hintHidden = true;
  const h = document.getElementById("pan-hint");
  h.classList.add("hidden");
  setTimeout(() => h.style.display = "none", 600);
}

// ── Mouse ──
vp().addEventListener("mousedown", e => {
  if (e.button !== 0) return;
  isDragging = true; didPan = false;
  dragStartX = e.clientX; dragStartY = e.clientY;
  dragOX = originX; dragOY = originY;
  vp().classList.add("pan-mode","panning");
});
vp().addEventListener("mousemove", e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
  if (Math.abs(dx) > 4 || Math.abs(dy) > 4) { didPan = true; hideHint(); }
  originX = dragOX + dx; originY = dragOY + dy;
  applyTransform();
});
vp().addEventListener("mouseup",    () => { isDragging = false; vp().classList.remove("panning"); });
vp().addEventListener("mouseleave", () => { isDragging = false; vp().classList.remove("panning"); });
vp().addEventListener("wheel", e => {
  e.preventDefault();
  const r = vp().getBoundingClientRect();
  adjustZoom(e.deltaY < 0 ? 0.12 : -0.12, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

// ── Touch ──
let lastTap = 0;
vp().addEventListener("touchstart", e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    isDragging = true; didPan = false;
    dragStartX = e.touches[0].clientX; dragStartY = e.touches[0].clientY;
    dragOX = originX; dragOY = originY;
    // double-tap zoom
    const now = Date.now();
    if (now - lastTap < 280) {
      const r  = vp().getBoundingClientRect();
      const px = e.touches[0].clientX - r.left;
      const py = e.touches[0].clientY - r.top;
      adjustZoom(scale < 1 ? 0.8 : -0.5, px, py);
      lastTap = 0;
    } else { lastTap = now; }
  } else if (e.touches.length === 2) {
    isDragging = false;
    const t0 = e.touches[0], t1 = e.touches[1];
    pinchDist0  = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
    pinchScale0 = scale;
    const r = vp().getBoundingClientRect();
    pinchMX = (t0.clientX+t1.clientX)/2 - r.left;
    pinchMY = (t0.clientY+t1.clientY)/2 - r.top;
  }
}, { passive: false });

vp().addEventListener("touchmove", e => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - dragStartX, dy = e.touches[0].clientY - dragStartY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) { didPan = true; hideHint(); }
    originX = dragOX + dx; originY = dragOY + dy;
    applyTransform();
  } else if (e.touches.length === 2) {
    const t0 = e.touches[0], t1 = e.touches[1];
    const dist = Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
    const newScale = Math.min(MAX_SCALE, Math.max(MIN_SCALE, pinchScale0 * dist / pinchDist0));
    const ratio = newScale / scale;
    scale   = newScale;
    originX = pinchMX - ratio * (pinchMX - originX);
    originY = pinchMY - ratio * (pinchMY - originY);
    applyTransform();
  }
}, { passive: false });

vp().addEventListener("touchend", e => {
  if (e.touches.length === 0) isDragging = false;
}, { passive: false });

// ═══════════════════════════════════════════════════════════
//  DATA & STATE
// ═══════════════════════════════════════════════════════════
let records    = [];
let selectedId = null;
let elapsedTimer = null;

function init() {
  // Load image
  const img = floorImg();
  img.onload = () => {
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    document.getElementById("zone-layer").setAttribute("width",  imgW);
    document.getElementById("zone-layer").setAttribute("height", imgH);
    document.getElementById("zone-layer").style.width  = imgW + "px";
    document.getElementById("zone-layer").style.height = imgH + "px";
    drawZoneBoxes();
    fitView();
  };
  img.onerror = () => setStateMsg("⚠️ Floor plan image not found — check MAP_IMAGE_URL");
  img.src = MAP_IMAGE_URL;

  if (typeof ZOHO !== "undefined" && ZOHO.CREATOR) {
    ZOHO.CREATOR.init().then(loadRecords);
  } else {
    // Dev/preview mode
    setTimeout(() => {
      records = getMockRecords();
      hideStateOverlay();
      renderPins();
    }, 600);
  }
}

// ── Draw semi-transparent zone boxes on SVG layer ──
function drawZoneBoxes() {
  const svg = document.getElementById("zone-layer");
  svg.innerHTML = "";
  Object.entries(AREA_POSITIONS).forEach(([name, pos]) => {
    if (!pos.box) return;
    const b = pos.box;
    const rect = document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute("x", b.x); rect.setAttribute("y", b.y);
    rect.setAttribute("width", b.w); rect.setAttribute("height", b.h);
    rect.setAttribute("fill",   "rgba(56,139,253,0.06)");
    rect.setAttribute("stroke", "rgba(56,139,253,0.3)");
    rect.setAttribute("stroke-width","2");
    rect.setAttribute("stroke-dasharray","8 4");
    rect.setAttribute("rx","4");
    svg.appendChild(rect);

    // Zone label on map
    const text = document.createElementNS("http://www.w3.org/2000/svg","text");
    text.setAttribute("x", b.x + 8);
    text.setAttribute("y", b.y + 20);
    text.setAttribute("fill","rgba(56,139,253,0.55)");
    text.setAttribute("font-size","18");
    text.setAttribute("font-weight","700");
    text.setAttribute("font-family","Segoe UI, sans-serif");
    text.textContent = name;
    svg.appendChild(text);
  });
}

// ─────────────────────────────────────────────
//  ZOHO — Load records
// ─────────────────────────────────────────────
function loadRecords() {
  ZOHO.CREATOR.API.getAllRecords({
    appName: APP_NAME, reportName: REPORT_NAME,
    page: 1, pageSize: 500,
  }).then(resp => {
    if (resp.code === 3000) {
      records = resp.data.map(normalizeRecord);
      hideStateOverlay();
      renderPins();
    } else {
      setStateMsg("⚠️ Could not load records (code " + resp.code + ")");
    }
  }).catch(err => setStateMsg("⚠️ Error: " + err));
}

function normalizeRecord(r) {
  // Derive status
  let status = "active";
  if (!r.Employee_Info || r.Employee_Info === "") {
    status = "unassigned";
  } else if (r.Break_Type && r.Break_Type_Start && !r.Break_Type_End) {
    status = r.Break_Type; // "Break" or "Lunch"
  }

  // Employee_ID.ID display value
  const empId = r.Employee_Info_display || r.Employee_Info || "—";

  // Initials from display name
  const parts    = empId.trim().split(/[\s\-]+/);
  const initials = parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : empId.substring(0,2).toUpperCase();

  // Zone lookup
  const areaName = r.Staffing_Area_display     || r.Staffing_Area     || "";
  const locName  = r.Staffing_Location_display || r.Staffing_Location || "";
  const pos      = AREA_POSITIONS[areaName] || null;

  return {
    id:         r.ID,
    empId,
    initials,
    status,
    area:       areaName,
    location:   locName,
    breakType:  r.Break_Type        || "",
    breakStart: r.Break_Type_Start  || null,
    breakEnd:   r.Break_Type_End    || null,
    dateField:  r.Date_field        || null,
    // pin position from zone map, fallback to center
    x: pos ? pos.x : 500,
    y: pos ? pos.y : 400,
  };
}

// ─────────────────────────────────────────────
//  RENDER AVATAR PINS
// ─────────────────────────────────────────────
function renderPins() {
  // Remove old pins
  canvas().querySelectorAll(".avatar-pin").forEach(el => el.remove());

  records.forEach(s => {
    if (!s.x || !s.y) return; // skip if no position
    const cfg = STATUS_CFG[s.status] || STATUS_CFG.unassigned;
    const pin = document.createElement("div");
    pin.className  = "avatar-pin";
    pin.style.left = s.x + "px";
    pin.style.top  = s.y + "px";
    pin.dataset.id = s.id;
    pin.title      = s.empId + " · " + s.area;

    // Prevent accidental open when panning
    pin.addEventListener("pointerdown", e => e.stopPropagation());
    pin.addEventListener("click", () => { if (!didPan) openModal(s.id); });

    pin.innerHTML = `
      ${s.status === "active"
        ? `<div class="ripple-ring" style="color:${cfg.color}"></div>`
        : ""}
      <div class="avatar-circle" style="
        background: radial-gradient(circle at 35% 35%, ${cfg.color}55, ${cfg.color}18);
        border: 3px solid ${cfg.color};
        color: ${cfg.color};
        box-shadow: 0 0 16px ${cfg.color}77, 0 3px 10px rgba(0,0,0,0.8);
        animation: ${s.status === "active" ? "pulse 2.8s ease-in-out infinite" : "none"};
      ">${s.initials}</div>
      <div class="avatar-label">
        <div class="emp-id">${s.empId}</div>
        <div class="zone-nm">${s.area}</div>
        <div class="loc-nm">${s.location}</div>
      </div>
      <div class="status-dot" style="background:${cfg.color};box-shadow:0 0 6px ${cfg.color};"></div>
    `;

    canvas().appendChild(pin);
  });

  updateCounts();
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(id) {
  selectedId = id;
  const s   = records.find(r => r.id === id);
  if (!s) return;
  const cfg = STATUS_CFG[s.status] || STATUS_CFG.unassigned;

  // Avatar
  const av = document.getElementById("m-avatar");
  av.textContent   = s.initials;
  av.style.cssText = `width:58px;height:58px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:800;flex-shrink:0;
    background:${cfg.bg};border:3px solid ${cfg.color};color:${cfg.color};
    box-shadow:0 0 20px ${cfg.color}55;`;

  document.getElementById("m-name").textContent = s.empId;
  document.getElementById("m-role").textContent = s.area;
  document.getElementById("m-meta").textContent = s.location;

  const badge = document.getElementById("m-badge");
  badge.textContent   = cfg.label;
  badge.style.cssText = `display:inline-block;margin-top:6px;font-size:10px;
    padding:3px 10px;border-radius:99px;font-weight:600;
    background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.color}55;`;

  // Button highlights
  const btnMap = { active: "btn-active", Break: "btn-break", Lunch: "btn-lunch" };
  Object.entries(btnMap).forEach(([st, btnId]) => {
    document.getElementById(btnId)?.classList.toggle("btn-current", s.status === st);
  });

  // Timestamp box
  const tsBox = document.getElementById("ts-box");
  if (s.breakStart && s.status !== "active") {
    document.getElementById("ts-value").textContent = formatDisplay(s.breakStart);
    updateElapsed(s.breakStart);
    tsBox.classList.add("show");
    if (elapsedTimer) clearInterval(elapsedTimer);
    elapsedTimer = setInterval(() => updateElapsed(s.breakStart), 10000);
  } else {
    tsBox.classList.remove("show");
    if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
  }

  document.getElementById("saving-indicator").classList.remove("show");
  setModalButtons(false);
  document.getElementById("modal-overlay").classList.add("open");
}

function updateElapsed(startISO) {
  if (!startISO) return;
  const ms  = Date.now() - new Date(startISO).getTime();
  const min = Math.floor(ms / 60000);
  const sec = Math.floor((ms % 60000) / 1000);
  document.getElementById("ts-elapsed").textContent =
    `⏱ ${min}m ${sec}s elapsed`;
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
  selectedId = null;
}

// ─────────────────────────────────────────────
//  STATUS CHANGE → Zoho API
// ─────────────────────────────────────────────
function setStatus(newStatus) {
  if (!selectedId) return;
  const s = records.find(r => r.id === selectedId);
  if (!s) return;

  const now      = new Date();
  const nowZoho  = formatForZoho(now);
  const nowISO   = now.toISOString();

  setModalButtons(true);
  document.getElementById("saving-indicator").classList.add("show");

  if (newStatus === "active") {
    // End break — stamp Break_Type_End
    zohoUpdate(s.id, { Break_Type_End: nowZoho }).then(ok => {
      if (!ok) return;
      s.status   = "active";
      s.breakEnd = nowISO;
      afterSave(s, "✅ " + s.empId + " — back on the floor");
    });
  } else {
    // Start Break or Lunch
    zohoUpdate(s.id, {
      Break_Type:       newStatus,
      Break_Type_Start: nowZoho,
      Break_Type_End:   "",
    }).then(ok => {
      if (!ok) return;
      s.status     = newStatus;
      s.breakType  = newStatus;
      s.breakStart = nowISO;
      s.breakEnd   = null;
      const icon   = newStatus === "Break" ? "☕" : "🍽️";
      afterSave(s, icon + " " + s.empId + " — " + newStatus + " started " + formatDisplay(nowISO));
    });
  }
}

function afterSave(s, toastMsg) {
  document.getElementById("saving-indicator").classList.remove("show");
  renderPins();
  openModal(s.id); // refresh modal state
  showToast(toastMsg, s.status === "active" ? "#22c55e" : "#f97316");
}

// ─────────────────────────────────────────────
//  ZOHO API WRAPPER
// ─────────────────────────────────────────────
function zohoUpdate(recordId, dataObj) {
  if (typeof ZOHO === "undefined" || !ZOHO.CREATOR) {
    // Dev mock
    return new Promise(res => setTimeout(() => res(true), 550));
  }
  return ZOHO.CREATOR.API.updateRecord({
    appName:  APP_NAME,
    formName: FORM_NAME,
    id:       recordId,
    data:     { data: dataObj },
  }).then(resp => {
    if (resp.code !== 3000) {
      showToast("⚠️ Save failed (code " + resp.code + ")", "#ef4444");
      setModalButtons(false);
      document.getElementById("saving-indicator").classList.remove("show");
      return false;
    }
    return true;
  }).catch(err => {
    showToast("⚠️ Network error: " + err, "#ef4444");
    setModalButtons(false);
    document.getElementById("saving-indicator").classList.remove("show");
    return false;
  });
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function setModalButtons(disabled) {
  ["btn-active","btn-break","btn-lunch"].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.disabled = disabled;
  });
}

function updateCounts() {
  document.getElementById("cnt-active").textContent     = records.filter(s => s.status === "active").length;
  document.getElementById("cnt-break").textContent      = records.filter(s => s.status === "Break").length;
  document.getElementById("cnt-lunch").textContent      = records.filter(s => s.status === "Lunch").length;
  document.getElementById("cnt-unassigned").textContent = records.filter(s => s.status === "unassigned").length;
}

function formatDisplay(iso) {
  if (!iso) return "—";
  try {
    return new Date(iso).toLocaleString("en-US", {
      month:"short", day:"numeric", year:"numeric",
      hour:"2-digit", minute:"2-digit", second:"2-digit",
    });
  } catch(e) { return iso; }
}

function formatForZoho(d) {
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const p = n => String(n).padStart(2,"0");
  return `${p(d.getDate())}-${months[d.getMonth()]}-${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function showToast(msg, color="#22c55e") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.style.background = color;
  t.style.boxShadow = `0 4px 20px ${color}55`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3500);
}

function hideStateOverlay() {
  const el = document.getElementById("state-overlay");
  if (el) el.style.display = "none";
}

function setStateMsg(msg) {
  const el = document.getElementById("state-msg");
  if (el) { el.innerHTML = msg; el.style.color = msg.startsWith("⚠️") ? "#ef4444" : "#8b949e"; }
  const spinner = document.querySelector(".spinner");
  if (spinner && msg.startsWith("⚠️")) spinner.style.display = "none";
}

// Close modal on backdrop
document.getElementById("modal-overlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// ─────────────────────────────────────────────
//  MOCK DATA (dev/preview only)
// ─────────────────────────────────────────────

    const pos = AREA_POSITIONS[area] || { x:500, y:500 };
    return { id, empId:emp, initials:ini, status, area, location:loc,
      breakType:bType||"", breakStart:bStart||null, breakEnd:null,
      x:pos.x, y:pos.y };
  };
  return [
    r("R001","EMP-1042","MT","active",    "Exit 1",      "LAX-ABG Exit Lane"),
    r("R002","EMP-2081","PK","Break",     "Dispatch 1",  "LAX-ABG Dispatch","Break", new Date(Date.now()-9*60000).toISOString()),
    r("R003","EMP-3017","DR","active",    "Key Ldr 1",   "LAX-ABG Key Leadership"),
    r("R004","EMP-4053","KL","Lunch",     "Return 1",    "LAX-ABG Return Lane","Lunch", new Date(Date.now()-22*60000).toISOString()),
    r("R005","EMP-5029","BS","active",    "Preferred 1", "LAX-ABG Preferred"),
    r("R006","EMP-6074","TH","Break",     "A-CP 1",      "LAX-ABG Car Park","Break", new Date(Date.now()-4*60000).toISOString()),
    r("R007","EMP-7011","RO","active",    "Rec Booth 1", "LAX-ABG Rec Booth"),
    r("R008","EMP-8033","NB","active",    "HS B1",       "LAX-ABG HS Bay"),
    r("R009","EMP-9002","JF","unassigned","A-LC 1",      ""),
    r("R010","EMP-1099","SW","active",    "HS-Return E", "LAX-ABG HS Return East"),
  ];
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
window.addEventListener("load", init);
</script>
