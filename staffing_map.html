<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>LAX-ABG Staffing Map</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117; font-family: 'Segoe UI', sans-serif;
  overflow: hidden; height: 100vh; width: 100vw;
  display: flex; flex-direction: column; touch-action: none;
}

/* ── Header ── */
#header {
  background: #161b22; border-bottom: 2px solid #e53935;
  padding: 9px 16px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0; gap: 10px; flex-wrap: wrap;
}
#header h1 { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.05em; }
#header .sub { font-size: 9px; color: #6e7681; margin-top: 1px; letter-spacing: 0.07em; }
#header-stats { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.stat-pill {
  display: flex; align-items: center; gap: 5px;
  background: #21262d; border-radius: 20px;
  padding: 3px 10px; font-size: 11px; color: #ccd6e0; white-space: nowrap;
}
.stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ── Viewport ── */
#map-viewport {
  flex: 1; overflow: hidden; position: relative;
  cursor: grab; touch-action: none; background: #1a1f2b;
}
#map-viewport.panning { cursor: grabbing; }
#map-canvas { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
#floor-img { display: block; max-width: none; height: auto; user-select: none; -webkit-user-drag: none; pointer-events: none; }
#zone-layer { position: absolute; top: 0; left: 0; pointer-events: none; }

/* ── Avatar pins ── */
.pin {
  position: absolute; transform: translate(-50%,-50%);
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; z-index: 20; user-select: none; transition: filter 0.15s;
}
.pin:hover { filter: brightness(1.25); }

/* Plus pin */
.plus-pin {
  position: absolute; transform: translate(-50%,-50%);
  z-index: 20; cursor: pointer; user-select: none;
}
.plus-circle {
  width: 56px; height: 56px; border-radius: 50%;
  background: rgba(56,139,253,0.15);
  border: 2.5px dashed #388bfd;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: #388bfd; font-weight: 300;
  transition: all 0.2s;
}
.plus-pin:hover .plus-circle {
  background: rgba(56,139,253,0.3); border-style: solid;
  transform: scale(1.1);
}
.plus-label {
  margin-top: 4px; font-size: 9px; color: #388bfd88;
  text-align: center; white-space: nowrap; font-weight: 600;
  letter-spacing: 0.04em;
}

@keyframes ripple { 0%{transform:translate(-50%,-50%) scale(1);opacity:.65} 100%{transform:translate(-50%,-50%) scale(2.4);opacity:0} }
@keyframes pulse  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.09)} }
@keyframes fadeIn { from{opacity:0;transform:scale(.92)} to{opacity:1;transform:scale(1)} }
@keyframes spin   { to{transform:rotate(360deg)} }

.ripple-ring {
  position: absolute; top:50%; left:50%;
  width:50px; height:50px; border-radius:50%;
  border:2px solid currentColor;
  animation:ripple 2.2s ease-out infinite; pointer-events:none;
}
.avatar-circle {
  width:48px; height:48px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:800; position:relative; z-index:2;
}
.avatar-label {
  margin-top:5px; background:rgba(10,14,26,.94);
  border:1px solid rgba(255,255,255,.1); border-radius:6px;
  padding:3px 8px; font-size:9px; color:#e8edf5;
  white-space:nowrap; text-align:center; line-height:1.6;
  box-shadow:0 2px 8px rgba(0,0,0,.6); z-index:2;
}
.avatar-label .emp-id   { font-weight:700; font-size:11px; color:#fff; }
.avatar-label .zone-nm  { color:#94a3b8; font-size:9px; }
.avatar-label .status-nm { font-size:9px; }
.status-dot { width:7px; height:7px; border-radius:50%; margin-top:3px; z-index:2; }

/* ── Zoom controls ── */
#zoom-controls { position:absolute; bottom:16px; right:14px; display:flex; flex-direction:column; gap:5px; z-index:50; }
.zoom-btn {
  width:34px; height:34px; background:#161b22; border:1px solid #30363d;
  border-radius:7px; color:#e6edf3; font-size:18px; font-weight:600;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.5);
  transition:background .15s; user-select:none;
}
.zoom-btn:hover { background:#21262d; }
#zoom-pct { font-size:10px; color:#6e7681; text-align:center; }

/* ── State overlay ── */
#state-overlay {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(13,17,23,.9); color:#8b949e; font-size:13px;
  z-index:60; flex-direction:column; gap:12px;
}
.spinner { width:28px; height:28px; border:3px solid #21262d; border-top-color:#388bfd; border-radius:50%; animation:spin .75s linear infinite; }

/* ── MODALS shared ── */
.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.78); backdrop-filter:blur(7px);
  z-index:1000; align-items:center; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:#161b22; border-radius:18px; padding:24px;
  width:340px; max-width:95vw; max-height:90vh; overflow-y:auto;
  animation:fadeIn .18s ease; box-shadow:0 28px 70px rgba(0,0,0,.9);
}
.modal-title {
  font-size:15px; font-weight:700; color:#e8edf5; margin-bottom:4px;
}
.modal-sub { font-size:11px; color:#6e7681; margin-bottom:16px; }
.modal-hr  { border:none; border-top:1px solid #21262d; margin:14px 0; }

/* ── Assign modal ── */
#assign-select {
  width:100%; background:#21262d; border:1.5px solid #30363d;
  border-radius:8px; color:#e6edf3; font-size:13px;
  padding:10px 12px; font-family:inherit; outline:none;
  appearance:none; cursor:pointer;
}
#assign-select:focus { border-color:#388bfd; }
#assign-error { font-size:11px; color:#ef4444; margin-top:8px; min-height:16px; }

/* ── Manage modal ── */
.manage-header { display:flex; align-items:center; gap:14px; margin-bottom:16px; }
#m-avatar { width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:19px; font-weight:800; flex-shrink:0; }
#m-name   { font-size:15px; font-weight:700; color:#e8edf5; }
#m-zone   { font-size:11px; color:#94a3b8; margin-top:2px; }
#m-status { display:inline-block; margin-top:5px; font-size:10px; padding:2px 9px; border-radius:99px; font-weight:600; }

/* Break groups */
.break-group { margin-bottom:10px; }
.break-group-label {
  font-size:9px; font-weight:700; color:#6e7681; letter-spacing:.1em;
  text-transform:uppercase; margin-bottom:6px; padding:0 2px;
}
.btn-row { display:flex; gap:8px; }

.action-btn {
  flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
  padding:11px 10px; border-radius:9px; border:none;
  cursor:pointer; font-size:12px; font-weight:600;
  font-family:inherit; transition:all .15s;
}
.action-btn:hover:not(:disabled)   { filter:brightness(1.12); transform:translateY(-1px); }
.action-btn:active:not(:disabled)  { transform:translateY(0); }
.action-btn:disabled { opacity:.3; cursor:not-allowed !important; }

.btn-start { background:#22c55e; color:#fff; }
.btn-end   { background:#21262d; color:#8b949e; border:1.5px solid #30363d; }
.btn-end.active-end { background:#f9731622; color:#f97316; border:1.5px solid #f9731655; }
.btn-lunch-start { background:#3b82f6; color:#fff; }
.btn-lunch-end.active-end { background:#3b82f622; color:#3b82f6; border:1.5px solid #3b82f655; }

.ts-mini { font-size:9px; color:#64748b; margin-top:4px; padding-left:2px; font-family:monospace; }
.ts-mini.active { color:#f97316; }

.btn-unassign {
  width:100%; padding:9px; border-radius:8px; border:1px solid #30363d;
  background:none; color:#6e7681; font-size:11px; font-family:inherit;
  cursor:pointer; margin-top:4px; transition:all .15s;
}
.btn-unassign:hover { border-color:#ef4444; color:#ef4444; background:#ef444411; }

#saving-msg { display:none; text-align:center; font-size:11px; color:#8b949e; margin-top:10px; }
#saving-msg.show { display:block; }

/* shared modal buttons */
.modal-btn {
  width:100%; padding:12px; border-radius:10px; border:none;
  font-size:13px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:all .15s; margin-top:8px;
}
.modal-btn:hover { filter:brightness(1.1); }
.modal-btn-primary { background:#388bfd; color:#fff; }
.modal-btn-cancel  { background:#21262d; color:#8b949e; }

#dismiss-btn {
  display:block; width:100%; text-align:center;
  margin-top:14px; font-size:11px; color:#475569;
  cursor:pointer; background:none; border:none; font-family:inherit;
}
#dismiss-btn:hover { color:#94a3b8; }

/* ── Pan hint ── */
#pan-hint {
  position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
  background:rgba(22,27,34,.92); border:1px solid #30363d;
  border-radius:20px; padding:5px 14px;
  font-size:10px; color:#8b949e; pointer-events:none;
  transition:opacity .5s; z-index:50; white-space:nowrap;
}
#pan-hint.hidden { opacity:0; }

/* ── Toast ── */
#toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(80px);
  padding:10px 22px; border-radius:10px;
  font-size:12px; font-weight:600; z-index:9000;
  transition:transform .3s ease; box-shadow:0 4px 20px rgba(0,0,0,.5);
  white-space:nowrap; color:#fff;
}
#toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>

<!-- Header -->

<script>
// ═══════════════════════════════════════════════════════

const APP_NAME        = "lax-abg";
const FORM_NAME       = "Staffing_Map";

const EMP_REPORT_NAME = "All_Employee_Info"; // report exposing Employee_Info records

// ═══════════════════════════════════════════════════════
//  ZONE POSITIONS
// ═══════════════════════════════════════════════════════
const AREA_POSITIONS = {

// ═══════════════════════════════════════════════════════
//  STATUS CONFIG
// ═══════════════════════════════════════════════════════
const STATUS_CFG = {
  "Active":  { color:"#22c55e", bg:"#22c55e1a", label:"Active"  },
  "Break 1": { color:"#f97316", bg:"#f973161a", label:"Break 1" },
  "Lunch":   { color:"#3b82f6", bg:"#3b82f61a", label:"Lunch"   },
  "Break 2": { color:"#f97316", bg:"#f973161a", label:"Break 2" },
};

// ═══════════════════════════════════════════════════════
//  PAN / ZOOM
// ═══════════════════════════════════════════════════════
let scale=1, originX=0, originY=0, imgW=0, imgH=0;
const MIN_SCALE=.05, MAX_SCALE=5;
let isDragging=false, dragSX=0, dragSY=0, dragOX=0, dragOY=0;
let didPan=false, hintHidden=false;
let pinchDist0=0, pinchScale0=1, pinchMX=0, pinchMY=0;
let lastTap=0;

const vp     = ()=>document.getElementById("map-viewport");
const canvas = ()=>document.getElementById("map-canvas");

function applyTransform(){
  canvas().style.transform=`translate(${originX}px,${originY}px) scale(${scale})`;
  document.getElementById("zoom-pct").textContent=Math.round(scale*100)+"%";
}
function fitView(){
  // Use requestAnimationFrame to ensure layout is fully settled (fixes iPad Safari)
  requestAnimationFrame(function(){
    const r=vp().getBoundingClientRect();
    if(!imgW||!r.width||!r.height) return;
    scale=Math.min(r.width/imgW,r.height/imgH)*.97;
    originX=(r.width-imgW*scale)/2;
    originY=(r.height-imgH*scale)/2;
    applyTransform();
  });
}
function adjustZoom(delta,px,py){
  const r=vp().getBoundingClientRect();
  px=px??r.width/2; py=py??r.height/2;
  const prev=scale;
  scale=Math.min(MAX_SCALE,Math.max(MIN_SCALE,scale*(1+delta)));
  const ratio=scale/prev;
  originX=px-ratio*(px-originX); originY=py-ratio*(py-originY);
  applyTransform();
}
function hideHint(){
  if(hintHidden) return; hintHidden=true;
  const h=document.getElementById("pan-hint");
  h.classList.add("hidden"); setTimeout(()=>h.style.display="none",600);
}

// Mouse
vp().addEventListener("mousedown",e=>{
  if(e.button!==0) return;
  isDragging=true; didPan=false;
  dragSX=e.clientX; dragSY=e.clientY; dragOX=originX; dragOY=originY;
  vp().classList.add("panning");
});
vp().addEventListener("mousemove",e=>{
  if(!isDragging) return;
  const dx=e.clientX-dragSX, dy=e.clientY-dragSY;
  if(Math.abs(dx)>4||Math.abs(dy)>4){didPan=true;hideHint();}
  originX=dragOX+dx; originY=dragOY+dy; applyTransform();
});
vp().addEventListener("mouseup",()=>{ isDragging=false; vp().classList.remove("panning"); });
vp().addEventListener("mouseleave",()=>{ isDragging=false; vp().classList.remove("panning"); });
vp().addEventListener("wheel",e=>{
  e.preventDefault();
  const r=vp().getBoundingClientRect();
  adjustZoom(e.deltaY<0?.12:-.12,e.clientX-r.left,e.clientY-r.top);
},{passive:false});

// Touch
vp().addEventListener("touchstart",e=>{
  e.preventDefault();
  if(e.touches.length===1){
    isDragging=true; didPan=false;
    dragSX=e.touches[0].clientX; dragSY=e.touches[0].clientY;
    dragOX=originX; dragOY=originY;
    const now=Date.now();
    if(now-lastTap<280){
      const r=vp().getBoundingClientRect();
      adjustZoom(scale<1?.8:-.5,e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);
      lastTap=0;
    } else lastTap=now;
  } else if(e.touches.length===2){
    isDragging=false;
    const t0=e.touches[0],t1=e.touches[1];
    pinchDist0=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    pinchScale0=scale;
    const r=vp().getBoundingClientRect();
    pinchMX=(t0.clientX+t1.clientX)/2-r.left;
    pinchMY=(t0.clientY+t1.clientY)/2-r.top;
  }
},{passive:false});
vp().addEventListener("touchmove",e=>{
  e.preventDefault();
  if(e.touches.length===1&&isDragging){
    const dx=e.touches[0].clientX-dragSX,dy=e.touches[0].clientY-dragSY;
    if(Math.abs(dx)>4||Math.abs(dy)>4){didPan=true;hideHint();}
    originX=dragOX+dx; originY=dragOY+dy; applyTransform();
  } else if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    const dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    const ns=Math.min(MAX_SCALE,Math.max(MIN_SCALE,pinchScale0*(dist/pinchDist0)));
    const r=ns/scale; scale=ns;
    originX=pinchMX-r*(pinchMX-originX); originY=pinchMY-r*(pinchMY-originY);
    applyTransform();
  }
},{passive:false});
vp().addEventListener("touchend",e=>{
  if(e.touches.length===0) isDragging=false;
},{passive:false});

//  DATA
// ═══════════════════════════════════════════════════════
let records    = [];  // today's Staffing_Map records
let allEmployees = []; // all Employee_Info rows
let assigningZone = null; // zone name currently in assign modal
let managingId    = null; // record ID in manage modal

// Helper — treat Zoho empty string "" same as null/falsy
function hasVal(v){ return v && v !== ""; }

// Derive status from field values
function deriveStatus(r){
  if(hasVal(r.Break_Type_Start) && !hasVal(r.Break_Type_End)) return "Break 1";
  if(hasVal(r.Lunch_Start)      && !hasVal(r.Lunch_End))      return "Lunch";
  if(hasVal(r.Break_2_Start)    && !hasVal(r.Break_2_End))    return "Break 2";
  return "Active";
}

// Is anything currently active (blocking other starts)?
function anyActive(r){
  return (hasVal(r.Break_Type_Start) && !hasVal(r.Break_Type_End))
      || (hasVal(r.Lunch_Start)      && !hasVal(r.Lunch_End))
      || (hasVal(r.Break_2_Start)    && !hasVal(r.Break_2_End));
}

// Parse Zoho datetime string: "20-Mar-2026 12:29:36 PM"
function parseZohoDate(d){
  if(!d || d === "") return null;
  try {
    // Try direct parse first
    var dt = new Date(d);
    if(!isNaN(dt.getTime())) return dt;
    // Zoho format: "dd-MMM-yyyy HH:mm:ss" or "dd-MMM-yyyy hh:mm:ss AM/PM"
    var p = d.toString().trim().split(" ");
    if(p.length < 2) return null;
    var dp = p[0].split("-");
    if(dp.length < 3) return null;
    var rebuilt = dp[1]+" "+dp[0]+", "+dp[2]+" "+p.slice(1).join(" ");
    dt = new Date(rebuilt);
    return isNaN(dt.getTime()) ? null : dt;
  } catch(e){ return null; }
}

// Filter: Date_Time must be today's calendar date (matches zoho.currentdate)
// Also allow overnight: include if Date_Time was yesterday but within 28hr window
function todayFilter(dateStr){
  if(!dateStr || dateStr === "") return false; // exclude records with no date
  var d = parseZohoDate(dateStr);
  if(!d) return false; // can't parse — exclude
  var now     = new Date();
  var cutoff  = new Date(now.getTime() - 28*60*60*1000); // 28hr back for overnight
  return d >= cutoff && d <= now;
}

// Is a record from today's calendar date specifically (for Active count)
function isToday(dateStr){
  if(!dateStr || dateStr === "") return false;
  var d = parseZohoDate(dateStr);
  if(!d) return false;
  var now = new Date();
  return d.getFullYear()===now.getFullYear()
      && d.getMonth()===now.getMonth()
      && d.getDate()===now.getDate();
}

function normalizeRecord(r){
  // Employee_Info comes back as an object: {Employee_ID:"1508", ID:"...", zc_display_value:"1508"}
  var empObj     = (r.Employee_Info && typeof r.Employee_Info === "object") ? r.Employee_Info : null;
  var empDisplay = empObj ? (empObj.Full_Name || empObj.Employee_ID || empObj.zc_display_value || empObj.ID)
                          : (r["Employee_Info.Full_Name"] || r["Employee_Info.Employee_ID"] || r.Employee_ID || r.Employee_Info || "—");
  var empRawId   = empObj ? empObj.ID : (r.Employee_Info || "");

  var parts    = String(empDisplay).trim().split(/[\s\-]+/);
  var initials = parts.length >= 2
    ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
    : String(empDisplay).substring(0,2).toUpperCase();

  var pos = AREA_POSITIONS[r.Zone] || null;

  // Treat empty strings as null for datetime fields
  function clean(v){ return (v && v !== "") ? v : null; }

  return {
    id:              r.ID,
    empId:           empDisplay,
    empRawId:        empRawId,
    initials:        initials,
    zone:            r.Zone  || "",
    dateTime:        r.Date_Time || "",
    currentStatus:   r.Current_Status || "Active",
    Break_Type_Start: clean(r.Break_Type_Start),
    Break_Type_End:   clean(r.Break_Type_End),
    Lunch_Start:      clean(r.Lunch_Start),
    Lunch_End:        clean(r.Lunch_End),
    Break_2_Start:    clean(r.Break_2_Start),
    Break_2_End:      clean(r.Break_2_End),
    x: pos ? pos.x : null,
    y: pos ? pos.y : null,
  };
}

// ═══════════════════════════════════════════════════════
//  ZOHO LOADS + POLLING
// ═══════════════════════════════════════════════════════
function loadRecords(){
  ZOHO.CREATOR.DATA.getRecords({
    app_name:    APP_NAME,
    report_name: REPORT_NAME,
    from:        1,
    max_records: 200,
  }).then(function(resp){
    if(resp.code === 3000){
      var all      = resp.data || [];
      var filtered = all.filter(function(r){ return todayFilter(r.Date_Time); });
      records = filtered.map(normalizeRecord);
      renderAll();
      // If manage modal is open, refresh it in-place with latest data
      if(managingId){
        var updated = records.find(function(r){ return r.id === managingId; });
        if(updated) refreshManageModal(updated);
      }
      setLiveStatus(true);
    } else {
      console.error("[Staffing Widget] loadRecords failed:", resp.code, resp.message);
      setLiveStatus(false);
    }
  }).catch(function(err){
    console.error("[Staffing Widget] loadRecords exception:", err);
    setLiveStatus(false);
  });
}

function loadEmployees(){
  ZOHO.CREATOR.DATA.getRecords({
    app_name:    APP_NAME,
    report_name: EMP_REPORT_NAME,
    from:        1,
    max_records: 1000,
  }).then(function(resp){
    if(resp.code === 3000 && resp.data && resp.data.length){
      allEmployees = resp.data.map(function(r){
        var label = r.Full_Name || r.Employee_ID
                 || (r.First_Name ? r.First_Name+" "+(r.Last_Name||"") : null)
                 || r.ID;
        return { id: r.ID, label: String(label).trim() };
      }).sort(function(a,b){ return a.label.localeCompare(b.label); });
      console.log("[Staffing Widget] Employees ready:", allEmployees.length);
    } else {
      console.warn("[Staffing Widget] No employee data:", resp.code, resp.message);
    }
  }).catch(function(err){
    console.error("[Staffing Widget] loadEmployees exception:", err);
  });
}

function setLiveStatus(ok){
  var dot = document.getElementById("live-dot");
  var ts  = document.getElementById("last-updated");
  if(dot) dot.style.background = ok ? "#22c55e" : "#ef4444";
  if(dot) dot.style.boxShadow  = ok ? "0 0 6px rgba(34,197,94,.7)" : "0 0 6px rgba(239,68,68,.7)";
  if(ts)  ts.textContent = ok
    ? "Updated "+new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})
    : "⚠️ Connection error";
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function renderAll(){
  // Remove old pins
  canvas().querySelectorAll(".pin,.plus-pin").forEach(el=>el.remove());

  const assignedZones=new Set(records.map(r=>r.zone));

  // For each zone: show employee pin or + pin
  Object.entries(AREA_POSITIONS).forEach(([zoneName,pos])=>{
    const rec=records.find(r=>r.zone===zoneName);
    if(rec){
      renderEmployeePin(rec);
    } else {
      renderPlusPin(zoneName,pos);
    }
  });

  updateCounts(assignedZones);
}

function renderEmployeePin(s){
  const status=deriveStatus(s);
  const cfg=STATUS_CFG[status]||STATUS_CFG["Active"];

  // Build status line with elapsed time
  const statusLine = buildStatusLine(s, status, cfg);

  const pin=document.createElement("div");
  pin.className="pin";
  pin.style.left=s.x+"px";
  pin.style.top =s.y+"px";
  pin.style.transform="translate(-50%,-50%)";
  pin.dataset.recId=s.id;
  pin.dataset.zone=s.zone;

  // Travel-distance tap — works reliably on iPad Safari where click can be swallowed
  var epDownX=0, epDownY=0;
  pin.addEventListener("pointerdown", function(e){ epDownX=e.clientX; epDownY=e.clientY; e.stopPropagation(); });
  pin.addEventListener("pointerup",   function(e){ if(Math.abs(e.clientX-epDownX)<8 && Math.abs(e.clientY-epDownY)<8) openManageModal(s.id); });

  pin.innerHTML=`
    ${status==="Active"?`<div class="ripple-ring" style="color:${cfg.color}"></div>`:""}
    <div class="avatar-circle" style="
      background:radial-gradient(circle at 35% 35%,${cfg.color}55,${cfg.color}18);
      border:3px solid ${cfg.color}; color:${cfg.color};
      box-shadow:0 0 16px ${cfg.color}77,0 3px 10px rgba(0,0,0,.8);
      animation:${status==="Active"?"pulse 2.8s ease-in-out infinite":"none"};
    ">${s.initials}</div>
    <div class="avatar-label" style="border-color:${cfg.color}44">
      <div class="emp-id">${s.empId}</div>
      <div class="zone-nm">${s.zone}</div>
      ${statusLine}
    </div>
    <div class="status-dot" style="background:${cfg.color};box-shadow:0 0 6px ${cfg.color}"></div>
  `;
  canvas().appendChild(pin);
}

function buildStatusLine(s, status, cfg){
  if(status === "Active"){
    return '<div class="status-nm" style="color:'+cfg.color+';font-weight:700">● Active</div>';
  }
  var startISO = status==="Break 1" ? s.Break_Type_Start : status==="Lunch" ? s.Lunch_Start : s.Break_2_Start;
  var elapsed = "";
  if(startISO){
    var startDt = parseZohoDate(startISO);
    if(startDt){
      var mins = Math.floor((Date.now() - startDt.getTime()) / 60000);
      elapsed = mins < 1 ? "just started" : mins + " min ago";
    }
  }
  return '<div class="status-nm" style="color:'+cfg.color+';font-weight:700">● '+cfg.label+'</div>'
       + (elapsed ? '<div class="status-elapsed" style="color:'+cfg.color+';font-size:8px;opacity:0.85">('+elapsed+')</div>' : '');
}

function renderPlusPin(zoneName,pos){
  const pin=document.createElement("div");
  pin.className="plus-pin";
  pin.style.left=pos.x+"px";
  pin.style.top =pos.y+"px";
  pin.style.transform="translate(-50%,-50%)";
  pin.innerHTML=`<div class="plus-circle">+</div><div class="plus-label">${zoneName}</div>`;

  // Same travel-distance tap detection for iPad Safari
  var ppDownX=0, ppDownY=0;
  pin.addEventListener("pointerdown", function(e){ ppDownX=e.clientX; ppDownY=e.clientY; e.stopPropagation(); });
  pin.addEventListener("pointerup",   function(e){ if(Math.abs(e.clientX-ppDownX)<8 && Math.abs(e.clientY-ppDownY)<8) openAssignModal(zoneName); });
  canvas().appendChild(pin);
}

function drawZoneBoxes(){
  const svg=document.getElementById("zone-layer");
  svg.innerHTML="";
  Object.entries(AREA_POSITIONS).forEach(([name,pos])=>{
    if(!pos.box) return;
    const b=pos.box;

    // Zone fill rect
    const rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute("x",b.x); rect.setAttribute("y",b.y);
    rect.setAttribute("width",b.w); rect.setAttribute("height",b.h);
    rect.setAttribute("fill","rgba(255,220,0,0.12)");
    rect.setAttribute("stroke","#FFD700");
    rect.setAttribute("stroke-width","4");
    rect.setAttribute("stroke-dasharray","14 6");
    rect.setAttribute("rx","6");
    svg.appendChild(rect);

    // Label backing pill
    const labelW = name.length*13+20;
    const labelH = 28;
    const lx=b.x+6, ly=b.y+6;

    const pill=document.createElementNS("http://www.w3.org/2000/svg","rect");
    pill.setAttribute("x",lx); pill.setAttribute("y",ly);
    pill.setAttribute("width",labelW); pill.setAttribute("height",labelH);
    pill.setAttribute("fill","rgba(0,0,0,0.72)");
    pill.setAttribute("rx","5");
    svg.appendChild(pill);

    // Label text
    const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
    txt.setAttribute("x",lx+10); txt.setAttribute("y",ly+20);
    txt.setAttribute("fill","#FFD700");
    txt.setAttribute("font-size","17");
    txt.setAttribute("font-weight","800");
    txt.setAttribute("font-family","Segoe UI, Arial, sans-serif");
    txt.setAttribute("letter-spacing","0.5");
    txt.textContent=name;
    svg.appendChild(txt);
  });
}

function updateCounts(assignedZones){
  const totalZones = Object.keys(AREA_POSITIONS).length;
  // Active = on shift today (Date_Time is today's date) and not on break/lunch
  document.getElementById("cnt-active").textContent =
    records.filter(r => isToday(r.dateTime) && deriveStatus(r)==="Active").length;
  document.getElementById("cnt-break").textContent =
    records.filter(r => deriveStatus(r)==="Break 1" || deriveStatus(r)==="Break 2").length;
  document.getElementById("cnt-lunch").textContent =
    records.filter(r => deriveStatus(r)==="Lunch").length;
  document.getElementById("cnt-unassigned").textContent =
    totalZones - (assignedZones || new Set(records.map(r=>r.zone))).size;
}

// ═══════════════════════════════════════════════════════
//  ASSIGN MODAL
// ═══════════════════════════════════════════════════════
function openAssignModal(zoneName){
  assigningZone=zoneName;
  document.getElementById("assign-zone-label").textContent="Zone: "+zoneName;
  document.getElementById("assign-error").textContent="";

  const sel=document.getElementById("assign-select");
  sel.innerHTML="<option value=''>Loading…</option>";
  document.getElementById("assign-modal").classList.add("open");

  // If employees haven't loaded yet (Zoho slow) — try fetching now
  const populate=()=>{
    sel.innerHTML="";
    const assignedEmpIds=new Set(records.map(r=>r.empRawId));

    if(!allEmployees.length){
      sel.innerHTML="<option value=''>⚠️ No employees found — check EMP_REPORT_NAME</option>";
      return;
    }

    const placeholder=document.createElement("option");
    placeholder.value=""; placeholder.textContent="— Select Employee —";
    sel.appendChild(placeholder);

    allEmployees.forEach(emp=>{
      const opt=document.createElement("option");
      opt.value=emp.id;
      const alreadyAssigned=assignedEmpIds.has(emp.id);
      opt.textContent=emp.label+(alreadyAssigned?" (already assigned)":"");
      if(alreadyAssigned) opt.style.color="#f97316";
      sel.appendChild(opt);
    });
  };

  if(allEmployees.length){
    console.log("[Staffing Widget] Using cached employees:", allEmployees.length);
    populate();
  } else if(typeof ZOHO!=="undefined"&&ZOHO.CREATOR){
    console.log("[Staffing Widget] On-demand employee fetch for zone:", zoneName);
    ZOHO.CREATOR.DATA.getRecords({
      app_name:    APP_NAME,
      report_name: EMP_REPORT_NAME,
      from:        1,
      max_records: 1000,
    }).then(function(resp){
      console.log("[Staffing Widget] On-demand emp response code:", resp.code, "count:", resp.data ? resp.data.length : 0);
      if(resp.code===3000 && resp.data && resp.data.length){
        console.log("[Staffing Widget] On-demand first record:", JSON.stringify(resp.data[0]));
        allEmployees = resp.data.map(function(r){
          var label = r.Full_Name || r.Employee_ID || r.Employee_Id
                   || (r.First_Name ? r.First_Name+" "+(r.Last_Name||"") : null)
                   || r.Name || r.ID;
          return { id: r.ID, label: label.trim() };
        }).sort(function(a,b){ return a.label.localeCompare(b.label); });
      } else {
        console.warn("[Staffing Widget] On-demand emp empty. code:", resp.code, "msg:", resp.message);
      }
      populate();
    }).catch(function(err){
      console.error("[Staffing Widget] On-demand emp error:", err);
      populate();
    });
  } else {
    sel.innerHTML="<option value=''>No employee data (dev mode)</option>";
  }
}

function closeAssignModal(){
  document.getElementById("assign-modal").classList.remove("open");
  assigningZone=null;
}

function confirmAssign(){
  const sel=document.getElementById("assign-select");
  const empId=sel.value;
  const empLabel=sel.options[sel.selectedIndex]?.textContent||"";
  if(!empId){ setAssignError("Please select an employee"); return; }

  // Client-side duplicate check
  const existing=records.find(r=>r.empRawId===empId);
  if(existing){
    setAssignError("⚠️ "+empLabel.split(" (")[0]+" is already assigned to \""+existing.zone+"\"");
    return;
  }

  setAssignError("");

  // Disable button + show saving state
  const btn=document.querySelector("#assign-modal .modal-btn-primary");
  const originalText=btn.textContent;
  btn.textContent="⏳ Saving…";
  btn.disabled=true;

  const now=new Date();
  const payload={
    Employee_Info:  empId,
    Zone:           assigningZone,
    Date_Time:      formatForZoho(now),
    Current_Status: "Active",
  };
  console.log("[Staffing Widget] Adding record with payload:", JSON.stringify(payload));

  zohoAdd(payload).then(newId=>{
    // Always reset button first
    btn.textContent=originalText;
    btn.style.background="";
    btn.disabled=false;

    if(!newId) return; // validation error — alert() already shown by zohoAdd

    // Success — build local record and render immediately
    const emp=allEmployees.find(e=>e.id===empId);
    const label=emp?emp.label:empId;
    const parts=label.trim().split(/[\s\-]+/);
    const initials=parts.length>=2?(parts[0][0]+parts[parts.length-1][0]).toUpperCase():label.substring(0,2).toUpperCase();
    const pos=AREA_POSITIONS[assigningZone];
    records.push({
      id:newId, empId:label, empRawId:empId, initials,
      zone:assigningZone, currentStatus:"Active",
      Break_Type_Start:null, Break_Type_End:null,
      Lunch_Start:null, Lunch_End:null,
      Break_2_Start:null, Break_2_End:null,
      x:pos?pos.x:null, y:pos?pos.y:null,
    });

    // Flash success then close
    btn.textContent="✅ Assigned!";
    btn.style.background="#22c55e";
    btn.disabled=true;
    setTimeout(function(){
      closeAssignModal();
      renderAll();
      showToast("✅ "+label+" assigned to "+assigningZone,"#22c55e");
    }, 900);
  });
}

function setAssignError(msg){ document.getElementById("assign-error").textContent=msg; }

// ═══════════════════════════════════════════════════════
//  MANAGE MODAL
// ═══════════════════════════════════════════════════════
function openManageModal(recId){
  managingId=recId;
  const s=records.find(r=>r.id===recId);
  if(!s) return;
  refreshManageModal(s);
  document.getElementById("manage-modal").classList.add("open");
}

function refreshManageModal(s){
  if(!s) s=records.find(r=>r.id===managingId);
  if(!s) return;

  const status=deriveStatus(s);
  const cfg=STATUS_CFG[status]||STATUS_CFG["Active"];

  // Avatar
  const av=document.getElementById("m-avatar");
  av.textContent=s.initials;
  av.style.cssText=`width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:19px;font-weight:800;flex-shrink:0;
    background:${cfg.bg};border:3px solid ${cfg.color};color:${cfg.color};
    box-shadow:0 0 20px ${cfg.color}55;`;

  document.getElementById("m-name").textContent=s.empId;
  document.getElementById("m-zone").textContent=s.zone;

  const badge=document.getElementById("m-status");
  var badgeText = cfg.label;
  // Add elapsed time for active breaks
  var activeStart = null;
  if(status === "Break 1") activeStart = s.Break_Type_Start;
  else if(status === "Lunch")   activeStart = s.Lunch_Start;
  else if(status === "Break 2") activeStart = s.Break_2_Start;
  if(activeStart){
    var mins = Math.floor((Date.now() - new Date(activeStart).getTime()) / 60000);
    badgeText += " · " + (mins < 1 ? "just started" : mins + " min");
  }
  badge.textContent=badgeText;
  badge.style.cssText=`display:inline-block;margin-top:5px;font-size:10px;
    padding:3px 10px;border-radius:99px;font-weight:600;
    background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.color}55;`;

  const active=anyActive(s);

  // ── Break 1 ──
  const b1Started = hasVal(s.Break_Type_Start);
  const b1Ended   = hasVal(s.Break_Type_End);
  const b1Active  = b1Started && !b1Ended;

  setBtn("btn-b1s", !b1Started && !active,          "▶ Start");
  setBtn("btn-b1e", b1Active,                        "■ End", b1Active?"active-end":"");
  setTs("ts-b1",
    b1Started ? "Started: "+fmtTs(s.Break_Type_Start) : "",
    b1Ended   ? "  Ended: "+fmtTs(s.Break_Type_End)   : "",
    b1Active
  );

  // ── Lunch ──
  const lStarted = hasVal(s.Lunch_Start);
  const lEnded   = hasVal(s.Lunch_End);
  const lActive  = lStarted && !lEnded;

  setBtn("btn-ls", !lStarted && !active,   "▶ Start");
  setBtn("btn-le", lActive,                "■ End",  lActive?"active-end":"");
  document.getElementById("btn-ls").classList.add("btn-lunch-start");
  document.getElementById("btn-le").classList.toggle("btn-lunch-end",true);
  setTs("ts-lunch",
    lStarted ? "Started: "+fmtTs(s.Lunch_Start) : "",
    lEnded   ? "  Ended: "+fmtTs(s.Lunch_End)   : "",
    lActive
  );

  // ── Break 2 (requires lunch completed) ──
  const b2Started = hasVal(s.Break_2_Start);
  const b2Ended   = hasVal(s.Break_2_End);
  const b2Active  = b2Started && !b2Ended;
  const lunchDone = lStarted && lEnded;

  setBtn("btn-b2s", !b2Started && lunchDone && !active, "▶ Start");
  setBtn("btn-b2e", b2Active,                           "■ End", b2Active?"active-end":"");
  setTs("ts-b2",
    b2Started ? "Started: "+fmtTs(s.Break_2_Start) : "",
    b2Ended   ? "  Ended: "+fmtTs(s.Break_2_End)   : "",
    b2Active
  );

  document.getElementById("saving-msg").classList.remove("show");
}

function setBtn(id, enabled, label, extraClass=""){
  const btn=document.getElementById(id);
  btn.disabled=!enabled;
  btn.textContent=(id.endsWith("s")?"▶ ":"■ ")+label.replace(/^[▶■] /,"");
  // clean extra classes
  btn.classList.remove("active-end","btn-lunch-end");
  if(extraClass) btn.classList.add(extraClass);
}

function setTs(id, line1, line2, isActive){
  const el=document.getElementById(id);
  el.innerHTML=(line1?"<div>"+line1+"</div>":"")+(line2?"<div>"+line2+"</div>":"");
  el.className="ts-mini"+(isActive?" active":"");
}

function closeManageModal(){
  document.getElementById("manage-modal").classList.remove("open");
  managingId=null;
}

// ═══════════════════════════════════════════════════════
//  ACTION HANDLER
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
//  ACTION HANDLER
//  Field names match Staffing_Map schema exactly:
//    Break_Type_Start, Break_Type_End  → Break 1
//    Lunch_Start, Lunch_End            → Lunch
//    Break_2_Start, Break_2_End        → Break 2
//    Current_Status                    → text field updated on every action
// ═══════════════════════════════════════════════════════
const ACTION_MAP={
  b1s:{ field:"Break_Type_Start", localField:"Break_Type_Start", status:"Break 1" },
  b1e:{ field:"Break_Type_End",   localField:"Break_Type_End",   status:"Active"  },
  ls: { field:"Lunch_Start",      localField:"Lunch_Start",      status:"Lunch"   },
  le: { field:"Lunch_End",        localField:"Lunch_End",        status:"Active"  },
  b2s:{ field:"Break_2_Start",    localField:"Break_2_Start",    status:"Break 2" },
  b2e:{ field:"Break_2_End",      localField:"Break_2_End",      status:"Active"  },
};

function doAction(actionKey){
  const s=records.find(r=>r.id===managingId);
  if(!s) return;
  const act=ACTION_MAP[actionKey];
  if(!act) return;

  const now=new Date();
  const nowZoho=formatForZoho(now);
  const nowISO=now.toISOString();

  setSaving(true);

  // Payload uses exact Zoho form field names
  const payload={
    [act.field]:    nowZoho,
    Current_Status: act.status,
  };

  zohoUpdate(s.id, payload).then(ok=>{
    if(!ok){ setSaving(false); return; }

    // Update local record to keep UI in sync
    s[act.localField] = nowISO;
    s.currentStatus   = act.status;

    setSaving(false);
    renderAll();
    refreshManageModal(s);

    const icons ={ b1s:"☕", b1e:"✅", ls:"🍽️", le:"✅", b2s:"☕", b2e:"✅" };
    const labels={ b1s:"Break 1 started", b1e:"Break 1 ended", ls:"Lunch started", le:"Lunch ended", b2s:"Break 2 started", b2e:"Break 2 ended" };
    showToast(icons[actionKey]+" "+s.empId+" — "+labels[actionKey],
      actionKey.endsWith("e")?"#22c55e":"#f97316");
  });
}

// ═══════════════════════════════════════════════════════
//  UNASSIGN
// ═══════════════════════════════════════════════════════
function unassignEmployee(){
  const s=records.find(r=>r.id===managingId);
  if(!s) return;
  if(!confirm(`Remove ${s.empId} from "${s.zone}"? This will delete the staffing record.`)) return;
  setSaving(true);
  zohoDelete(s.id).then(ok=>{
    if(!ok){ setSaving(false); return; }
    records=records.filter(r=>r.id!==s.id);
    closeManageModal();
    renderAll();
    showToast("🗑 "+s.empId+" removed from "+s.zone,"#6b7280");
  });
}

// ═══════════════════════════════════════════════════════
//  ZOHO API — uses ZOHO.CREATOR.DATA matching dispatch widget
// ═══════════════════════════════════════════════════════
function zohoUpdate(recId, data){
  console.log("[Staffing Widget] zohoUpdate id:", recId, "data:", JSON.stringify(data));
  return ZOHO.CREATOR.DATA.updateRecordById({
    app_name:    APP_NAME,
    report_name: REPORT_NAME,
    id:          recId,
    payload:     { data: data },
  }).then(function(resp){
    console.log("[Staffing Widget] zohoUpdate resp:", resp.code, resp.message||"");
    if(resp.code !== 3000){ showToast("⚠️ Save failed ("+resp.code+"): "+(resp.message||""), "#ef4444"); return false; }
    return true;
  }).catch(function(e){ console.error("[Staffing Widget] zohoUpdate err:", e); showToast("⚠️ "+e, "#ef4444"); return false; });
}

function zohoAdd(data){
  console.log("[Staffing Widget] zohoAdd:", JSON.stringify(data));
  return ZOHO.CREATOR.DATA.addRecords({
    app_name:  APP_NAME,
    form_name: FORM_NAME,
    payload:   { data: [data] },
  }).then(function(resp){
    console.log("[Staffing Widget] zohoAdd FULL resp:", JSON.stringify(resp));

    // Zoho returns code:3000 at top level even for validation failures.
    // Check result[0] for nested errors or success data.
    if(resp.code === 3000 && resp.result && resp.result[0]){
      var result = resp.result[0];

      // Validation error from Deluge alert()
      if(result.code === 3001){
        var msg = "Validation error";
        if(result.error && result.error.length){
          var alertErr = result.error.find(function(e){ return e.task === "alert"; });
          if(alertErr && alertErr.alert_message && alertErr.alert_message.length){
            var raw = alertErr.alert_message[0];
            var txt = document.createElement("textarea");
            txt.innerHTML = raw;
            msg = txt.value;
          }
        }
        alert(msg);
        return null;
      }

      // Success — ID may be in result.data, result.ID, or data array
      var newId = null;
      if(result.data && result.data.ID)       newId = result.data.ID;
      else if(result.ID)                       newId = result.ID;
      else if(resp.data && resp.data[0])       newId = resp.data[0].ID;
      else if(result.data && result.data[0])   newId = result.data[0].ID;

      // If we still don't have an ID, use a timestamp fallback so modal closes
      if(!newId){
        console.warn("[Staffing Widget] Could not extract ID from resp — using fallback. Full resp:", JSON.stringify(resp));
        newId = "LOCAL_" + Date.now();
      }
      return newId;
    }

    if(resp.code !== 3000){
      alert("Add failed ("+resp.code+"): "+(resp.message||""));
      return null;
    }

    return resp.data && resp.data[0] ? resp.data[0].ID : ("LOCAL_"+Date.now());
  }).catch(function(e){
    console.error("[Staffing Widget] zohoAdd err:", e);
    alert("Save error: " + e);
    return null;
  });
}

function zohoDelete(recId){
  console.log("[Staffing Widget] zohoDelete id:", recId);
  return ZOHO.CREATOR.DATA.deleteRecordById({
    app_name:    APP_NAME,
    report_name: REPORT_NAME,
    id:          recId,
  }).then(function(resp){
    console.log("[Staffing Widget] zohoDelete resp:", resp.code);
    if(resp.code !== 3000){ showToast("⚠️ Delete failed ("+resp.code+")", "#ef4444"); return false; }
    return true;
  }).catch(function(e){ console.error("[Staffing Widget] zohoDelete err:", e); showToast("⚠️ "+e, "#ef4444"); return false; });
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function setSaving(on){
  document.getElementById("saving-msg").classList.toggle("show",on);
  ["btn-b1s","btn-b1e","btn-ls","btn-le","btn-b2s","btn-b2e"].forEach(id=>{
    const b=document.getElementById(id); if(b) b.disabled=on||b.disabled;
  });
}

function fmtTs(v){
  if(!v || v === "") return "";
  try{
    var dt = parseZohoDate(v) || new Date(v);
    if(isNaN(dt.getTime())) return v;
    return dt.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
  } catch(e){ return v; }
}

function formatForZoho(d){
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const p=n=>String(n).padStart(2,"0");
  return `${p(d.getDate())}-${months[d.getMonth()]}-${d.getFullYear()} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function showToast(msg,color="#22c55e"){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.background=color;
  t.style.boxShadow=`0 4px 20px ${color}55`;
  t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),3500);
}

function hideStateOverlay(){ const el=document.getElementById("state-overlay"); if(el) el.style.display="none"; }
function setStateMsg(msg){ const el=document.getElementById("state-msg"); if(el){el.innerHTML=msg;el.style.color=msg.startsWith("⚠️")?"#ef4444":"#8b949e";} const sp=document.querySelector(".spinner"); if(sp&&msg.startsWith("⚠️")) sp.style.display="none"; }

document.getElementById("assign-modal").addEventListener("click",function(e){if(e.target===this)closeAssignModal();});
document.getElementById("manage-modal").addEventListener("click",function(e){if(e.target===this)closeManageModal();});

function startImageLoad(){
  var img = document.getElementById("floor-img");
  img.onerror = function(){ console.error("[Staffing Widget] Image failed:", MAP_IMAGE_URL); };
  img.onload = function(){
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    console.log("[Staffing Widget] Image loaded:", imgW, "x", imgH);
    var svg = document.getElementById("zone-layer");
    svg.setAttribute("viewBox", "0 0 " + imgW + " " + imgH);
    svg.setAttribute("width",  imgW);
    svg.setAttribute("height", imgH);
    svg.style.width  = imgW + "px";
    svg.style.height = imgH + "px";
    drawZoneBoxes();
    fitView();
    // Second call after short delay — catches iPad Safari late layout settle
    setTimeout(fitView, 300);
    setTimeout(fitView, 800);
  };
  img.src = MAP_IMAGE_URL;
}

startImageLoad();

// Auto-refresh every 15s — same pattern as dispatch/CSR widgets
var POLL_INTERVAL = 15000;
var pollTimer = null;

function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadRecords, POLL_INTERVAL);
}

// Bare call at bottom — no window.onload wrapper — matches dispatch widget exactly
ZOHO.CREATOR.UTIL.getInitParams().then(function(params){
  console.log("[Staffing Widget] getInitParams OK:", JSON.stringify(params));
  loadEmployees();
  loadRecords();
  hideStateOverlay();
  renderAll();
  startPolling(); // 15s poll — same pattern as dispatch/CSR widgets
}).catch(function(err){
  console.error("[Staffing Widget] getInitParams failed:", err);
  hideStateOverlay();
  renderAll();
});
</script>
