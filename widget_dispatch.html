<!DOCTYPE html>
<!--
  DISPATCHER QUEUE WIDGET — v3.1
  ===============================
  App: lax-abg | Report: All_Vehicle_Requests | Poll: 4s

  CHANGES LOG (latest first):
  v3.1:
  - "Vehicle Coming From" radio (Quick Flip / Pumps) with ETA dropdown
  - Auto-select radio + default ETA based on loginUser email ("quick"→QF/5min, "pump"→Pumps/20min)
  - ETA_Minutes (number) + ETA (TIME field, hh:mm:ss AM/PM) written on assign
  - Block assignment when WAND statusFull contains "on move" — saves Avis lookup, shows error
  - Cross_Border + Extended_Rental fields shown in vehicle cell (red, like One-Way)
  v3:
  - Rover/WAND API lookup on 8-digit MVA entry
  - "Next →" gate: dispatcher must view results before stall + assign
  - On API error/timeout: warning shown, assign allowed
  - After assign: creates/updates Avis_lookup_Requests, writes Avis_lookup_ID back
  - Substitution rule check against All_Vehicle_Substitution_Rules
  v2:
  - Parameterized CONFIG block
  - Upsell/Walk-up/One-Way labels
  - Pump user stall auto-fill "LZ"
  - Priority sort: Upsell/Walk-up New records at top
  - Barcode scanner, audio ding on new request

  TIMEOUT PERIODS (configurable in CONFIG):
  - Assigned: hidden after ASSIGNED_HIDE_MS (default 5 min)
  - Cancelled: hidden after ASSIGNED_HIDE_MS (default 5 min)
  - Unassigned New: auto-deleted after UNASSIGNED_DELETE_MS (default 4 hrs)
  - In Progress: never auto-hidden

  SORT ORDER: Priority New → Normal New → In Progress → Assigned → Cancelled
  VALIDATION: MVA digits, stall required, duplicate MVA, sub rules, on-move block
-->
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <style>
    :root{--bg:#f0f2f5;--card:#fff;--header-bg:linear-gradient(135deg,#1a1f36 0%,#252d4a 100%);--th-bg:#f1f5f9;--th-text:#64748b;--border:#e8ecf1;--text:#1e293b;--text-muted:#64748b;--text-faint:#94a3b8;--accent:#3b82f6;--accent-hover:#2563eb;--purple:#7c3aed;--purple-hover:#6d28d9;--amber:#f59e0b;--amber-hover:#d97706;--gray-btn:#64748b;--gray-btn-hover:#475569;--green:#10b981;--red:#ef4444;--radius:12px;--radius-sm:8px;--shadow-sm:0 1px 2px rgba(0,0,0,.04),0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 6px rgba(0,0,0,.04),0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 25px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.06);--transition:.15s ease}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
    .header{background:var(--header-bg);padding:20px 24px;display:flex;justify-content:space-between;align-items:center}
    .header-left{display:flex;align-items:center;gap:10px}
    .header h2{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px}
    .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
    .status-dot.live{background:var(--green);box-shadow:0 0 8px rgba(16,185,129,.6);animation:pulse 2s infinite}
    .status-dot.error{background:var(--red);box-shadow:0 0 8px rgba(239,68,68,.6)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .last-update{font-size:12px;color:var(--text-faint);font-weight:500}
    .toolbar{padding:16px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
    .search-box{flex:1;max-width:400px;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius);font-size:15px;font-family:inherit;outline:none;background:var(--card);color:var(--text);transition:border-color var(--transition),box-shadow var(--transition)}
    .search-box:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(59,130,246,.1)}
    .search-box::placeholder{color:var(--text-faint)}
    .record-count{font-size:15px;font-weight:600;color:var(--text-muted);white-space:nowrap;background:var(--card);padding:8px 16px;border-radius:20px;box-shadow:var(--shadow-sm)}
    .table-wrap{padding:0 24px 24px}
    .table-container{background:var(--card);border-radius:var(--radius);overflow:auto;-webkit-overflow-scrolling:touch;box-shadow:var(--shadow-md);max-height:80vh}
    table{width:100%;border-collapse:collapse;min-width:640px}
    thead{position:sticky;top:0;z-index:10}
    th{background:var(--th-bg);color:var(--th-text);padding:12px 10px;text-align:left;font-size:15px;font-weight:600;letter-spacing:.3px;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:2px solid #e2e8f0;transition:background var(--transition)}
    th:hover{background:#e2e8f0}th.no-sort{cursor:default}th.no-sort:hover{background:var(--th-bg)}
    .sort-arrow{font-size:10px;margin-left:3px;opacity:.35}
    th.sort-active{color:#1e293b}th.sort-active .sort-arrow{opacity:1;color:var(--accent)}
    td{padding:10px 10px;font-size:15px;vertical-align:middle;border-bottom:1px solid var(--border);transition:background var(--transition)}
    tr:last-child td{border-bottom:none}tr:hover td{background:#f8fafc}
    tr.row-ip td{background:rgba(124,58,237,.03)}tr.row-ip:hover td{background:rgba(124,58,237,.06)}
    tr.row-assigned td{background:rgba(59,130,246,.03)}tr.row-assigned:hover td{background:rgba(59,130,246,.06)}
    tr.row-cancelled td{background:rgba(239,68,68,.03);opacity:.7}tr.row-cancelled:hover td{background:rgba(239,68,68,.06)}
    tr.group-divider td{border-top:2px solid var(--border);padding-top:16px}
    .badge{padding:4px 10px;border-radius:6px;font-size:15px;font-weight:700;letter-spacing:.3px;display:inline-block}
    .badge.new{background:#fef3c7;color:#92400e}.badge.pending{background:#fef3c7;color:#92400e}
    .badge.in-progress{background:#ede9fe;color:#6d28d9}.badge.assigned{background:#d1fae5;color:#065f46;font-weight:800}
    .badge.dispatched{background:#dbeafe;color:#1e40af}.badge.en-route{background:#d1fae5;color:#065f46}
    .badge.completed{background:#e5e7eb;color:#374151}.badge.cancelled{background:#fee2e2;color:#b91c1c}
    .age-badge{font-weight:700;font-size:15px;font-variant-numeric:tabular-nums}
    .age-ok{color:#059669}.age-warn{color:#d97706}
    .age-urgent{color:#dc2626;animation:urgentPulse 1.5s ease-in-out infinite}
    @keyframes urgentPulse{0%,100%{opacity:1}50%{opacity:.6}}
    .priority-tag{font-weight:700;color:#dc2626;font-size:16px}
    .oneway-tag{font-size:13px;color:#dc2626;font-weight:600}
    .spec-tag{font-size:13px;color:var(--text-muted)}
    .flash{animation:flashRow 1.2s ease-out}
    @keyframes flashRow{0%{background:rgba(251,191,36,.25)}100%{background:transparent}}
    .btn-assign,.btn-reassign,.btn-markip,.btn-unclaim{border:none;padding:8px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all var(--transition);-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px;display:inline-flex;align-items:center;justify-content:center}
    .btn-assign{background:var(--accent);color:#fff;box-shadow:0 1px 3px rgba(59,130,246,.3)}.btn-assign:hover{background:var(--accent-hover);transform:translateY(-1px)}.btn-assign:active{transform:translateY(0)}
    .btn-reassign{background:var(--amber);color:#fff;box-shadow:0 1px 3px rgba(245,158,11,.3)}.btn-reassign:hover{background:var(--amber-hover);transform:translateY(-1px)}.btn-reassign:active{transform:translateY(0)}
    .btn-markip{background:var(--purple);color:#fff;box-shadow:0 1px 3px rgba(124,58,237,.3)}.btn-markip:hover{background:var(--purple-hover);transform:translateY(-1px)}.btn-markip:active{transform:translateY(0)}
    .btn-unclaim{background:var(--gray-btn);color:#fff;box-shadow:0 1px 3px rgba(100,116,139,.3)}.btn-unclaim:hover{background:var(--gray-btn-hover);transform:translateY(-1px)}.btn-unclaim:active{transform:translateY(0)}
    .btn-group{display:flex;gap:6px;flex-wrap:nowrap}
    .claimed-label{font-size:13px;color:var(--purple);font-weight:600;font-style:italic;padding:10px 0}
    .overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;justify-content:center;align-items:center}.overlay.active{display:flex}
    .popup{background:var(--card);border-radius:16px;padding:32px;max-width:480px;width:92%;box-shadow:var(--shadow-lg);animation:popIn .2s ease-out;max-height:90vh;overflow-y:auto}
    @keyframes popIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
    .popup h3{margin:0 0 4px;font-size:20px;font-weight:700;color:var(--text)}.popup .subtitle{margin:0 0 24px;font-size:14px;color:var(--text-muted)}
    .form-group{margin-bottom:20px}.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
    .form-group input,.form-group select{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius);font-size:16px;font-family:inherit;box-sizing:border-box;outline:none;color:var(--text);transition:border-color var(--transition),box-shadow var(--transition);background:var(--card)}
    .form-group input:focus,.form-group select:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(59,130,246,.1)}
    .popup-buttons{display:flex;gap:12px;justify-content:flex-end;margin-top:24px}
    .popup-buttons button{padding:14px 28px;border-radius:var(--radius);font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;border:none;min-height:48px;transition:all var(--transition)}
    .btn-cancel{background:#f1f5f9;color:var(--text-muted)}.btn-cancel:hover{background:#e2e8f0}
    .btn-submit{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}.btn-submit:hover{background:var(--accent-hover);transform:translateY(-1px)}.btn-submit:disabled{background:#93c5fd;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-next{background:linear-gradient(135deg,#059669,#10b981);color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.35);padding:14px 28px;border-radius:var(--radius);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;border:none;min-height:48px;transition:all var(--transition);display:flex;align-items:center;gap:6px}
    .btn-next:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(16,185,129,.45)}.btn-next:active{transform:translateY(0)}
    .popup-error{display:none;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;margin-top:16px;font-weight:500}.popup-error.active{display:block}
    .no-results{text-align:center;padding:40px 24px;color:var(--text-faint);font-size:15px}
    .btn-scan{background:var(--text);color:#fff;border:none;padding:14px 18px;border-radius:var(--radius);font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;min-height:48px;transition:all var(--transition)}.btn-scan:hover{background:#0f172a}

    /* ── ROVER LOOKUP CARD ── */
    .rover-loading{display:none;align-items:center;gap:12px;padding:16px;background:#f8fafc;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px}
    .rover-loading.active{display:flex}
    .rover-spinner{width:20px;height:20px;border:3px solid #e2e8f0;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .rover-loading-text{font-size:14px;color:var(--text-muted);font-weight:500}
    .rover-card{display:none;border-radius:var(--radius);overflow:hidden;margin-bottom:20px;border:1px solid var(--border)}
    .rover-card.active{display:block}
    .rover-card-header{background:linear-gradient(135deg,#1a1f36,#252d4a);padding:14px 18px;display:flex;align-items:center;gap:8px}
    .rover-card-header span{font-size:12px;font-weight:700;letter-spacing:.8px;color:#94a3b8;text-transform:uppercase}
    .rover-card-header .rover-badge{background:rgba(59,130,246,.25);color:#93c5fd;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px}
    .rover-card-body{padding:16px 18px;background:#fff}
    .rover-vehicle-line{font-size:18px;font-weight:700;color:var(--text);margin-bottom:10px;line-height:1.3}
    .rover-status-line{font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px}
    .rover-status-full{font-size:13px;font-style:italic;color:var(--text-muted);line-height:1.5}
    .rover-status-full.alert{color:#b91c1c;font-weight:700;font-style:italic}
    .rover-class-chip{display:inline-flex;align-items:center;gap:6px;font-size:17px;font-weight:700;margin-bottom:8px}
    .rover-class-match{color:#059669}.rover-class-sub{color:#1e40af}.rover-class-invalid{color:#dc2626}
    .rover-class-sub-label{font-size:12px;font-weight:600;opacity:.8}
    .rover-warn{display:none;background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;margin-bottom:20px;align-items:flex-start;gap:8px}
    .rover-warn.active{display:flex}
    .rover-warn-icon{flex-shrink:0;font-size:16px}
    .rover-block{display:none;background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;padding:14px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;margin-bottom:20px}
    .rover-block.active{display:block}

    /* ── VEHICLE COMING FROM ── */
    .vcf-group{display:none;margin-bottom:20px}
    .vcf-group.active{display:block}
    .vcf-group label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
    .vcf-radios{display:flex;gap:12px;margin-bottom:12px}
    .vcf-radio{display:none}
    .vcf-label{display:inline-flex;align-items:center;justify-content:center;padding:10px 20px;border:2px solid var(--border);border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:all var(--transition);min-height:44px;color:var(--text-muted)}
    .vcf-radio:checked+.vcf-label{border-color:var(--accent);background:rgba(59,130,246,.08);color:var(--accent)}
    .vcf-eta-group{display:none}
    .vcf-eta-group.active{display:block}
    .vcf-eta-group label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.4px}

    @media(max-width:1024px){.header{padding:16px}.toolbar{padding:12px 16px}.table-wrap{padding:0 16px 16px}th{padding:12px 10px;font-size:14px}td{padding:10px 8px;font-size:15px}}
  </style>
</head>
<body>
<div class="header"><div class="header-left"><span class="status-dot live" id="statusDot"></span><h2>Dispatcher Queue</h2></div><span class="last-update" id="lastUpdate">Connecting...</span></div>
<div class="toolbar"><input type="text" class="search-box" id="searchBox" placeholder="Search vehicles, desk ID, MVA, stall..."><span class="record-count" id="recordCount"></span></div>
<div class="table-wrap"><div class="table-container"><table>
<thead><tr id="headerRow">
  <th data-col="age">Age <span class="sort-arrow">▼</span></th>
  <th data-col="requested">Requested <span class="sort-arrow">▼</span></th>
  <th data-col="vehicle">Vehicle <span class="sort-arrow">▼</span></th>
  <th data-col="desk">Desk <span class="sort-arrow">▼</span></th>
  <th data-col="status">Status <span class="sort-arrow">▼</span></th>
  <th class="no-sort">Actions</th>
  <th data-col="mva">Assignment <span class="sort-arrow">▼</span></th>
  <th data-col="assigntime">Assigned <span class="sort-arrow">▼</span></th>
</tr></thead>
<tbody id="dispatchBody"><tr><td colspan="8" class="no-results">Loading...</td></tr></tbody>
</table></div></div>

<!-- ═══ ASSIGN POPUP ═══ -->
<div class="overlay" id="assignOverlay"><div class="popup">
  <h3 id="popupTitle">Assign Vehicle</h3>
  <p class="subtitle">Assigning request for: <strong id="assignVehicle"></strong></p>

  <div class="form-group"><label for="inputMva">MVA Number</label>
    <div style="display:flex;gap:10px;align-items:stretch">
      <input type="text" id="inputMva" placeholder="Enter or scan MVA" style="flex:1" autocomplete="off">
      <button type="button" class="btn-scan" onclick="startScanner()">&#128247; Scan</button>
    </div>
  </div>

  <div id="scannerOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:2000;flex-direction:column;justify-content:center;align-items:center">
    <div style="position:relative;width:90%;max-width:420px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="color:#fff;font-size:16px;font-weight:600">Scan Barcode</span>
        <button onclick="stopScanner()" style="background:#ef4444;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Close</button>
      </div>
      <div id="scannerView" style="width:100%;border-radius:12px;overflow:hidden;background:#000;min-height:280px"></div>
      <p id="scannerStatus" style="color:#94a3b8;font-size:13px;text-align:center;margin-top:12px">Initializing camera...</p>
    </div>
  </div>

  <div class="rover-loading" id="roverLoading"><div class="rover-spinner"></div><span class="rover-loading-text">Looking up vehicle in WAND...</span></div>

  <div class="rover-card" id="roverCard">
    <div class="rover-card-header"><span>WAND Lookup</span><span class="rover-badge" id="roverCardMva"></span></div>
    <div class="rover-card-body">
      <div class="rover-vehicle-line" id="roverVehicleLine"></div>
      <div class="rover-class-chip" id="roverClassChip"></div>
      <div class="rover-status-line" id="roverStatusLine"></div>
      <div class="rover-status-full" id="roverStatusFull"></div>
      <div class="rover-color-chip" id="roverColorChip"></div>
    </div>
  </div>

  <div class="rover-warn" id="roverWarn"><span class="rover-warn-icon">⚠️</span><span id="roverWarnText"></span></div>
  <div class="rover-block" id="roverBlock"></div>

  <!-- Vehicle Coming From + ETA -->
  <div class="vcf-group" id="vcfGroup">
    <label>Vehicle Coming From</label>
    <div class="vcf-radios">
      <input type="radio" name="vcf" id="vcfQuick" value="Quick Flip" class="vcf-radio"><label for="vcfQuick" class="vcf-label">Quick Flip</label>
      <input type="radio" name="vcf" id="vcfPumps" value="Pumps" class="vcf-radio"><label for="vcfPumps" class="vcf-label">Pumps</label>
    </div>
    <div class="vcf-eta-group" id="vcfEtaGroup">
      <label for="inputEta">Approx. Minutes (ETA) to parking spot</label>
      <select id="inputEta">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="30">30</option>
      </select>
    </div>
  </div>

  <div class="form-group" id="stallGroup" style="display:none">
    <label for="inputStall">Stall #</label>
    <input type="text" id="inputStall" placeholder="Enter stall number">
  </div>

  <div class="popup-error" id="popupError"></div>
  <div class="popup-buttons" id="popupButtons">
    <button class="btn-cancel" onclick="closeAssignPopup()">Cancel</button>
    <button class="btn-next" id="btnNext" onclick="showStallStep()" style="display:none">Next &rarr;</button>
    <button class="btn-submit" id="btnSubmitAssign" onclick="submitAssign()" style="display:none">Assign</button>
  </div>
</div></div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
var CONFIG = {
  APP_NAME: "lax-abg",
  REPORT_NAME: "All_Vehicle_Requests",
  AVIS_LOOKUP_FORM: "Avis_lookup_Requests",
  AVIS_LOOKUP_REPORT: "All_Avis_Lookup_Requests",
  SUB_RULES_REPORT: "All_Vehicle_Substitution_Rules",

  POLL_INTERVAL: 4000,
  MAX_RECORDS: 200,
  ASSIGNED_HIDE_MS: 5 * 60 * 1000,
  UNASSIGNED_DELETE_MS: 4 * 60 * 60 * 1000,
  MVA_LENGTH: 8,
  PUMP_KEYWORD: "pump",
  PUMP_STALL_DEFAULT: "LZ",
  QUICK_KEYWORD: "quick",
  AGE_WARN_MIN: 10,
  AGE_URGENT_MIN: 20,

  UPSELL_LABEL: "Upsell (99)",
  WALKUP_LABEL: "Walk Up (49)",
  ONEWAY_LABEL: "One-Way Rental",
  CROSSBORDER_LABEL: "Cross Border",
  EXTENDEDRENTAL_LABEL: "Extended Rental",

  // ETA defaults per source
  ETA_DEFAULTS: { "Quick Flip": 5, "Pumps": 20 },
  ETA_OPTIONS: [5, 10, 20, 30],

  DING_FREQ_1: 880,
  DING_FREQ_2: 1175,
  ROVER_BASE_URL: "https://rover-proxy.autoflowx.workers.dev",
  ROVER_TIMEOUT_MS: 9000
};

/* ============================================================
   STATE
   ============================================================ */
var previousData={},currentRecords=[],displayRecords=[];
var assignRecordId=null,isReassign=false,firstLoadComplete=false;
var deletingIds={},previousRecordIds={},loggedInUser="",sdkReady=false;
var sortCol=null,sortDir="desc";
var audioCtx=null,audioUnlocked=false;
var roverApiKey="",roverData=null,roverLookupDone=false,roverLookupFailed=false;
var currentLookupMva="",requestedClass="";
var subRules=null,subRulesLoaded=false;
var onMoveBlocked=false;

/* ============================================================
   AUDIO
   ============================================================ */

/* ============================================================
   SORT
   ============================================================ */
function defaultSort(records){
  var priNew=[],normNew=[],ip=[],assigned=[],cancelled=[];
  for(var i=0;i<records.length;i++){var r=records[i];
    if(isCancelledStatus(r.Dispatch_Status))cancelled.push(r);
    else if(isAssignedStatus(r.Dispatch_Status))assigned.push(r);
    else if(isInProgressStatus(r.Dispatch_Status))ip.push(r);
    else if(isPriority(r))priNew.push(r);
    else normNew.push(r);
  }
  var byAdded=function(a,b){return(parseZohoDate(a.Added_Time)||0)-(parseZohoDate(b.Added_Time)||0);};
  priNew.sort(byAdded);normNew.sort(byAdded);ip.sort(byAdded);cancelled.sort(byAdded);
  assigned.sort(function(x,y){var da=parseZohoDate(x.Assignment_Time),db=parseZohoDate(y.Assignment_Time);return(db?db.getTime():0)-(da?da.getTime():0);});
  return priNew.concat(normNew).concat(ip).concat(assigned).concat(cancelled);
}
function getSortValue(r,col){switch(col){case"age":return getAge(r.Added_Time).minutes;case"requested":var d=parseZohoDate(r.Added_Time);return d?d.getTime():0;case"vehicle":return(r.Vehicle_Type||"").toLowerCase();case"desk":return(r.Your_desk_ID||"").toLowerCase();case"status":return(r.Dispatch_Status||"").toLowerCase();case"mva":return(r.Assigned_MVA||"").toString();case"assigntime":var at=parseZohoDate(r.Assignment_Time);return at?at.getTime():0;default:return"";}}
function columnSort(records,col,dir){var s=records.slice();s.sort(function(a,b){var va=getSortValue(a,col),vb=getSortValue(b,col),c=0;if(typeof va==="number"&&typeof vb==="number")c=va-vb;else c=va.toString().localeCompare(vb.toString());return dir==="desc"?-c:c;});return s;}
function updateSortHeaders(){var ths=document.querySelectorAll("#headerRow th[data-col]");for(var i=0;i<ths.length;i++){var th=ths[i],ar=th.querySelector(".sort-arrow");if(sortCol&&th.getAttribute("data-col")===sortCol){th.classList.add("sort-active");ar.textContent=sortDir==="desc"?"▼":"▲";}else{th.classList.remove("sort-active");ar.textContent="▼";}}}

function matchesSearch(r,t){if(!t)return true;var f=[r.Vehicle_Type,r.Specific_Make_Model_optional,r.Your_desk_ID,r.Dispatch_Status,r.Assigned_MVA,r.Stall_Number,r.Added_Time,r.Assignment_Time,getAge(r.Added_Time).text];if(isBool(r.Upsell))f.push("upsell");if(isBool(r.Walk_Up_Customer))f.push("walk-up");if(isBool(r.One_Way_Rental))f.push("one-way");if(isBool(r.Cross_Border))f.push("cross border");if(isBool(r.Extended_Rental))f.push("extended rental");for(var i=0;i<f.length;i++){if((f[i]||"").toString().toLowerCase().indexOf(t)>=0)return true;}return false;}

function validateAssignment(mva,stall,rid,live,reass){
  var mvaRegex=new RegExp("^\\d{"+CONFIG.MVA_LENGTH+"}$");
  if(!mva||!mva.length)return"MVA number is required.";
  if(!mvaRegex.test(mva))return"MVA must be exactly "+CONFIG.MVA_LENGTH+" digits.";
  if(!stall||!stall.length)return"Stall is required.";
  var target=null;for(var t=0;t<live.length;t++){if(live[t].ID&&live[t].ID.toString()===rid.toString()){target=live[t];break;}}
  if(!target)return"Request deleted or completed. Refreshing...";
  if(!reass){var ts=(target.Dispatch_Status||"").toLowerCase();if(ts.indexOf("assigned")>=0||ts.indexOf("dispatch")>=0||ts.indexOf("complet")>=0)return"Updated by another dispatcher. Refreshing...";}
  for(var i=0;i<live.length;i++){var r=live[i],ri=r.ID?r.ID.toString():"",rm=r.Assigned_MVA?r.Assigned_MVA.toString().trim():"",rs=r.Dispatch_Status?r.Dispatch_Status.toString().toLowerCase():"";if(ri===rid.toString())continue;if(rm===mva&&rs.indexOf("assigned")>=0)return"MVA "+mva+" already assigned.";}
  return null;
}
function parseUpdateError(r){try{if(r.responseText){var p=JSON.parse(r.responseText);if(p.alert_message)return p.alert_message;if(p.message&&p.message!=="error")return p.message;}if(r.message&&r.message!=="error")return r.message;}catch(e){}return"Operation failed.";}

   ROVER / WAND LOOKUP
   ============================================================ */
function isAlertStatus(sf){if(!sf)return false;var u=sf.toUpperCase();return u.indexOf("HOLD")>=0||u.indexOf("UNAVAILABLE")>=0;}
function isOnMove(sf){if(!sf)return false;return sf.toUpperCase().indexOf("ON MOVE")>=0;}
function classPrefix(str){if(!str)return"";var s=str.trim();var dash=s.indexOf("-");return dash>0?s.substring(0,dash).trim().toUpperCase():s.toUpperCase();}

function loadSubRules(requestedFullClass){
  subRules=null;subRulesLoaded=false;
  if(!requestedFullClass){subRulesLoaded=true;return;}
  var today=new Date();var dd=("0"+today.getDate()).slice(-2);var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];var todayStr=dd+"-"+months[today.getMonth()]+"-"+today.getFullYear();
  ZOHO.CREATOR.DATA.getRecords({app_name:CONFIG.APP_NAME,report_name:CONFIG.SUB_RULES_REPORT,criteria:'Vehicle_Type == "'+requestedFullClass+'"',page:1,max_records:200}).then(function(resp){
    if(resp.code!==3000||!resp.data||!resp.data.length){subRules=null;subRulesLoaded=true;return;}
    var valid=[];var todayMidnight=new Date(today.getFullYear(),today.getMonth(),today.getDate());
    for(var i=0;i<resp.data.length;i++){var r=resp.data[i];var raw=r.Date_in_Effect||"";var d=parseZohoDate(raw);if(!d&&raw){try{var dp=raw.trim().split("-");var months2=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];var mi=months2.indexOf(dp[1]);if(mi>=0)d=new Date(parseInt(dp[2]),mi,parseInt(dp[0]));}catch(pe){}}if(d&&d.getTime()<=todayMidnight.getTime())valid.push({date:d,rec:r});}
    if(!valid.length){subRules=null;subRulesLoaded=true;return;}
    valid.sort(function(a,b){return b.date.getTime()-a.date.getTime();});var best=valid[0].rec;var types=best.Acceptable_Substitution_Types;var prefixes=[];
    if(Array.isArray(types)){for(var j=0;j<types.length;j++)prefixes.push(classPrefix(types[j]));}else if(types)prefixes.push(classPrefix(types.toString()));
    subRules=prefixes;subRulesLoaded=true;
    if(roverData)renderRoverCard(roverData,currentLookupMva);
  }).catch(function(e){try{var p=JSON.parse(e.responseText||'{}');if(p.code===9280){subRules=null;subRulesLoaded=true;return;}}catch(pe){}subRules=null;subRulesLoaded=true;if(roverData)renderRoverCard(roverData,currentLookupMva);});
}

function renderRoverCard(data,mva){
  document.getElementById("roverCardMva").textContent="MVA "+mva;
  var parts=[];if(data.year)parts.push(data.year);if(data.make)parts.push(data.make);if(data.model)parts.push(data.model);if(data.color)parts.push("🎨 "+data.color);
  document.getElementById("roverVehicleLine").textContent=parts.join(" ")||(data.vehicle||"—");
  document.getElementById("roverColorChip").textContent="";
  var classEl=document.getElementById("roverClassChip");var roverPrefix=classPrefix(data.class||"");var reqPrefix=classPrefix(requestedClass||"");
  if(roverPrefix){var isSame=reqPrefix&&roverPrefix===reqPrefix;var isSub=reqPrefix&&roverPrefix!==reqPrefix;var subAllowed=true;
    if(isSub&&subRulesLoaded&&subRules!==null){subAllowed=false;for(var si=0;si<subRules.length;si++){if(subRules[si]===roverPrefix){subAllowed=true;break;}}}
    if(isSame){classEl.className="rover-class-chip rover-class-match";classEl.innerHTML="Class: "+roverPrefix;}
    else if(isSub&&subRulesLoaded&&subRules!==null&&!subAllowed){classEl.className="rover-class-chip rover-class-invalid";classEl.innerHTML='Class: '+roverPrefix+' <span class="rover-class-sub-label">(sub) &#9888; not allowed</span>';}
    else if(isSub){classEl.className="rover-class-chip rover-class-sub";classEl.innerHTML='Class: '+roverPrefix+' <span class="rover-class-sub-label">(sub)</span>';}
    else{classEl.className="rover-class-chip";classEl.innerHTML="Class: "+roverPrefix;}
  }else{classEl.textContent="";}
  document.getElementById("roverStatusLine").textContent=data.status||"—";
  var sfEl=document.getElementById("roverStatusFull");var fullParts=(data.statusFull||"").split("|").map(function(p){return p.trim();});var extraParts=fullParts.slice(1).filter(function(p){return p.length>0;});
  if(extraParts.length>0){sfEl.textContent=extraParts.join(" | ");sfEl.style.display="";if(isAlertStatus(data.statusFull)||isOnMove(data.statusFull))sfEl.classList.add("alert");else sfEl.classList.remove("alert");}else{sfEl.textContent="";sfEl.style.display="none";}
  document.getElementById("roverCard").classList.add("active");
}

function doRoverLookup(mva){
  if(mva===currentLookupMva&&roverLookupDone)return;
  currentLookupMva=mva;onMoveBlocked=false;
  document.getElementById("roverCard").classList.remove("active");
  document.getElementById("roverWarn").classList.remove("active");
  document.getElementById("roverBlock").classList.remove("active");
  document.getElementById("btnNext").style.display="none";
  document.getElementById("btnSubmitAssign").style.display="none";
  document.getElementById("stallGroup").style.display="none";
  document.getElementById("vcfGroup").classList.remove("active");
  roverLookupDone=false;roverLookupFailed=false;
  document.getElementById("roverLoading").classList.add("active");
  document.getElementById("inputMva").disabled=true;

  var url=CONFIG.ROVER_BASE_URL+"/rover?mva="+encodeURIComponent(mva);
  var timedOut=false;
  var timeoutHandle=setTimeout(function(){timedOut=true;onRoverError("WAND lookup timed out. You may still assign.");},CONFIG.ROVER_TIMEOUT_MS);

  fetch(url,{method:"GET"}).then(function(res){if(timedOut)return;clearTimeout(timeoutHandle);if(!res.ok)throw new Error("HTTP "+res.status);return res.json();}).then(function(json){
    if(timedOut)return;
    if(!json||json.error){onRoverError(json&&json.error?"WAND: "+json.error:"No data from WAND.");return;}
    roverData=json;roverLookupDone=true;roverLookupFailed=false;
    document.getElementById("roverLoading").classList.remove("active");
    document.getElementById("inputMva").disabled=false;
    renderRoverCard(json,mva);

    /* ── ON MOVE CHECK ── */
    if(isOnMove(json.statusFull)){
      onMoveBlocked=true;
      document.getElementById("roverBlock").textContent="Vehicle is On Move -- existing RA needs to be closed";
      document.getElementById("roverBlock").classList.add("active");
      /* Save to Avis lookup immediately */
      saveAvisLookup(mva,json,assignRecordId).then(function(avisId){
        if(avisId&&assignRecordId){
          ZOHO.CREATOR.DATA.updateRecordById({app_name:CONFIG.APP_NAME,report_name:CONFIG.REPORT_NAME,id:assignRecordId,payload:{data:{Avis_lookup_ID:avisId}}}).catch(function(){});
        }
      });
      return; /* no Next, no Assign */
    }

    document.getElementById("btnNext").style.display="flex";
  }).catch(function(err){if(timedOut)return;clearTimeout(timeoutHandle);onRoverError("WAND lookup failed: "+(err.message||"network error")+". You may still assign.");});
}

function onRoverError(msg){roverLookupDone=true;roverLookupFailed=true;document.getElementById("roverLoading").classList.remove("active");document.getElementById("inputMva").disabled=false;document.getElementById("roverWarnText").textContent=msg;document.getElementById("roverWarn").classList.add("active");showStallStep();}

/* ============================================================
   AVIS LOOKUP RECORD
   ============================================================ */
function saveAvisLookup(mva,data,vehicleRequestId){
  return new Promise(function(resolve,reject){
    if(!data){resolve(null);return;}
    var payload={MVA:mva,Vehicle_Request_Form_ID:vehicleRequestId||"",Rover_Model:data.model||"",Rover_Make:data.make||"",Rover_Color:data.color||"",Rover_Class:data.class||"",Rover_VIN:data.vin||"",Rover_Plate:data.plate||"",RA:data.raNumber||"",Status:data.status||"",Status_Full:data.statusFull||""};
    var criteria='MVA == "'+mva+'" && Vehicle_Request_Form_ID == "'+vehicleRequestId+'"';
    ZOHO.CREATOR.DATA.getRecords({app_name:CONFIG.APP_NAME,report_name:CONFIG.AVIS_LOOKUP_REPORT,criteria:criteria,page:1,max_records:200}).then(function(resp){
      if(resp.code===3000&&resp.data&&resp.data.length>0){var existingId=resp.data[0].ID.toString();
        ZOHO.CREATOR.DATA.updateRecordById({app_name:CONFIG.APP_NAME,report_name:CONFIG.AVIS_LOOKUP_REPORT,id:existingId,payload:{data:payload}}).then(function(ur){resolve(existingId);}).catch(function(){resolve(existingId);});
      }else{doAddAvisRecord(payload,resolve);}
    }).catch(function(e){try{var p=JSON.parse(e.responseText||'{}');if(p.code===9280){doAddAvisRecord(payload,resolve);return;}}catch(pe){}doAddAvisRecord(payload,resolve);});
  });
}
function doAddAvisRecord(payload,resolve){
  ZOHO.CREATOR.DATA.addRecords({app_name:CONFIG.APP_NAME,form_name:CONFIG.AVIS_LOOKUP_FORM,payload:{data:payload}}).then(function(ar){
    if(ar.code===3000&&ar.data&&ar.data.ID)resolve(ar.data.ID.toString());else resolve(null);
  }).catch(function(){resolve(null);});
}

function autoDeleteExpired(all){var now=Date.now();for(var i=0;i<all.length;i++){var r=all[i],id=r.ID?r.ID.toString():"";if(!id||deletingIds[id])continue;if(isAssignedStatus(r.Dispatch_Status)||isInProgressStatus(r.Dispatch_Status)||isCancelledStatus(r.Dispatch_Status))continue;if((r.Dispatch_Status||"").toLowerCase().indexOf("complet")>=0)continue;var ad=parseZohoDate(r.Added_Time);if(!ad||(now-ad.getTime())<=CONFIG.UNASSIGNED_DELETE_MS)continue;deletingIds[id]=true;ZOHO.CREATOR.DATA.deleteRecordById({app_name:CONFIG.APP_NAME,report_name:CONFIG.REPORT_NAME,id:id}).then(function(){delete deletingIds[id];}).catch(function(){delete deletingIds[id];});break;}}

function buildActionButtons(rec){
  var id=rec.ID,status=rec.Dispatch_Status||"New";
  var claimedBy=(rec.Claimed_By_Email||"").toLowerCase().trim();
  var isMe=loggedInUser&&claimedBy===loggedInUser.toLowerCase().trim();
  var ve=(rec.Vehicle_Type||'').replace(/'/g,"\\'");var vc=ve;
  var cm=(rec.Assigned_MVA||'').toString().replace(/'/g,"\\'");
  var cs=(rec.Stall_Number||'').toString().replace(/'/g,"\\'");
  if(isCancelledStatus(status))return'';
  if(isAssignedStatus(status))return'<button class="btn-reassign" onclick="openReassignPopup(\''+id+'\',\''+ve+'\',\''+cm+'\',\''+cs+'\',\''+vc+'\')">Re-assign</button>';
  if(isInProgressStatus(status)){
    if(isMe)return'<div class="btn-group"><button class="btn-assign" onclick="openAssignPopup(\''+id+'\',\''+ve+'\',\''+vc+'\')">Assign</button><button class="btn-unclaim" onclick="unclaimRecord(\''+id+'\')">Unclaim</button></div>';
    var cn=claimedBy?claimedBy.split("@")[0]:"someone";return'<span class="claimed-label">Claimed by '+cn+'</span>';
  }
  return'<div class="btn-group"><button class="btn-markip" onclick="markInProgress(\''+id+'\')">Mark IP</button><button class="btn-assign" onclick="openAssignPopup(\''+id+'\',\''+ve+'\',\''+vc+'\')">Assign</button></div>';
}

function renderTable(records){
  var tbody=document.getElementById("dispatchBody");
  if(!records||!records.length){tbody.innerHTML='<tr><td colspan="8" class="no-results">'+(getSearchTerm()?'No results':'No requests in queue')+'</td></tr>';return;}
  var html="",prevGroup="";
  records.forEach(function(rec){
    var id=rec.ID,recStr=JSON.stringify(rec),changed=previousData[id]&&previousData[id]!==recStr;previousData[id]=recStr;
    var status=rec.Dispatch_Status||"New",age=getAge(rec.Added_Time);
    var curGroup=rowClass(status),divider=(prevGroup&&curGroup!==prevGroup)?" group-divider":"";prevGroup=curGroup;
    html+='<tr class="'+curGroup+divider+(changed?' flash':'')+'">';
    html+='<td><span class="age-badge '+age.cls+'">'+age.text+'</span></td>';
    html+='<td>'+formatTime(rec.Added_Time)+'</td>';
    html+='<td>'+buildVehicleCell(rec)+'</td>';
    html+='<td>'+(rec.Your_desk_ID||'')+'</td>';
    html+='<td><span class="badge '+badgeClass(status)+'">'+status+'</span></td>';
    html+='<td>'+buildActionButtons(rec)+'</td>';
    html+='<td>'+buildAssignCell(rec)+'</td>';
    html+='<td>'+formatTime(rec.Assignment_Time)+'</td>';
    html+='</tr>';
  });
  tbody.innerHTML=html;
}

/* ============================================================
   SORT HEADER + SEARCH
   ============================================================ */
document.getElementById("headerRow").addEventListener("click",function(e){var th=e.target.closest("th[data-col]");if(!th)return;var col=th.getAttribute("data-col");if(col===sortCol)sortDir=sortDir==="desc"?"asc":"desc";else{sortCol=col;sortDir="desc";}refreshTable();});
var searchTimeout=null;document.getElementById("searchBox").addEventListener("input",function(){clearTimeout(searchTimeout);searchTimeout=setTimeout(refreshTable,150);});

/* ============================================================
   ASSIGN POPUP — OPEN / CLOSE
   ============================================================ */
function resetPopupRoverState(){
  roverLookupDone=false;roverLookupFailed=false;onMoveBlocked=false;
  subRules=null;subRulesLoaded=false;
  document.getElementById("roverCard").classList.remove("active");
  document.getElementById("roverLoading").classList.remove("active");
  document.getElementById("roverWarn").classList.remove("active");
  document.getElementById("roverBlock").classList.remove("active");
  document.getElementById("btnNext").style.display="none";
  document.getElementById("btnSubmitAssign").style.display="none";
  document.getElementById("stallGroup").style.display="none";
  document.getElementById("vcfGroup").classList.remove("active");
  document.getElementById("vcfEtaGroup").classList.remove("active");
  document.getElementById("vcfQuick").checked=false;
  document.getElementById("vcfPumps").checked=false;
  document.getElementById("inputMva").disabled=false;
}

function openAssignPopup(id,v,vc){
  assignRecordId=id;isReassign=false;requestedClass=vc||"";
  document.getElementById("popupTitle").textContent="Assign Vehicle";
  document.getElementById("assignVehicle").textContent=v;
  document.getElementById("inputMva").value="";
  document.getElementById("inputStall").value=loggedInUser.toLowerCase().indexOf(CONFIG.PUMP_KEYWORD)>=0?CONFIG.PUMP_STALL_DEFAULT:"";
  document.getElementById("btnSubmitAssign").textContent="Assign";
  clearPopupError();resetPopupRoverState();
  /* Auto-select VCF radio based on user */
  var lu=loggedInUser.toLowerCase();
  if(lu.indexOf(CONFIG.QUICK_KEYWORD)>=0){document.getElementById("vcfQuick").checked=true;onVcfChange();}
  else if(lu.indexOf(CONFIG.PUMP_KEYWORD)>=0){document.getElementById("vcfPumps").checked=true;onVcfChange();}
  loadSubRules(requestedClass);
  document.getElementById("assignOverlay").classList.add("active");
  setTimeout(function(){document.getElementById("inputMva").focus();},100);
}

function openReassignPopup(id,v,m,s,vc){
  assignRecordId=id;isReassign=true;requestedClass=vc||"";
  document.getElementById("popupTitle").textContent="Re-assign Vehicle";
  document.getElementById("assignVehicle").textContent=v;
  document.getElementById("inputMva").value=m;
  document.getElementById("inputStall").value=s;
  document.getElementById("btnSubmitAssign").textContent="Re-assign";
  clearPopupError();resetPopupRoverState();
  var lu=loggedInUser.toLowerCase();
  if(lu.indexOf(CONFIG.QUICK_KEYWORD)>=0){document.getElementById("vcfQuick").checked=true;onVcfChange();}
  else if(lu.indexOf(CONFIG.PUMP_KEYWORD)>=0){document.getElementById("vcfPumps").checked=true;onVcfChange();}
  loadSubRules(requestedClass);
  document.getElementById("assignOverlay").classList.add("active");
  if(m&&m.length===CONFIG.MVA_LENGTH){setTimeout(function(){doRoverLookup(m);},200);}
  else{document.getElementById("stallGroup").style.display="block";document.getElementById("vcfGroup").classList.add("active");revealAssignButton();}
}

function closeAssignPopup(){assignRecordId=null;isReassign=false;document.getElementById("assignOverlay").classList.remove("active");resetPopupRoverState();}

/* ============================================================
   SUBMIT ASSIGN
   ============================================================ */
function submitAssign(){
  if(!assignRecordId)return;
  var mva=document.getElementById("inputMva").value.trim();
  var stall=document.getElementById("inputStall").value.trim();
  clearPopupError();

  if(onMoveBlocked){showPopupError("Vehicle is On Move -- existing RA needs to be closed");return;}

  var mvaRegex=new RegExp("^\\d{"+CONFIG.MVA_LENGTH+"}$");
  if(!firstLoadComplete){showPopupError("Still loading.");return;}
  if(!mva||mva.length!==CONFIG.MVA_LENGTH){showPopupError("MVA must be "+CONFIG.MVA_LENGTH+" digits.");return;}
  if(!mvaRegex.test(mva)){showPopupError("MVA must be exactly "+CONFIG.MVA_LENGTH+" digits.");return;}
  if(!stall){showPopupError("Stall is required.");return;}

  /* VCF + ETA validation */
  var vcfSel=document.querySelector('input[name="vcf"]:checked');
  if(!vcfSel){showPopupError("Please select Vehicle Coming From.");return;}
  var etaMinutes=parseInt(document.getElementById("inputEta").value)||0;
  if(!etaMinutes){showPopupError("Please select ETA minutes.");return;}

  /* Sub rule check */
  if(roverData&&subRulesLoaded&&subRules!==null&&requestedClass){
    var roverP=classPrefix(roverData.class||"");var reqP=classPrefix(requestedClass);
    if(roverP&&reqP&&roverP!==reqP){var allowed=false;for(var si=0;si<subRules.length;si++){if(subRules[si]===roverP){allowed=true;break;}}
      if(!allowed){showPopupError("Class "+roverP+" is not an approved substitution for "+reqP+". Allowed: "+subRules.join(", ")+".");return;}}
  }

  var btn=document.getElementById("btnSubmitAssign");btn.textContent="Checking...";btn.disabled=true;

  fetchLatestRecords().then(function(response){
    if(response.code!==3000){btn.textContent=isReassign?"Re-assign":"Assign";btn.disabled=false;showPopupError("Could not verify queue.");return;}
    var live=response.data||[];currentRecords=applyFilter(live);
    var error=validateAssignment(mva,stall,assignRecordId,live,isReassign);
    if(error){btn.textContent=isReassign?"Re-assign":"Assign";btn.disabled=false;showPopupError(error);if(error.indexOf("another")>=0||error.indexOf("deleted")>=0)setTimeout(function(){closeAssignPopup();fetchDispatches();},2000);return;}

    btn.textContent=isReassign?"Re-assigning...":"Assigning...";
    var now=new Date(),months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var dd=("0"+now.getDate()).slice(-2),mmm=months[now.getMonth()],yyyy=now.getFullYear();
    var hh=now.getHours(),ampm=hh>=12?"PM":"AM";hh=hh%12;if(hh===0)hh=12;
    var mm=("0"+now.getMinutes()).slice(-2),ss=("0"+now.getSeconds()).slice(-2);
    var ts=dd+"-"+mmm+"-"+yyyy+" "+("0"+hh).slice(-2)+":"+mm+":"+ss+" "+ampm;

    /* Calculate ETA time = now + etaMinutes */
    var etaDate=new Date(Date.now()+etaMinutes*60*1000);
    var etaTime=buildZohoTime(etaDate);

    var payload={Assigned_MVA:mva,Stall_Number:stall,Dispatch_Status:"Assigned",Assignment_Time:ts,Vehicle_Coming_From:vcfSel.value,ETA_Minutes:etaMinutes,ETA:etaTime};
    var capturedRecordId=assignRecordId;

    ZOHO.CREATOR.DATA.updateRecordById({app_name:CONFIG.APP_NAME,report_name:CONFIG.REPORT_NAME,id:capturedRecordId,payload:{data:payload}}).then(function(ur){
      btn.textContent=isReassign?"Re-assign":"Assign";btn.disabled=false;
      if(ur.code===3000){
        closeAssignPopup();fetchDispatches();
        if(roverData){saveAvisLookup(mva,roverData,capturedRecordId).then(function(avisId){
          if(avisId){ZOHO.CREATOR.DATA.updateRecordById({app_name:CONFIG.APP_NAME,report_name:CONFIG.REPORT_NAME,id:capturedRecordId,payload:{data:{Avis_lookup_ID:avisId}}}).catch(function(){});}
        });}
      }else{showPopupError(parseUpdateError(ur));}
    }).catch(function(ue){btn.textContent=isReassign?"Re-assign":"Assign";btn.disabled=false;showPopupError(parseUpdateError(ue));});
  }).catch(function(){btn.textContent=isReassign?"Re-assign":"Assign";btn.disabled=false;showPopupError("Could not verify queue.");});
}

document.getElementById("inputStall").addEventListener("input",clearPopupError);
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeAssignPopup();if(e.key==="Enter"&&assignRecordId){var btn=document.getElementById("btnSubmitAssign");if(btn&&btn.style.display!=="none"&&!btn.disabled)submitAssign();}});

/* ============================================================
   FILTER + POLLING + INIT
   ============================================================ */
function applyFilter(all){var now=Date.now();return all.filter(function(r){var s=(r.Dispatch_Status||"").toLowerCase();
  if(s.indexOf("complet")>=0)return false;
  if(isAssignedStatus(r.Dispatch_Status)){var md=parseZohoDate(r.Modified_Time);if(md&&(now-md.getTime())>CONFIG.ASSIGNED_HIDE_MS)return false;}
  if(isCancelledStatus(r.Dispatch_Status)){var cd=parseZohoDate(r.Modified_Time);if(cd&&(now-cd.getTime())>CONFIG.ASSIGNED_HIDE_MS)return false;}
  if(isNewStatus(r.Dispatch_Status)){var ad=parseZohoDate(r.Added_Time);if(ad&&(now-ad.getTime())>CONFIG.UNASSIGNED_DELETE_MS)return false;}
  return true;});}

function fetchDispatches(){if(!sdkReady)return;fetchLatestRecords().then(function(response){if(response.code===3000){var all=response.data||[];autoDeleteExpired(all);currentRecords=applyFilter(all);checkForNewRequests(currentRecords);firstLoadComplete=true;refreshTable();document.getElementById("statusDot").className="status-dot live";document.getElementById("lastUpdate").textContent="Updated "+new Date().toLocaleTimeString();}}).catch(function(){document.getElementById("statusDot").className="status-dot error";document.getElementById("lastUpdate").textContent="Connection error";});}

ZOHO.CREATOR.UTIL.getInitParams().then(function(params){loggedInUser=params.loginUser||"";sdkReady=true;fetchDispatches();setInterval(fetchDispatches,CONFIG.POLL_INTERVAL);}).catch(function(){sdkReady=true;fetchDispatches();setInterval(fetchDispatches,CONFIG.POLL_INTERVAL);});
</script>
