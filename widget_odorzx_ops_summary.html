<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Jobs Summary</title>
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <style>
    :root {
      --col-header: #3a4a5c;
      --col-accent: #2e6da4;
      --col-foot:   #e8ecf2;
      --col-border: #dde3ec;
      --col-alt:    #f7f9fc;
      --col-muted:  #8a9bb0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #f0f3f8;
      color: #1e2a38;
      padding: 14px;
    }
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      background: #fff;
      padding: 10px 14px;
      border-radius: 7px;
      margin-bottom: 12px;
      border: 1px solid var(--col-border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .fg { display: flex; flex-direction: column; gap: 3px; }
    .fg label {
      font-size: 10px;
      font-weight: 700;
      color: var(--col-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .fg select,
    .fg input[type=date] {
      border: 1px solid var(--col-border);
      border-radius: 5px;
      padding: 5px 9px;
      font-size: 13px;
      color: #1e2a38;
      background: #fff;
      height: 31px;
    }
    .fg select { min-width: 160px; }
    .fg input[type=date] { min-width: 138px; }
    .fg select:focus, .fg input[type=date]:focus {
      outline: none;
      border-color: var(--col-accent);
      box-shadow: 0 0 0 2px rgba(46,109,164,.18);
    }
    .btn-refresh {
      padding: 0 16px;
      height: 31px;
      background: var(--col-accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 17px;
      transition: background .15s;
    }
    .btn-refresh:hover  { background: #245a8e; }
    .btn-refresh:active { background: #1c4870; }
    .sub-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      padding: 0 2px;
    }
    .sub-header h2 { font-size: 13px; font-weight: 700; color: #2d3d4f; }
    .rec-count { font-size: 11px; color: var(--col-muted); }
    .table-wrap {
      background: #fff;
      border-radius: 7px;
      border: 1px solid var(--col-border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--col-header); }
    thead th {
      padding: 9px 13px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .4px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    thead th:first-child       { text-align: left; }
    thead th:not(:first-child) { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--col-border); transition: background .08s; }
    tbody tr:last-child      { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--col-alt); }
    tbody tr:hover           { background: #edf3fa; }
    tbody td                 { padding: 8px 13px; }
    tbody td:first-child     { font-weight: 600; }
    tbody td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    tfoot tr { background: var(--col-foot); border-top: 2px solid #c8d1de; }
    tfoot td { padding: 9px 13px; font-weight: 700; }
    tfoot td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    .zero { color: var(--col-muted); font-weight: 400; }
    .status-box {
      padding: 32px 20px;
      text-align: center;
      color: var(--col-muted);
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid var(--col-border);
      border-top-color: var(--col-accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-box {
      margin: 10px;
      padding: 10px 14px;
      background: #fdecea;
      border: 1px solid #f5c6c2;
      border-radius: 5px;
      color: #912b23;
      font-size: 12px;
      display: none;
      word-break: break-all;
    }
    .empty-box {
      padding: 28px;
      text-align: center;
      color: var(--col-muted);
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>

<div class="filter-bar">
  <div class="fg">
    <label>Completed Date</label>
    <input type="date" id="filterDate">
  </div>
  <div class="fg">
    <label>Site</label>
    <select id="filterSite">
      <option value="">All Sites</option>
      <option>ABQ-ABG</option><option>Anaheim-SIXT</option><option>ATL-ABG</option>
      <option>AUS-ABG</option><option>AUS-FOX</option><option>Beverly-SIXT</option>
      <option>BOS-ABG</option><option>BOS-SIXT</option><option>BOS-SIXT-Local-562</option>
      <option>BOS-SIXT-Local-647</option><option>BUR-ABG</option><option>CMH-ABG</option>
      <option>DAL-ABG</option><option>DFW-ABG</option><option>DTLA-LYF</option>
      <option>DTLA-SIXT</option><option>DTW-ABG</option><option>FAT-ABG</option>
      <option>GRR-ABG</option><option>Huntington-SIXT</option><option>IAH-ABG</option>
      <option>LAS-ABG</option><option>LAS-Budget</option><option>LAS-SIXT</option>
      <option>LAX-ABG</option><option>LAX-ABG-CONRAC</option><option>LAX-SIXT</option>
      <option>LGB-ABG</option><option>LGB-SIXT</option><option>MAF-ABG</option>
      <option>MCI-ABG</option><option>MCO-SIXT</option><option>MDW-ABG</option>
      <option>MKE-ABG</option><option>MONROVIA-LYF</option><option>MSP-ABG</option>
      <option>MSP-SIXT</option><option>MSY-ABG</option><option>MSY-LocalMkt</option>
      <option>NewportB-SIXT</option><option>ONT-ABG</option><option>ORD-ABG</option>
      <option>Pasadena-SIXT</option><option>PHX-SIXT</option><option>PSP-ABG</option>
      <option>RDU-ABG</option><option>Redondo-SIXT</option><option>SaMo-SIXT</option>
      <option>SAN-ABG</option><option>SAN-LYF</option><option>SAN-PAY</option>
      <option>SAN-SIXT</option><option>SAT-ABG</option><option>SAT-FOX</option>
      <option>SBA-ABG</option><option>SFO-ABG</option><option>SJC-ABG</option>
      <option>SNA-ABG</option><option>SNA-SIXT</option><option>STL-ABG</option>
      <option>StudioC-SIXT</option><option>Venice-SIXT</option><option>WeHo-SIXT</option>
      <option>Z:ATL-RESLA-CAMPCREEK</option><option>Z:DFW-RESLA-BELTLINE</option>
      <option>Z:DFW-RESLA-FIELD</option><option>Z:DFW-RESLA-LAMAR</option>
      <option>Z:HOU-RESLA-WESTHEIMER</option><option>Z:MCI-RESLA-TIFFANYSPR</option>
      <option>Z:STL-RESLA-FORESTPARK</option><option>Z:STL-RESLA-MCBRIDE</option>
      <option>Z:STL-RESLA-SCOUNTY</option>
    </select>
  </div>
  <div class="fg">
    <label>Role</label>
    <select id="filterRole">
      <option value="">All Roles</option>
      <option>Avis First</option><option>Bus (Cleaning)</option>
      <option>Car Seat Cleaning</option><option>Driver</option>
      <option>EV Charging</option><option>Full Detail</option>
      <option>Lot Coord/Security</option><option>PDI (License Plates)</option>
      <option>PDI (Unwrap)</option><option>Quick Flip</option><option>VSA</option>
    </select>
  </div>
  <button class="btn-refresh" id="btnRefresh">&#8635; Refresh</button>
</div>

<div class="sub-header">
  <h2 id="reportTitle">Completed Jobs</h2>
  <span class="rec-count" id="recCount"></span>
</div>

<div class="table-wrap">
  <div id="loadBox" class="status-box"><span class="spinner"></span> Loading records…</div>
  <div id="errBox"   class="err-box"></div>
  <div id="emptyBox" class="empty-box">No completed jobs found for this date / filter.</div>
  <table id="mainTable" style="display:none;">
    <thead>
      <tr>
        <th>Site</th>
        <th>Completed MVAs</th>
        <th>Total Car Seats</th>
      </tr>
    </thead>
    <tbody id="tBody"></tbody>
    <tfoot id="tFoot"></tfoot>
  </table>
</div>

<script>
/* ── Config ──────────────────────────────────────────────── */
var ACCOUNT_OWNER = "autoflowx";   /* Zoho account login name */
var APP_LINK      = "autoflowx";   /* app link name */
var REPORT_LINK   = "All_Jobs_Report_Standard_today"; /* report link name */
/* ────────────────────────────────────────────────────────── */

var allRecords = [];

function pad(n) { return n < 10 ? "0" + n : "" + n; }

function todayStr() {
  var d = new Date();
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
}

function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ── UI helpers ──────────────────────────────────────────── */
function showLoading() {
  document.getElementById("loadBox").style.display   = "block";
  document.getElementById("errBox").style.display    = "none";
  document.getElementById("emptyBox").style.display  = "none";
  document.getElementById("mainTable").style.display = "none";
}
function showTable(hasRows) {
  document.getElementById("loadBox").style.display  = "none";
  document.getElementById("errBox").style.display   = "none";
  if (hasRows) {
    document.getElementById("emptyBox").style.display  = "none";
    document.getElementById("mainTable").style.display = "table";
  } else {
    document.getElementById("emptyBox").style.display  = "block";
    document.getElementById("mainTable").style.display = "none";
  }
}
function showError(msg) {
  document.getElementById("loadBox").style.display   = "none";
  document.getElementById("mainTable").style.display = "none";
  document.getElementById("emptyBox").style.display  = "none";
  var b = document.getElementById("errBox");
  b.style.display = "block";
  b.textContent   = "Error: " + msg;
}

/* ── Fetch one page via REST API (relative URL, no auth header needed) ── */
function fetchPage(fromIdx, acc, done, fail) {
  var url = "https://creatorapp.zoho.com/creator/v2.1/data/" + ACCOUNT_OWNER + "/" + APP_LINK
          + "/report/" + REPORT_LINK
          + "?from=" + fromIdx + "&limit=200";

  console.log("[widget] fetch URL:", url);

  fetch(url, { credentials: "include" })
    .then(function(res) { return res.json(); })
    .then(function(json) {
      console.log("[widget] fetch response code:", json.code, "count:", json.data ? json.data.length : 0);
      if (json.code !== 3000) {
        fail("API code " + json.code + ": " + (json.message || JSON.stringify(json)));
        return;
      }
      var page    = json.data || [];
      var combined = acc.concat(page);
      if (page.length === 200) {
        fetchPage(fromIdx + 200, combined, done, fail);
      } else {
        done(combined);
      }
    })
    .catch(function(err) {
      fail(err.toString());
    });
}

/* ── Render ──────────────────────────────────────────────── */
function render() {
  var selSite = document.getElementById("filterSite").value;
  var selRole = document.getElementById("filterRole").value;
  var selDate = document.getElementById("filterDate").value;

  /* Client-side filter: site, role, and completion date */
  var filtered = [];
  for (var i = 0; i < allRecords.length; i++) {
    var r = allRecords[i];
    if (selSite && (r.Site || "").trim() !== selSite) continue;
    if (selRole && (r.Role || "").trim() !== selRole) continue;
    /* Filter by completion date if record has a timestamp */
    if (selDate && r.Completion_Timestamp) {
      /* Zoho returns timestamps in various formats — extract date portion */
      var ts    = r.Completion_Timestamp.toString();
      var parts = ts.match(/(\d{2})\/(\d{2})\/(\d{4})/);
      if (parts) {
        var recDate = parts[3] + "-" + parts[1] + "-" + parts[2];
        if (recDate !== selDate) continue;
      }
    }
    /* Only count records that have a completion timestamp */
    if (!r.Completion_Timestamp || r.Completion_Timestamp === "") continue;
    filtered.push(r);
  }

  var groups = {};
  for (var j = 0; j < filtered.length; j++) {
    var rec   = filtered[j];
    var sName = (rec.Site || "Unknown").trim();
    var seats = parseInt(rec.Number_of_Car_Seats, 10) || 0;
    if (!groups[sName]) { groups[sName] = { c: 0, seats: 0 }; }
    groups[sName].c++;
    groups[sName].seats += seats;
  }

  var sites = Object.keys(groups).sort();

  document.getElementById("recCount").textContent =
    filtered.length + " record" + (filtered.length !== 1 ? "s" : "");

  if (sites.length === 0) { showTable(false); return; }

  var tbody = document.getElementById("tBody");
  var tfoot = document.getElementById("tFoot");
  tbody.innerHTML = "";
  tfoot.innerHTML = "";

  var totC = 0, totSeats = 0;
  for (var k = 0; k < sites.length; k++) {
    var sn       = sites[k];
    var g        = groups[sn];
    totC        += g.c;
    totSeats    += g.seats;
    var seatsStr = g.seats > 0 ? g.seats : '<span class="zero">&mdash;</span>';
    var tr       = document.createElement("tr");
    tr.innerHTML =
      "<td>" + esc(sn) + "</td>" +
      "<td>" + g.c + "</td>" +
      "<td>" + seatsStr + "</td>";
    tbody.appendChild(tr);
  }

  tfoot.innerHTML =
    "<tr><td>Total &mdash; " + sites.length + " site" + (sites.length !== 1 ? "s" : "") + "</td>" +
    "<td>" + totC + "</td>" +
    "<td>" + (totSeats > 0 ? totSeats : '<span class="zero">&mdash;</span>') + "</td></tr>";

  showTable(true);
}

/* ── Load ────────────────────────────────────────────────── */
function load() {
  showLoading();
  document.getElementById("reportTitle").textContent =
    "Completed Jobs \u2014 " + (document.getElementById("filterDate").value || todayStr());

  fetchPage(1, [], function(records) {
    console.log("[widget] total records fetched:", records.length);
    if (records.length > 0) {
      console.log("[widget] first record keys:", Object.keys(records[0]).join(", "));
      console.log("[widget] first record sample:", JSON.stringify(records[0]));
    }
    allRecords = records;
    render();
  }, showError);
}

/* ── Init ────────────────────────────────────────────────── */
window.onload = function() {
  ZOHO.CREATOR.UTIL.getInitParams().then(function(params) {
    console.log("[widget] initParams:", JSON.stringify(params));
    document.getElementById("filterDate").value = todayStr();
    document.getElementById("btnRefresh").addEventListener("click",  load);
    document.getElementById("filterSite").addEventListener("change", render);
    document.getElementById("filterRole").addEventListener("change", render);
    load();
  }).catch(function(err) {
    console.error("[widget] getInitParams failed:", err);
    document.getElementById("filterDate").value = todayStr();
    document.getElementById("btnRefresh").addEventListener("click",  load);
    document.getElementById("filterSite").addEventListener("change", render);
    document.getElementById("filterRole").addEventListener("change", render);
    load();
  });
};
</script>
</body>
</html>
