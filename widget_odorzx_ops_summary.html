<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Jobs Summary</title>
  <script src="https://js.zohostatic.com/creator/widgets/version/2.0/widgetsdk-min.js"></script>
  <style>
    :root {
      --col-header: #3a4a5c;
      --col-accent: #2e6da4;
      --col-foot:   #e8ecf2;
      --col-border: #dde3ec;
      --col-alt:    #f7f9fc;
      --col-muted:  #8a9bb0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #f0f3f8;
      color: #1e2a38;
      padding: 14px;
    }
    .filter-bar {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: wrap;
      background: #fff;
      padding: 10px 14px;
      border-radius: 7px;
      margin-bottom: 12px;
      border: 1px solid var(--col-border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .fg { display: flex; flex-direction: column; gap: 3px; }
    .fg label {
      font-size: 10px;
      font-weight: 700;
      color: var(--col-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .fg select,
    .fg input[type=date] {
      border: 1px solid var(--col-border);
      border-radius: 5px;
      padding: 5px 9px;
      font-size: 13px;
      color: #1e2a38;
      background: #fff;
      height: 31px;
    }
    .fg select { min-width: 160px; }
    .fg input[type=date] { min-width: 138px; }
    .fg select:focus,
    .fg input[type=date]:focus {
      outline: none;
      border-color: var(--col-accent);
      box-shadow: 0 0 0 2px rgba(46,109,164,.18);
    }
    .btn-refresh {
      padding: 0 16px;
      height: 31px;
      background: var(--col-accent);
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 17px;
      transition: background .15s;
    }
    .btn-refresh:hover  { background: #245a8e; }
    .btn-refresh:active { background: #1c4870; }
    .sub-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
      padding: 0 2px;
    }
    .sub-header h2 { font-size: 13px; font-weight: 700; color: #2d3d4f; }
    .rec-count { font-size: 11px; color: var(--col-muted); }
    .table-wrap {
      background: #fff;
      border-radius: 7px;
      border: 1px solid var(--col-border);
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--col-header); }
    thead th {
      padding: 9px 13px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .4px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    thead th:first-child       { text-align: left; }
    thead th:not(:first-child) { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--col-border); transition: background .08s; }
    tbody tr:last-child      { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--col-alt); }
    tbody tr:hover           { background: #edf3fa; }
    tbody td                 { padding: 8px 13px; }
    tbody td:first-child     { font-weight: 600; }
    tbody td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    tfoot tr { background: var(--col-foot); border-top: 2px solid #c8d1de; }
    tfoot td { padding: 9px 13px; font-weight: 700; }
    tfoot td:not(:first-child) { text-align: right; font-variant-numeric: tabular-nums; }
    .zero { color: var(--col-muted); font-weight: 400; }
    .status-box {
      padding: 32px 20px;
      text-align: center;
      color: var(--col-muted);
      font-size: 13px;
    }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2.5px solid var(--col-border);
      border-top-color: var(--col-accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-box {
      margin: 10px;
      padding: 10px 14px;
      background: #fdecea;
      border: 1px solid #f5c6c2;
      border-radius: 5px;
      color: #912b23;
      font-size: 12px;
      display: none;
    }
    .empty-box {
      padding: 28px;
      text-align: center;
      color: var(--col-muted);
      font-size: 13px;
      display: none;
    }
  </style>
</head>
<body>

  <button class="btn-refresh" id="btnRefresh">&#8635; Refresh</button>
</div>

<div class="sub-header">
  <h2 id="reportTitle">Completed Jobs</h2>
  <span class="rec-count" id="recCount"></span>
</div>

<div class="table-wrap">
  <div id="loadBox" class="status-box"><span class="spinner"></span> Loading records…</div>
  <div id="errBox"   class="err-box"></div>
  <div id="emptyBox" class="empty-box">No completed jobs found for this date / filter.</div>
  <table id="mainTable" style="display:none;">
    <thead>
      <tr>
        <th>Site</th>
        <th>Completed MVAs</th>
        <th>Total Car Seats</th>
      </tr>
    </thead>
    <tbody id="tBody"></tbody>
    <tfoot id="tFoot"></tfoot>
  </table>
</div>

<script>
var REPORT_NAME = "Standard_Job_Search";
var APP_NAME    = "autoflowx";
var allRecords  = [];
var _started    = false;

/* ── Utilities ─────────────────────────────────── */
function pad(n) { return n < 10 ? "0" + n : "" + n; }

function todayStr() {
  var d = new Date();
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
}

function toZohoDate(ymd) {
  var p = ymd.split("-");
  return p[1] + "/" + p[2] + "/" + p[0];
}

function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

/* ── UI ────────────────────────────────────────── */
function showLoading() {
  document.getElementById("loadBox").style.display   = "block";
  document.getElementById("errBox").style.display    = "none";
  document.getElementById("emptyBox").style.display  = "none";
  document.getElementById("mainTable").style.display = "none";
}
function showTable(hasRows) {
  document.getElementById("loadBox").style.display  = "none";
  document.getElementById("errBox").style.display   = "none";
  if (hasRows) {
    document.getElementById("emptyBox").style.display  = "none";
    document.getElementById("mainTable").style.display = "table";
  } else {
    document.getElementById("emptyBox").style.display  = "block";
    document.getElementById("mainTable").style.display = "none";
  }
}
function showError(msg) {
  document.getElementById("loadBox").style.display   = "none";
  document.getElementById("mainTable").style.display = "none";
  document.getElementById("emptyBox").style.display  = "none";
  var b = document.getElementById("errBox");
  b.style.display = "block";
  b.textContent   = "Error: " + msg;
}

/* ── Fetch ─────────────────────────────────────── */
function fetchPage(criteria, fromIdx, acc, done, fail) {
  var params = {
    appName:    APP_NAME,
    reportName: REPORT_NAME,
    criteria:   criteria,
    from:       fromIdx,
    limit:      200
  };
  console.log("[widget] getRecords params:", JSON.stringify(params));
  ZOHO.CREATOR.DATA.getRecords(params).then(function(resp) {
    console.log("[widget] getRecords raw response:", JSON.stringify(resp));
    var page = [];
    if (resp && resp.data)        page = resp.data;
    else if (resp && resp.result) page = resp.result;
    var combined = acc.concat(page);
    if (page.length === 200) {
      fetchPage(criteria, fromIdx + 200, combined, done, fail);
    } else {
      done(combined);
    }
  }).catch(function(err) {
    console.log("[widget] getRecords error raw:", JSON.stringify(err));
    var msg = (err && err.error && err.error.message)
           || (err && err.message)
           || JSON.stringify(err);
    fail(msg);
  });
}

/* ── Render ────────────────────────────────────── */
function render() {
  var selSite = document.getElementById("filterSite").value;
  var selRole = document.getElementById("filterRole").value;

  var filtered = [];
  for (var i = 0; i < allRecords.length; i++) {
    var r = allRecords[i];
    if (selSite && (r.Site || "").trim() !== selSite) continue;
    if (selRole && (r.Role || "").trim() !== selRole) continue;
    filtered.push(r);
  }

  var groups = {};
  for (var j = 0; j < filtered.length; j++) {
    var rec   = filtered[j];
    var sName = (rec.Site || "Unknown").trim();
    var seats = parseInt(rec.Number_of_Car_Seats, 10) || 0;
    if (!groups[sName]) { groups[sName] = { c: 0, seats: 0 }; }
    groups[sName].c++;
    groups[sName].seats += seats;
  }

  var sites = Object.keys(groups).sort();

  document.getElementById("recCount").textContent =
    filtered.length + " record" + (filtered.length !== 1 ? "s" : "");

  if (sites.length === 0) { showTable(false); return; }

  var tbody = document.getElementById("tBody");
  var tfoot = document.getElementById("tFoot");
  tbody.innerHTML = "";
  tfoot.innerHTML = "";

  var totC = 0, totSeats = 0;
  for (var k = 0; k < sites.length; k++) {
    var sn       = sites[k];
    var g        = groups[sn];
    totC        += g.c;
    totSeats    += g.seats;
    var seatsStr = g.seats > 0 ? g.seats : '<span class="zero">&mdash;</span>';
    var tr       = document.createElement("tr");
    tr.innerHTML =
      "<td>" + esc(sn) + "</td>" +
      "<td>" + g.c + "</td>" +
      "<td>" + seatsStr + "</td>";
    tbody.appendChild(tr);
  }

  tfoot.innerHTML =
    "<tr><td>Total &mdash; " + sites.length + " site" + (sites.length !== 1 ? "s" : "") + "</td>" +
    "<td>" + totC + "</td>" +
    "<td>" + (totSeats > 0 ? totSeats : '<span class="zero">&mdash;</span>') + "</td></tr>";

  showTable(true);
}

/* ── Load ──────────────────────────────────────── */
function load() {
  showLoading();
  var dateStr  = document.getElementById("filterDate").value || todayStr();

  document.getElementById("reportTitle").textContent =
    "Completed Jobs \u2014 " + dateStr;

  /* TEST: no criteria — confirm report is accessible, then we add date filter back */
  fetchPage("", 1, [], function(records) {
    console.log("[widget] success — total records:", records.length);
    console.log("[widget] first record keys:", records.length > 0 ? Object.keys(records[0]).join(", ") : "none");
    allRecords = records;
    render();
  }, showError);
}

/* ── Setup UI events ───────────────────────────── */
function setupEvents() {
  document.getElementById("filterDate").value = todayStr();
  document.getElementById("btnRefresh").addEventListener("click",  load);
  document.getElementById("filterSite").addEventListener("change", render);
  document.getElementById("filterRole").addEventListener("change", render);
}

/* ── Init: try both patterns, fallback on timeout  */
function startWidget() {
  if (_started) return;
  _started = true;
  setupEvents();
  load();
}

/* window.onload required — SDK must finish injecting before getInitParams is called */
window.onload = function() {
  ZOHO.CREATOR.UTIL.getInitParams().then(function(params) {
    console.log("[widget] getInitParams response:", JSON.stringify(params));
    if (params && params.appLinkName) APP_NAME = params.appLinkName;
    console.log("[widget] APP_NAME set to:", APP_NAME);
    startWidget();
  }).catch(function(err) {
    console.error("[widget] getInitParams failed:", err);
    startWidget();
  });
};
</script>
</body>
</html>
